<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280, initial-scale=0.28, user-scalable=yes">
<title>Botica Central — Sistema Integral v3</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<meta name="theme-color" content="#C97A2B">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Botica Central">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<!-- Firebase (SDK "compat": funciona con <script> normales, sin necesidad de bundler/módulos) -->
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<style>
:root{
  --ink:#16213E;
  --ink-2:#202D52;
  --ink-light:#7C87AD;
  --paper:#FBF8F3;
  --card:#FFFFFF;
  --amber:#C97A2B;
  --amber-deep:#A9611D;
  --amber-pale:#F3E3CC;
  --teal:#1F5C52;
  --teal-pale:#DCEAE6;
  --rose:#B33A3A;
  --rose-pale:#F5DEDE;
  --blue:#2563EB;
  --blue-pale:#DBEAFE;
  --green:#16A34A;
  --green-pale:#DCFCE7;
  --line:#E9E2D4;
  --text:#24262B;
  --text-soft:#6B6E76;
}
*{box-sizing:border-box;}
body{margin:0;background:var(--paper);color:var(--text);font-family:'Inter',sans-serif;-webkit-tap-highlight-color:transparent;}
.font-display{font-family:'Fraunces',serif;}
.font-mono{font-family:'IBM Plex Mono',monospace;}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-thumb{background:#D8CFBB;border-radius:8px;}
::-webkit-scrollbar-track{background:transparent;}

/* Login Screen */
#loginScreen{position:fixed;inset:0;background:var(--paper);display:flex;align-items:center;justify-content:center;z-index:1000;flex-direction:column;}
#loginScreen.hidden{display:none;}
.login-box{background:var(--card);border-radius:0;padding:40px;width:100%;height:100%;max-width:none;box-shadow:none;display:flex;flex-direction:column;justify-content:center;align-items:center;}
.login-box .login-form, .login-box .login-brand{width:100%;max-width:380px;}
.login-box .login-demo{width:100%;max-width:380px;}
.login-box #btnInstallApp{max-width:380px;}
.login-brand{text-align:center;margin-bottom:30px;}
.login-brand-mark{width:48px;height:48px;border-radius:12px;background:var(--amber);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;}
.login-brand-mark svg{width:28px;height:28px;color:var(--ink);}
.login-brand h1{font-family:'Fraunces',serif;font-size:24px;font-weight:700;color:var(--ink);margin:0;}
.login-brand p{font-size:13px;color:var(--text-soft);margin:4px 0 0;}
.login-form{display:flex;flex-direction:column;gap:14px;}
.login-field{display:flex;flex-direction:column;}
.login-field label{font-size:12px;font-weight:600;color:var(--ink);margin-bottom:6px;}
.login-field input, .login-field select{padding:10px 12px;border:1px solid var(--line);border-radius:8px;font-size:14px;font-family:'Inter',sans-serif;}
.login-field input:focus, .login-field select:focus{outline:2px solid var(--amber);outline-offset:0;}
.login-btn{background:var(--amber);color:#fff;border:none;padding:11px 16px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:filter .15s;width:100%;}
.login-btn:hover{filter:brightness(1.08);}
.login-error{color:var(--rose);font-size:12px;text-align:center;min-height:16px;margin-top:4px;}
.login-demo{font-size:11px;color:var(--text-soft);text-align:center;margin-top:16px;padding-top:16px;border-top:1px solid var(--line);}
.autocomplete-list{position:absolute;left:0;right:0;top:calc(100% + 4px);background:#fff;border:1px solid var(--line);border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.12);max-height:220px;overflow-y:auto;z-index:50;display:none;}
.autocomplete-list.show{display:block;}
.autocomplete-item{padding:9px 12px;cursor:pointer;border-bottom:1px solid var(--line);}
.autocomplete-item:last-child{border-bottom:none;}
.autocomplete-item:hover, .autocomplete-item.highlighted{background:var(--amber-pale);}
.autocomplete-item-name{font-size:13px;font-weight:600;color:var(--ink);}
.autocomplete-item-email{font-size:11.5px;color:var(--text-soft);margin-top:1px;}
.autocomplete-empty{padding:10px 12px;font-size:12px;color:var(--text-soft);}

/* App shell */
#app{display:flex;min-height:100vh;}
#app.hidden{display:none;}

/* Sidebar */
#sidebar{
  width:246px;flex-shrink:0;background:var(--ink);color:#CBD2E8;
  position:fixed;top:0;left:0;bottom:0;z-index:40;
  display:flex;flex-direction:column;
  transform:translateX(0);transition:transform .25s ease;
}
#sidebar .brand{padding:22px 20px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.08);}
.brand-mark{width:32px;height:32px;border-radius:8px;background:var(--amber);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.brand-mark svg{width:18px;height:18px;}
#sidebar .brand-text{font-family:'Fraunces',serif;font-weight:600;font-size:18px;color:#fff;line-height:1.1;}
#sidebar .brand-sub{font-size:10.5px;letter-spacing:.08em;color:var(--ink-light);text-transform:uppercase;margin-top:2px;}
#sidebar .user-info{padding:12px 14px;background:rgba(255,255,255,.05);border-radius:8px;margin:0 10px 10px;font-size:12px;}
#sidebar .user-info .user-name{font-weight:600;color:#fff;}
#sidebar .user-info .user-role{font-size:10px;color:var(--ink-light);margin-top:2px;text-transform:uppercase;letter-spacing:.05em;}
#navList{flex:1;overflow-y:auto;padding:14px 10px 20px;}
.nav-group-label{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-light);padding:14px 12px 6px;}
.nav-item{
  display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:9px;cursor:pointer;
  font-size:13.5px;font-weight:500;color:#C3CAE6;margin-bottom:2px;position:relative;transition:background .15s;
}
.nav-item svg{width:17px;height:17px;flex-shrink:0;opacity:.85;}
.nav-item:hover{background:rgba(255,255,255,.06);color:#fff;}
.nav-item.active{background:rgba(201,122,43,.16);color:#fff;}
.nav-item.active::before{content:"";position:absolute;left:-10px;top:6px;bottom:6px;width:3px;border-radius:3px;background:var(--amber);}
.nav-item .badge{margin-left:auto;font-family:'IBM Plex Mono',monospace;font-size:10.5px;background:rgba(255,255,255,.1);color:#fff;padding:1px 6px;border-radius:20px;}
.nav-item.danger-badge .badge{background:var(--rose);}
#sidebar .foot{padding:14px 18px 18px;border-top:1px solid rgba(255,255,255,.08);font-size:11px;color:var(--ink-light);}
#logoutBtn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;padding:8px 12px;border-radius:6px;font-size:12px;cursor:pointer;width:100%;transition:background .15s;}
#logoutBtn:hover{background:rgba(255,255,255,.15);}

/* Main */
#main{flex:1;margin-left:246px;min-height:100vh;display:flex;flex-direction:column;}
#topbar{
  background:var(--card);border-bottom:1px solid var(--line);padding:14px 26px;
  display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:30;
}
#hamburger{display:none;background:none;border:none;cursor:pointer;padding:6px;}
#hamburger svg{width:22px;height:22px;color:var(--ink);}
#pageTitle{font-family:'Fraunces',serif;font-weight:600;font-size:21px;color:var(--ink);}
#pageSub{font-size:12.5px;color:var(--text-soft);margin-top:1px;}
.topbar-actions{margin-left:auto;display:flex;align-items:center;gap:10px;}
.icon-btn{background:var(--paper);border:1px solid var(--line);border-radius:9px;padding:8px;cursor:pointer;display:flex;color:var(--ink);transition:background .15s;}
.icon-btn:hover{background:var(--amber-pale);}
.icon-btn svg{width:17px;height:17px;}

#content{padding:22px 26px 60px;flex:1;}
.section{display:none;}
.section.active{display:block;}

/* Cards */
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;}
.kpi-card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 18px;position:relative;overflow:hidden;}
.kpi-card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--amber);}
.kpi-card.teal::before{background:var(--teal);}
.kpi-card.rose::before{background:var(--rose);}
.kpi-card.blue::before{background:var(--blue);}
.kpi-card.green::before{background:var(--green);}
.kpi-label{font-size:11.5px;color:var(--text-soft);text-transform:uppercase;letter-spacing:.06em;font-weight:600;}
.kpi-value{font-family:'IBM Plex Mono',monospace;font-size:24px;font-weight:600;color:var(--ink);margin-top:6px;}
.kpi-sub{font-size:11.5px;color:var(--text-soft);margin-top:3px;}

/* Buttons */
.btn{border:none;border-radius:9px;padding:9px 16px;font-size:13.5px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:7px;font-family:'Inter',sans-serif;transition:filter .15s, transform .1s;}
.btn:active{transform:scale(.97);}
.btn svg{width:15px;height:15px;}
.btn-primary{background:var(--amber);color:#fff;}
.btn-primary:hover{filter:brightness(1.08);}
.btn-dark{background:var(--ink);color:#fff;}
.btn-dark:hover{filter:brightness(1.15);}
.btn-outline{background:#fff;color:var(--ink);border:1px solid var(--line);}
.btn-outline:hover{background:var(--paper);}
.btn-success{background:var(--teal);color:#fff;}
.btn-success:hover{filter:brightness(1.08);}
.btn-danger{background:var(--rose);color:#fff;}
.btn-danger:hover{filter:brightness(1.08);}
.btn-sm{padding:6px 11px;font-size:12.5px;}
.btn-icon{padding:7px;border-radius:8px;}
.btn:disabled{opacity:.45;cursor:not-allowed;}

/* Table */
.table-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:14px;background:var(--card);}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:600px;}
thead th{background:var(--paper);text-align:left;padding:11px 14px;font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-soft);font-weight:700;border-bottom:1px solid var(--line);white-space:nowrap;}
tbody td{padding:11px 14px;border-bottom:1px solid var(--line);vertical-align:middle;}
tbody tr:last-child td{border-bottom:none;}
tbody tr:hover{background:#FCFAF5;}
.mono{font-family:'IBM Plex Mono',monospace;}
.tag{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;}
.tag-amber{background:var(--amber-pale);color:var(--amber-deep);}
.tag-teal{background:var(--teal-pale);color:var(--teal);}
.tag-rose{background:var(--rose-pale);color:var(--rose);}
.tag-blue{background:var(--blue-pale);color:var(--blue);}
.tag-green{background:var(--green-pale);color:var(--green);}
.tag-gray{background:#EDEBE4;color:#68696E;}

/* Forms */
.field{margin-bottom:13px;}
.field label{display:block;font-size:12px;font-weight:600;color:var(--ink);margin-bottom:5px;}
.field input, .field select, .field textarea{
  width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:8px;font-size:13.5px;font-family:'Inter',sans-serif;background:#fff;color:var(--text);
}
.field input:focus, .field select:focus, .field textarea:focus{outline:2px solid var(--amber);outline-offset:0;border-color:var(--amber);}
.field input:disabled, .field select:disabled{background:#F3F4F6;color:var(--text-soft);cursor:not-allowed;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.hint{font-size:11px;color:var(--text-soft);margin-top:4px;}
.field label .chip-remove{float:right;background:none;border:none;color:var(--text-soft);cursor:pointer;font-size:12px;padding:0 2px;line-height:1;}
.field label .chip-remove:hover{color:var(--rose);}
.chip-add{display:inline-flex;align-items:center;padding:6px 12px;border-radius:20px;font-size:12px;font-weight:600;background:#fff;border:1px dashed var(--line);color:var(--text-soft);cursor:pointer;}
.chip-add:hover{border-color:var(--amber);color:var(--amber-deep);background:var(--amber-pale);}

/* Filas de tabla clicables */
tr.row-clickable{cursor:pointer;}

/* Modal */
#modalOverlay{position:fixed;inset:0;background:rgba(22,33,62,.55);backdrop-filter:blur(2px);z-index:100;display:none;align-items:flex-start;justify-content:center;padding:5vh 16px;overflow-y:auto;}
#modalOverlay.show{display:flex;}
#modalBox{background:#fff;border-radius:16px;width:100%;max-width:560px;padding:22px 22px 20px;box-shadow:0 20px 60px rgba(0,0,0,.3);}
#modalBox.wide{max-width:720px;}
#modalHead{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
#modalTitle{font-family:'Fraunces',serif;font-weight:600;font-size:19px;color:var(--ink);}
#modalClose{background:none;border:none;cursor:pointer;color:var(--text-soft);padding:4px;}
#modalClose svg{width:20px;height:20px;}
#modalFoot{display:flex;justify-content:flex-end;gap:10px;margin-top:18px;padding-top:14px;border-top:1px solid var(--line);}

/* Toast */
#toastRoot{position:fixed;bottom:20px;right:20px;z-index:200;display:flex;flex-direction:column;gap:8px;}
.toast{background:var(--ink);color:#fff;padding:11px 16px;border-radius:10px;font-size:13px;box-shadow:0 8px 24px rgba(0,0,0,.25);display:flex;align-items:center;gap:8px;animation:slideIn .2s ease;}
.toast.error{background:var(--rose);}
.toast.success{background:var(--teal);}
.toast.info{background:var(--blue);}
.toast.warning{background:var(--amber);}
@keyframes slideIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

/* Empty state */
.empty{padding:40px 20px;text-align:center;color:var(--text-soft);}
.empty svg{width:38px;height:38px;color:#D8CFBB;margin-bottom:10px;}

/* Filters bar */
.filters-bar{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:14px;align-items:center;}
.filters-bar input, .filters-bar select{padding:8px 11px;border:1px solid var(--line);border-radius:8px;font-size:13px;background:#fff;}
.filters-bar input[type="search"]{min-width:200px;flex:1;}

.section-head{display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:16px;}
.section-head h2{font-family:'Fraunces',serif;font-weight:600;font-size:20px;color:var(--ink);margin:0;}
.section-head p{font-size:12.5px;color:var(--text-soft);margin:2px 0 0;}

.grid-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px;margin-bottom:20px;}

.progress-bar{height:6px;border-radius:4px;background:#EFE9DC;overflow:hidden;}
.progress-bar span{display:block;height:100%;background:var(--teal);}

.overlay-scrim{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:39;display:none;}
.overlay-scrim.show{display:block;}

/* Timeline */
.timeline{margin:16px 0;}
.timeline-item{display:flex;gap:12px;margin-bottom:12px;position:relative;padding-left:28px;}
.timeline-item::before{content:"";position:absolute;left:6px;top:6px;width:10px;height:10px;border-radius:50%;background:var(--amber);}
.timeline-item:last-child::after{display:none;}
.timeline-item::after{content:"";position:absolute;left:10px;top:16px;bottom:-12px;width:1px;background:var(--line);}
.timeline-dot.success::before{background:var(--teal);}
.timeline-dot.error::before{background:var(--rose);}
.timeline-dot.info::before{background:var(--blue);}
.timeline-content{flex:1;}
.timeline-title{font-weight:600;font-size:13px;color:var(--ink);}
.timeline-desc{font-size:12px;color:var(--text-soft);margin-top:2px;}
.timeline-time{font-size:11px;color:var(--text-soft);margin-top:4px;}

/* File upload */
.file-upload{border:2px dashed var(--line);border-radius:10px;padding:20px;text-align:center;cursor:pointer;transition:border-color .15s, background .15s;}
.file-upload:hover{border-color:var(--amber);background:var(--amber-pale);}
.file-upload input[type="file"]{display:none;}
.file-upload-icon{font-size:28px;margin-bottom:8px;}
.file-upload-text{font-size:13px;color:var(--text);margin-bottom:4px;}
.file-upload-hint{font-size:11px;color:var(--text-soft);}

/* Status badge */
.status-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;}
.status-borrador{background:#F3F4F6;color:#6B7280;}
.status-en_revision{background:var(--blue-pale);color:var(--blue);}
.status-verificado_sat{background:var(--teal-pale);color:var(--teal);}
.status-por_pagar{background:var(--amber-pale);color:var(--amber-deep);}
.status-pagado{background:var(--green-pale);color:var(--green);}
.status-rechazado{background:var(--rose-pale);color:var(--rose);}

/* Budget bar */
.budget-bar{display:flex;align-items:center;gap:8px;margin-top:8px;}
.budget-bar-fill{flex:1;height:8px;background:#EFE9DC;border-radius:4px;overflow:hidden;}
.budget-bar-fill span{display:block;height:100%;background:var(--amber);border-radius:4px;}
.budget-bar-text{font-size:11px;color:var(--text-soft);min-width:60px;text-align:right;}

/* Alert boxes */
.alert{padding:12px 14px;border-radius:8px;border-left:3px solid;margin-bottom:14px;font-size:13px;}
.alert.warning{background:var(--amber-pale);border-color:var(--amber);color:var(--amber-deep);}
.alert.error{background:var(--rose-pale);border-color:var(--rose);color:var(--rose);}
.alert.success{background:var(--green-pale);border-color:var(--green);color:var(--green);}
.alert.info{background:var(--blue-pale);border-color:var(--blue);color:var(--blue);}

/* Admin control panel */
.tabbar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;border-bottom:1px solid var(--line);padding-bottom:0;}
.tabbar-btn{background:none;border:none;padding:9px 14px;font-size:13px;font-weight:600;color:var(--text-soft);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;}
.tabbar-btn:hover{color:var(--ink);}
.tabbar-btn.active{color:var(--amber-deep);border-bottom-color:var(--amber);}
.perm-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 0;border-bottom:1px solid var(--line);}
.perm-row:last-child{border-bottom:none;}
.perm-row-label{font-size:13px;font-weight:600;color:var(--ink);}
.perm-row-desc{font-size:11.5px;color:var(--text-soft);margin-top:2px;}
.chip-toggle{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:20px;font-size:11.5px;font-weight:600;border:1px solid var(--line);background:#fff;color:var(--text-soft);cursor:pointer;transition:all .12s;}
.chip-toggle.on{background:var(--teal-pale);border-color:var(--teal);color:var(--teal);}
.rfc-tag{display:inline-flex;align-items:center;gap:6px;background:var(--amber-pale);color:var(--amber-deep);padding:4px 8px 4px 10px;border-radius:20px;font-size:11.5px;font-family:'IBM Plex Mono',monospace;margin:3px 4px 3px 0;}
.rfc-tag button{background:none;border:none;color:var(--amber-deep);cursor:pointer;font-size:13px;line-height:1;padding:0;}
.rule-card{border:1px solid var(--line);border-radius:10px;padding:14px;margin-bottom:10px;background:#fff;}
.rule-card-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:6px;}

@media (max-width:900px){
  #sidebar{transform:translateX(-100%);}
  #sidebar.open{transform:translateX(0);}
  #main{margin-left:0;}
  #hamburger{display:flex;}
  #content{padding:16px 14px 50px;}
  #topbar{padding:12px 14px;}
  .field-row{grid-template-columns:1fr;}
  #pageTitle{font-size:18px;}
}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-brand">
      <div class="login-brand-mark" id="loginBrandMark">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 3h6v5.2a4 4 0 0 0 1.2 2.85l3.3 3.2a4 4 0 0 1 1.2 2.85V19a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-1.9a4 4 0 0 1 1.2-2.85l3.3-3.2A4 4 0 0 0 9 8.2V3Z"/><path d="M12 13v4M10 15h4"/></svg>
      </div>
      <h1 id="loginBrandTitle">Botica Central</h1>
      <p id="loginBrandSub">Sistema Integral v3.0</p>
    </div>
    <form class="login-form" id="loginForm">
      <div class="login-field" style="position:relative;">
        <label>Usuario</label>

// El service worker vive en un archivo aparte (sw.js) porque los navegadores
// no permiten registrar uno desde un Blob/data URL de forma confiable. Debe
// subirse a la MISMA carpeta del servidor donde está este HTML.
if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(err => {
      console.warn('No se pudo registrar el service worker (sube sw.js a la misma carpeta que este HTML):', err);
    });
  });
}

function esIOS(){
  return /iphone|ipad|ipod/i.test(navigator.userAgent) && !window.MSStream;
}
function appYaInstalada(){
  return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
}

let deferredInstallPrompt = null;

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredInstallPrompt = e;
  const btn = document.getElementById('btnInstallApp');
  if(btn) btn.style.display = 'flex';
});

window.addEventListener('appinstalled', () => {
  deferredInstallPrompt = null;
  const btn = document.getElementById('btnInstallApp');
  if(btn) btn.style.display = 'none';
});

document.addEventListener('DOMContentLoaded', () => {
  const btn = document.getElementById('btnInstallApp');
  if(!btn || appYaInstalada()) return;

  if(esIOS()){
    // iOS no tiene instalación con un clic: se guía al usuario al método nativo de Safari.
    btn.style.display = 'flex';
  }

  btn.addEventListener('click', async () => {
    if(deferredInstallPrompt){
      deferredInstallPrompt.prompt();
      await deferredInstallPrompt.userChoice;
      deferredInstallPrompt = null;
      btn.style.display = 'none';
      return;
    }
    if(esIOS()){
      toast('En iPhone/iPad: toca el botón Compartir (□↑) y luego "Agregar a pantalla de inicio"', 'info');
      return;
    }
    toast('Tu navegador no soporta instalar esta app, o ya está instalada.', 'info');
  });
});

// Antes de Firebase, todo se guardaba en IndexedDB. Dejamos estas funciones
// de solo-lectura para poder rescatar una única vez los datos de quien ya
// venía usando la versión anterior de la app, y subirlos a Firestore.
const IDB_NAME = 'boticaCentralDB';
const IDB_STORE = 'kv';

function idbOpen(){
  return new Promise((resolve, reject) => {
    if(!('indexedDB' in window)){
      reject(new Error('Este navegador no soporta IndexedDB'));
      return;
    }
    const req = indexedDB.open(IDB_NAME, 1);
    req.onupgradeneeded = () => {
      if(!req.result.objectStoreNames.contains(IDB_STORE)){
        req.result.createObjectStore(IDB_STORE);
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function idbGet(key){
  const db = await idbOpen();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(IDB_STORE, 'readonly');
    const req = tx.objectStore(IDB_STORE).get(key);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

// Trae, una sola vez, los datos que hubiera en IndexedDB/localStorage de la
// versión anterior (local, sin Firebase) para no perder el histórico de
// quien actualiza la app. Si no hay nada, regresa null y se usa defaultDB().
async function migrarDatosLocalesAFirestore(){
  try {
    let db = await idbGet(DB_KEY).catch(() => null);
    if(!db){
      const legacy = localStorage.getItem(DB_KEY);
      if(legacy){
        try { db = JSON.parse(legacy); } catch(e){ db = null; }
      }
    }
    if(db){
      toast('Se importaron tus datos locales previos a Firebase', 'info');
    }
    return db;
  } catch(e){
    return null;
  }
}

async function loadDB(){
  try {
    const snap = await ESTADO_DOC_REF.get();
    let db = snap.exists ? snap.data() : null;

    if(!db){
      db = await migrarDatosLocalesAFirestore();
    }
    if(!db) db = defaultDB();

    // Migración de bases de datos guardadas antes de que existieran ciertos
    // controles: si faltan estas llaves, se agregan con sus valores por
    // defecto sin tocar lo que ya existía.
    if(!db.usuarios) db.usuarios = defaultDB().usuarios;
    if(!db.presupuestos) db.presupuestos = defaultDB().presupuestos;
    if(!db.gastos) db.gastos = [];
    if(!db.notificaciones) db.notificaciones = [];
    if(!db.auditoria) db.auditoria = [];
    if(!db.permisos) db.permisos = permisosPorDefecto();
    if(!db.reglasRfc) db.reglasRfc = Object.fromEntries(CATEGORIAS_GASTO.map(c => [c, []]));
    if(!db.reglasGenerales) db.reglasGenerales = [];
    if(!db.modulos) db.modulos = modulosPorDefecto();
    Object.values(db.modulos).forEach(m => {
      if(!m.campos) m.campos = [];
      if(!m.permisos) m.permisos = { ver: ['admin'], crear: ['admin'], editar: ['admin'], eliminar: ['admin'] };
      if(!m.acciones) m.acciones = [];
    });
    if(!db.registros) db.registros = {};
    if(!db.empresa) db.empresa = { nombre: 'Botica Central', giro: 'Farmacia', subtitulo: 'Sistema Integral', icono: '' };

    await ESTADO_DOC_REF.set(db);
    return db;
  } catch(err){
    console.error('Error cargando datos de Firestore:', err);
    toast('⚠️ No se pudo conectar con Firebase. Revisa tu configuración (firebaseConfig) y tu conexión.', 'error');
    return defaultDB();
  }
}

// Escucha en tiempo real el documento de estado: si otro dispositivo/usuario
// hace un cambio (aprueba un gasto, edita un presupuesto, etc.), esta pestaña
// se actualiza sola sin necesidad de recargar la página.
let unsubscribeEstado = null;
function iniciarSincronizacionTiempoReal(){
  if(unsubscribeEstado) unsubscribeEstado();
  unsubscribeEstado = ESTADO_DOC_REF.onSnapshot(snap => {
    if(!snap.exists) return;
    const remoto = snap.data();
    if(JSON.stringify(remoto) === JSON.stringify(DB)) return; // es nuestro propio guardado, nada que hacer
    DB = remoto;
    if(currentUser){
      renderNav();
      renderSection(currentSection);
      toast('Datos actualizados (cambios de otro dispositivo)', 'info');
    }
  }, err => {
    console.error('Error en la sincronización en tiempo real:', err);
  });
}

// ========== LOGIN ==========
// Quita acentos y pasa a minúsculas, para comparar sin que importen mayúsculas/tildes.
function normalizarTexto(str){
  return (str || '').toString().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
}

// Distancia de Levenshtein: cuántos cambios (letras) separan dos textos.
// Se usa para sugerir el usuario más parecido cuando lo escrito tiene un typo
// y no aparece como substring exacto de ningún nombre/correo.
function distanciaLevenshtein(a, b){
  const m = a.length, n = b.length;
  if(m === 0) return n;
  if(n === 0) return m;
  const dp = Array.from({ length: m + 1 }, () => new Array(n + 1).fill(0));
  for(let i = 0; i <= m; i++) dp[i][0] = i;
  for(let j = 0; j <= n; j++) dp[0][j] = j;
  for(let i = 1; i <= m; i++){
    for(let j = 1; j <= n; j++){
      dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1] : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
    }
  }
  return dp[m][n];
}

// Busca usuarios que coincidan por nombre o correo. Si nada coincide como
// substring (probable typo), regresa los más parecidos por distancia de edición.
function buscarUsuariosPorTexto(query){
  const q = normalizarTexto(query.trim());
  if(!q) return DB.usuarios.slice(0, 6);

  const directos = DB.usuarios.filter(u =>
    normalizarTexto(u.nombre).includes(q) || normalizarTexto(u.email || '').includes(q)
  );
  if(directos.length) return directos.slice(0, 6);

  return DB.usuarios
    .map(u => {
      const distNombre = distanciaLevenshtein(q, normalizarTexto(u.nombre));
      const distEmail = u.email ? distanciaLevenshtein(q, normalizarTexto(u.email)) : Infinity;
      return { u, dist: Math.min(distNombre, distEmail) };
    })
    .sort((a, b) => a.dist - b.dist)
    .slice(0, 5)
    .map(x => x.u);
}

function initLoginScreen(){
  // Reemplazamos el formulario completo por una copia limpia, para no ir
  // acumulando listeners si esta función se vuelve a llamar (p.ej. al cerrar
  // sesión y volver a entrar).
  const form = document.getElementById('loginForm');
  const newForm = form.cloneNode(true);
  form.parentNode.replaceChild(newForm, form);

  const inputEl = newForm.querySelector('#loginUserInput');
  const hiddenEl = newForm.querySelector('#loginUser');
  const listEl = newForm.querySelector('#loginUserSuggestions');
  let highlightedIndex = -1;

  function renderSugerencias(query, { forzarMostrar = false } = {}){
    const resultados = buscarUsuariosPorTexto(query);
    highlightedIndex = -1;

    if(!query.trim() && !forzarMostrar){
      listEl.innerHTML = '';
      listEl.classList.remove('show');
      return;
    }
    if(!resultados.length){
      listEl.innerHTML = '<div class="autocomplete-empty">Sin coincidencias</div>';
      listEl.classList.add('show');
      return;
    }
    listEl.innerHTML = resultados.map(u => `
      <div class="autocomplete-item" data-user-id="${u.id}">
        <div class="autocomplete-item-name">${esc(u.nombre)}</div>
        <div class="autocomplete-item-email">${esc(u.email || 'sin correo')} · ${esc(ROLES[u.rol]?.label || '')}</div>
      </div>
    `).join('');
    listEl.classList.add('show');
  }

  function seleccionarUsuario(u){
    inputEl.value = u.nombre;
    hiddenEl.value = u.id;
    listEl.innerHTML = '';
    listEl.classList.remove('show');
  }

  inputEl.addEventListener('input', () => {
    hiddenEl.value = ''; // si sigue escribiendo, invalidamos la selección previa
    renderSugerencias(inputEl.value);
  });

  inputEl.addEventListener('focus', () => renderSugerencias(inputEl.value, { forzarMostrar: true }));

  inputEl.addEventListener('keydown', (e) => {
    const items = listEl.querySelectorAll('.autocomplete-item');
    if(!items.length) return;
    if(e.key === 'ArrowDown'){
      e.preventDefault();
      highlightedIndex = Math.min(highlightedIndex + 1, items.length - 1);
    } else if(e.key === 'ArrowUp'){
      e.preventDefault();
      highlightedIndex = Math.max(highlightedIndex - 1, 0);
    } else if(e.key === 'Enter' && highlightedIndex >= 0){
      e.preventDefault();
      const u = DB.usuarios.find(x => x.id === items[highlightedIndex].dataset.userId);
      if(u) seleccionarUsuario(u);
      return;
    } else {
      return;
    }
    items.forEach((it, i) => it.classList.toggle('highlighted', i === highlightedIndex));
  });

  listEl.addEventListener('mousedown', (e) => {
    // mousedown (no click) para que dispare antes del "blur" del input.
    const item = e.target.closest('[data-user-id]');
    if(!item) return;
    const u = DB.usuarios.find(x => x.id === item.dataset.userId);
    if(u) seleccionarUsuario(u);
  });

  document.addEventListener('click', (e) => {
    if(!newForm.contains(e.target)) listEl.classList.remove('show');
  });

  newForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const errorEl = document.getElementById('loginError');
    errorEl.textContent = '';

    let userId = hiddenEl.value;
    if(!userId){
      // No seleccionó una sugerencia de la lista: intentamos resolverlo si lo
      // que escribió coincide exacto (sin importar mayúsculas/tildes) con
      // algún nombre o correo, para no obligar siempre a hacer clic.
      const texto = normalizarTexto(inputEl.value);
      const exacto = DB.usuarios.find(u => normalizarTexto(u.nombre) === texto || normalizarTexto(u.email || '') === texto);
      if(exacto) userId = exacto.id;
    }

    const pin = document.getElementById('loginPin').value;
    const user = DB.usuarios.find(u => u.id === userId);

    if(!user){
      errorEl.textContent = 'Selecciona tu usuario de la lista de sugerencias';
      return;
    }
    if(!user.email){
      errorEl.textContent = 'Este usuario no tiene un correo configurado. Contacta al administrador.';
      return;
    }
    if(!pin){
      errorEl.textContent = 'Ingresa tu contraseña';
      return;
    }

    const submitBtn = newForm.querySelector('.login-btn');
    submitBtn.disabled = true;
    submitBtn.textContent = 'Ingresando...';

    try {
      await auth.signInWithEmailAndPassword(user.email, pin);
      currentUser = user;
      document.getElementById('loginScreen').classList.add('hidden');
      document.getElementById('app').classList.remove('hidden');
      initApp();
    } catch(err){
      console.error('Error de autenticación:', err);
      errorEl.textContent = mapAuthError(err.code);
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = 'Ingresar';
    }
  });
}

// Traduce los códigos de error de Firebase Auth a mensajes claros en español.
function mapAuthError(code){
  const mensajes = {
    'auth/user-not-found': 'No existe una cuenta de acceso para este usuario. Pide al administrador que la cree.',
    'auth/wrong-password': 'Contraseña incorrecta.',
    'auth/invalid-credential': 'Correo o contraseña incorrectos.',
    'auth/invalid-email': 'El correo de este usuario no es válido.',
    'auth/user-disabled': 'Esta cuenta fue deshabilitada.',
    'auth/too-many-requests': 'Demasiados intentos fallidos. Espera un momento e inténtalo de nuevo.',
    'auth/network-request-failed': 'Sin conexión a internet.'
  };
  return mensajes[code] || 'No se pudo iniciar sesión. Intenta de nuevo.';
}

function logout(){
  auth.signOut().catch(err => console.error('Error al cerrar sesión:', err));
  currentUser = null;
  document.getElementById('loginScreen').classList.remove('hidden');
  document.getElementById('app').classList.add('hidden');
  document.getElementById('loginPin').value = '';
  document.getElementById('loginUser').value = '';
  const inputVisible = document.getElementById('loginUserInput');
  if(inputVisible) inputVisible.value = '';
}

function renderNav(){
  const nav = document.getElementById('navList');
  nav.innerHTML = getNavItems().map(group => `
    <div class="nav-group-label">${group.group}</div>
    ${group.items.map(item => `
      <div class="nav-item" data-section="${item.id}" data-nav-badge="${item.id}">
        <svg viewBox="0 0 24 24" fill="currentColor">${ICONS[item.icon] || ''}</svg>
        <span>${item.label}</span>
        ${item.badge ? `<span class="badge">0</span>` : ''}
      </div>
    `).join('')}
  `).join('');

  nav.querySelectorAll('.nav-item').forEach(el => {
    el.addEventListener('click', () => {
      showSection(el.dataset.section);
      if(window.innerWidth <= 900) closeSidebar();
    });
  });

  updateNavBadges();
}

function updateNavBadges(){
  actualizarGastadoPresupuesto();

  if(tienePermiso(currentUser, 'aprobacion_final')){
    const pendientes = DB.gastos.filter(g => ['en_revision','verificado_sat','por_pagar'].includes(g.estado)).length;
    setBadge('bandeja_admin', pendientes);
  }
  if(tienePermiso(currentUser, 'revisar_gastos')){
    const pendientes = DB.gastos.filter(g => g.estado === 'en_revision' && g.solicitanteId !== currentUser.id).length;
    setBadge('bandeja_adm', pendientes);
  }
  if(tienePermiso(currentUser, 'verificar_sat')){
    const pendientes = DB.gastos.filter(g => g.estado === 'verificado_sat' && !g.verificadoSat).length;
    setBadge('bandeja_contador', pendientes);
  }
  if(currentUser.rol === 'vendedor' || currentUser.rol === 'promotor'){
    const pendientes = DB.gastos.filter(g => g.solicitanteId === currentUser.id && ['borrador','en_revision','verificado_sat','por_pagar'].includes(g.estado)).length;
    setBadge('mis_gastos', pendientes);
  }
}

function setBadge(id, count){
  const el = document.querySelector(`[data-nav-badge="${id}"] .badge`);
  if(el) el.textContent = count > 0 ? count : '';
}

function showSection(id){
  currentSection = id;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.section === id));
  
  const meta = {
    dashboard: ['Panel General', 'Resumen del sistema'],
    presupuestos: ['Presupuestos', 'Gestión de presupuestos por categoría'],
    gastos: ['Todos los Gastos', 'Gestión integral de comprobantes'],
    mis_gastos: ['Mis Solicitudes', 'Seguimiento de tus gastos'],
    nuevo_gasto: ['Subir Comprobante', 'Registra un nuevo gasto'],
    bandeja_admin: ['Bandeja de Entrada', 'Gastos pendientes de aprobación final'],
    bandeja_adm: ['Bandeja de Entrada', 'Gastos pendientes de revisión'],
    bandeja_contador: ['Bandeja de Entrada', 'Gastos por verificar en SAT'],
    verificacion: ['Verificación SAT', 'Validar comprobantes fiscales'],
    pagos: ['Programación de Pagos', 'Gestionar pagos programados'],
    reportes: ['Reportes', 'Análisis y estadísticas'],
    usuarios: ['Usuarios', 'Gestión de usuarios del sistema'],
    control_sistema: ['Control del Sistema', 'Permisos, contraseñas y reglas automáticas']
  };

  if(meta[id]){
    document.getElementById('pageTitle').textContent = meta[id][0];
    document.getElementById('pageSub').textContent = meta[id][1];
  } else if(id.startsWith('mod_')){
    const modulo = DB.modulos && DB.modulos[id.slice(4)];
    document.getElementById('pageTitle').textContent = modulo ? modulo.nombre : 'Módulo';
    document.getElementById('pageSub').textContent = 'Registros de este módulo y las reglas que le apliquen';
  }

  renderSection(id);
}

function renderSection(id){
  const renderers = {
    dashboard: renderDashboard,
    presupuestos: renderPresupuestos,
    gastos: renderGastos,
    mis_gastos: renderMisGastos,
    nuevo_gasto: renderNuevoGasto,
    bandeja_admin: renderBandejaAdmin,
    bandeja_adm: renderBandejaAdm,
    bandeja_contador: renderBandejaContador,
    verificacion: renderVerificacion,
    pagos: renderPagos,
    reportes: renderReportes,
    usuarios: renderUsuarios,
    control_sistema: renderControlSistema
  };

  const renderer = renderers[id];
  if(renderer){
    document.getElementById('content').innerHTML = renderer();
    attachSectionHandlers(id);
    updateNavBadges();
  } else if(id.startsWith('mod_')){
    document.getElementById('content').innerHTML = renderModuloGenerico(id.slice(4));
    attachSectionHandlers(id);
    updateNavBadges();
  }
}

function attachSectionHandlers(id){
  if(id.startsWith('mod_')){ attachModuloGenericoHandlers(id.slice(4)); return; }
  if(id === 'dashboard') drawDashboardCharts();
  if(id === 'nuevo_gasto') attachNuevoGastoHandlers();
  if(id === 'mis_gastos') attachMisGastosHandlers();
  if(id === 'bandeja_adm') attachBandejaAdmHandlers();
  if(id === 'bandeja_contador') attachBandejaContadorHandlers();
  if(id === 'bandeja_admin') attachBandejaAdminHandlers();
  if(id === 'gastos') attachGastosHandlers();
  if(id === 'presupuestos') attachPresupuestosHandlers();
  if(id === 'verificacion') attachVerificacionHandlers();
  if(id === 'pagos') attachPagosHandlers();
  if(id === 'usuarios') attachUsuariosHandlers();
  if(id === 'control_sistema') attachControlSistemaHandlers();
}

function openSidebar(){ document.getElementById('sidebar').classList.add('open'); document.getElementById('scrim').classList.add('show'); }
function closeSidebar(){ document.getElementById('sidebar').classList.remove('open'); document.getElementById('scrim').classList.remove('show'); }

// Aplica el nombre/subtítulo/ícono configurados en "Empresa" tanto al login
// como al sidebar ya adentro, para poder pasar de "Botica Central" a
// cualquier otro giro sin tocar código.
function aplicarIdentidadEmpresa(){
  const emp = (DB && DB.empresa) || {};
  const nombre = emp.nombre || 'Mi Empresa';
  const subtitulo = emp.subtitulo || 'Sistema Integral';
  document.title = nombre;

  const marcaHTML = emp.icono
    ? `<span style="font-size:22px;line-height:1;">${esc(emp.icono)}</span>`
    : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 3h6v5.2a4 4 0 0 0 1.2 2.85l3.3 3.2a4 4 0 0 1 1.2 2.85V19a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-1.9a4 4 0 0 1 1.2-2.85l3.3-3.2A4 4 0 0 0 9 8.2V3Z"/><path d="M12 13v4M10 15h4"/></svg>`;

  const loginTitle = document.getElementById('loginBrandTitle');
  const loginSub = document.getElementById('loginBrandSub');
  const loginMark = document.getElementById('loginBrandMark');
  if(loginTitle) loginTitle.textContent = nombre;
  if(loginSub) loginSub.textContent = `${subtitulo} v3.0`;
  if(loginMark) loginMark.innerHTML = marcaHTML.replace('stroke-width="2"', 'stroke-width="2"');

  const sideTitle = document.getElementById('sidebarBrandTitle');
  const sideSub = document.getElementById('sidebarBrandSub');
  const sideMark = document.getElementById('sidebarBrandMark');
  if(sideTitle) sideTitle.textContent = nombre;
  if(sideSub) sideSub.textContent = `v3.0 · ${subtitulo}`;
  if(sideMark) sideMark.innerHTML = emp.icono ? `<span style="font-size:20px;line-height:1;">${esc(emp.icono)}</span>` : marcaHTML.replace('stroke="currentColor"', 'stroke="#16213E"');
}

// ========== MODAL ==========
function openModal(title, bodyHTML, {wide=false, saveLabel='Guardar', onSave=null, hideFoot=false} = {}){
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').innerHTML = bodyHTML;
  document.getElementById('modalBox').classList.toggle('wide', wide);
  const foot = document.getElementById('modalFoot');
  if(hideFoot){
    foot.innerHTML = '';
  } else {
    foot.innerHTML = `<button class="btn btn-outline" id="modalCancelBtn">Cancelar</button><button class="btn btn-primary" id="modalSaveBtn">${saveLabel}</button>`;
    document.getElementById('modalCancelBtn').onclick = closeModal;
    document.getElementById('modalSaveBtn').onclick = () => { if(onSave) onSave(); };
  }
  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal(){
  document.getElementById('modalOverlay').classList.remove('show');
}

document.getElementById('modalClose').onclick = closeModal;
document.getElementById('modalOverlay').addEventListener('click', e => { if(e.target.id === 'modalOverlay') closeModal(); });

// ========== DASHBOARD ==========
function renderDashboard(){
  actualizarGastadoPresupuesto();
  const now = new Date();
  const gastosHoy = DB.gastos.filter(g => isSameDay(g.fecha, now));
  const gastosMes = DB.gastos.filter(g => isSameMonth(g.fecha, now));
  const totalGastosHoy = gastosHoy.reduce((s,g) => s + g.monto, 0);
  const totalGastosMes = gastosMes.reduce((s,g) => s + g.monto, 0);
  const totalPresupuestoMes = DB.presupuestos.filter(p => p.mes === currentMonthISO()).reduce((s,p) => s + p.presupuesto, 0);
  const gastosPendientes = DB.gastos.filter(g => g.estado !== 'pagado' && g.estado !== 'rechazado').length;
  const gastosVerificados = DB.gastos.filter(g => g.estado === 'verificado_sat').length;

  return `
  <div class="grid-cards">
    <div class="kpi-card">
      <div class="kpi-label">Gastos de hoy</div>
      <div class="kpi-value">${money(totalGastosHoy)}</div>
      <div class="kpi-sub">${gastosHoy.length} comprobante(s)</div>
    </div>
    <div class="kpi-card teal">
      <div class="kpi-label">Gastos del mes</div>
      <div class="kpi-value">${money(totalGastosMes)}</div>
      <div class="kpi-sub">${gastosMes.length} registro(s)</div>
    </div>
    <div class="kpi-card blue">
      <div class="kpi-label">Presupuesto mes</div>
      <div class="kpi-value">${money(totalPresupuestoMes)}</div>
      <div class="kpi-sub">Disponible: ${money(totalPresupuestoMes - totalGastosMes)}</div>
    </div>
    <div class="kpi-card rose">
      <div class="kpi-label">Pendientes</div>
      <div class="kpi-value">${gastosPendientes}</div>
      <div class="kpi-sub">En proceso de validación</div>
    </div>
  </div>

  <div style="display:grid;grid-template-columns:1.5fr 1fr;gap:16px;margin-bottom:20px;">
    <div class="card">
      <div style="font-family:'Fraunces',serif;font-weight:600;font-size:15.5px;color:var(--ink);margin-bottom:10px;">Gastos — últimos 7 días</div>
      <canvas id="gastosChart" height="150"></canvas>
    </div>
    <div class="card">
      <div style="font-family:'Fraunces',serif;font-weight:600;font-size:15.5px;color:var(--ink);margin-bottom:10px;">Estado de Gastos</div>
      ${Object.entries(ESTADOS_GASTO).map(([estado, label]) => {
        const count = DB.gastos.filter(g => g.estado === estado).length;
        return `<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--line);font-size:13px;">
          <span>${label}</span><span class="mono tag tag-gray">${count}</span>
        </div>`;
      }).join('')}
    </div>
  </div>
  `;
}

function drawDashboardCharts(){
  const ctx = document.getElementById('gastosChart');
  if(!ctx || typeof Chart === 'undefined') return;
  
  const labels = [];
  const data = [];
  for(let i = 6; i >= 0; i--){
    const d = new Date();
    d.setDate(d.getDate() - i);
    labels.push(d.toLocaleDateString('es-MX', {weekday:'short'}));
    const total = DB.gastos.filter(g => isSameDay(g.fecha, d) && g.estado !== 'rechazado').reduce((s,g) => s + g.monto, 0);
    data.push(total);
  }

  if(salesChart) salesChart.destroy();
  salesChart = new Chart(ctx, {
    type: 'bar',
    data: { labels, datasets: [{ data, backgroundColor: '#C97A2B', borderRadius: 6, maxBarThickness: 36 }] },
    options: {
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: c => money(c.raw) } } },
      scales: { y: { beginAtZero: true, grid: { color: '#EEE7D8' }, ticks: { callback: v => '$' + v } }, x: { grid: { display: false } } }
    }
  });
}

// ========== PRESUPUESTOS ==========
function renderPresupuestos(){
  actualizarGastadoPresupuesto();
  const mes = currentMonthISO();
  const presupuestos = DB.presupuestos.filter(p => p.mes === mes);
  const totalPresupuesto = presupuestos.reduce((s,p) => s + p.presupuesto, 0);
  const totalGastado = presupuestos.reduce((s,p) => s + p.gastado, 0);
  const disponible = totalPresupuesto - totalGastado;

  return `
  <div class="section-head">
    <div><h2>Presupuestos ${mes}</h2><p>Control presupuestario por categoría</p></div>
    ${tienePermiso(currentUser, 'editar_presupuestos') ? `<button class="btn btn-primary" id="btnEditarPresupuestos">Editar Presupuestos</button>` : ''}
  </div>

  <div class="grid-cards">
    <div class="kpi-card">
      <div class="kpi-label">Presupuesto Total</div>
      <div class="kpi-value">${money(totalPresupuesto)}</div>
    </div>
    <div class="kpi-card teal">
      <div class="kpi-label">Gastado</div>
      <div class="kpi-value">${money(totalGastado)}</div>
      <div class="kpi-sub">${((totalGastado / totalPresupuesto) * 100).toFixed(1)}% utilizado</div>
    </div>
    <div class="kpi-card ${disponible >= 0 ? 'green' : 'rose'}">
      <div class="kpi-label">Disponible</div>
      <div class="kpi-value">${money(disponible)}</div>
      <div class="kpi-sub">${disponible >= 0 ? 'En rango' : 'EXCEDIDO'}</div>
    </div>
  </div>

  <div class="table-wrap">
    <table>
      <thead><tr><th>Categoría</th><th>Presupuesto</th><th>Gastado</th><th>Disponible</th><th>% Utilizado</th><th></th></tr></thead>
      <tbody>
        ${presupuestos.map(p => {
          const disponible = p.presupuesto - p.gastado;
          const pct = ((p.gastado / p.presupuesto) * 100).toFixed(1);
          const estado = p.gastado > p.presupuesto ? 'error' : (pct > 80 ? 'warning' : 'success');
          return `<tr>
            <td style="font-weight:500;">${esc(p.categoria)}</td>
            <td class="mono">${money(p.presupuesto)}</td>
            <td class="mono">${money(p.gastado)}</td>
            <td class="mono" ${disponible < 0 ? 'style="color:var(--rose);"' : ''}>${money(disponible)}</td>
            <td>
              <div class="budget-bar">
                <div class="budget-bar-fill"><span style="width:${Math.min(100, pct)}%;background:${estado === 'error' ? 'var(--rose)' : (estado === 'warning' ? 'var(--amber)' : 'var(--teal)')}"></span></div>
                <div class="budget-bar-text">${pct}%</div>
              </div>
            </td>
            <td>${estado === 'error' ? '<span class="tag tag-rose">EXCEDIDO</span>' : (estado === 'warning' ? '<span class="tag tag-amber">ALTO</span>' : '')}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  </div>
  `;
}

function attachPresupuestosHandlers(){
  const btn = document.getElementById('btnEditarPresupuestos');
  if(btn){
    btn.addEventListener('click', () => {
      const mes = currentMonthISO();
      const presupuestos = DB.presupuestos.filter(p => p.mes === mes);
      let html = '<div style="margin-bottom:16px;"><p style="font-size:12px;color:var(--text-soft);">Ajusta los presupuestos para el mes actual. Estos límites se usarán para validar gastos.</p></div>';
      
      presupuestos.forEach(p => {
        html += `
          <div class="field-row">
            <div class="field">
              <label>${esc(p.categoria)}</label>
              <input type="number" class="pres-input" data-pres-id="${p.id}" value="${p.presupuesto}" min="0" step="100">
            </div>
            <div class="field">
              <label>Gastado</label>
              <input type="number" disabled value="${p.gastado}" style="background:#F3F4F6;">
            </div>
          </div>
        `;
      });

      openModal('Editar Presupuestos', html, {
        wide: true,
        saveLabel: 'Guardar Cambios',
        onSave: () => {
          document.querySelectorAll('.pres-input').forEach(inp => {
            const presId = inp.dataset.presId;
            const pres = DB.presupuestos.find(p => p.id === presId);
            if(pres) pres.presupuesto = parseFloat(inp.value) || 0;
          });
          saveDB();
          toast('Presupuestos actualizados', 'success');
          closeModal();
          renderSection('presupuestos');
        }
      });
    });
  }
}

// ========== NUEVO GASTO (SUBIR COMPROBANTE) ==========
function renderNuevoGasto(){
  return `
  <div class="card">
    <div style="font-family:'Fraunces',serif;font-weight:600;font-size:18px;color:var(--ink);margin-bottom:20px;">Subir Nuevo Comprobante</div>
    
    <div style="margin-bottom:20px;">
      <label style="display:block;font-size:12px;font-weight:600;color:var(--ink);margin-bottom:10px;">Selecciona una imagen o PDF</label>
      <div class="file-upload" id="fileUploadArea">
        <div class="file-upload-icon">📄</div>
        <div class="file-upload-text">Arrastra un archivo aquí o haz clic para seleccionar</div>
        <div class="file-upload-hint">JPG, PNG, PDF · Máx. 10MB</div>
        <input type="file" id="fileInput" accept="image/*,.pdf">
      </div>
