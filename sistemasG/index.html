function attachNuevoGastoHandlers(){
  currentComprobante = null;
  camposOpcionalesVisibles = {};
  renderCamposOpcionales();

  const fileUploadArea = document.getElementById('fileUploadArea');
  const fileInput = document.getElementById('fileInput');
  const extractedContainer = document.getElementById('extractedDataContainer');

  fileUploadArea.addEventListener('click', () => fileInput.click());
  fileUploadArea.addEventListener('dragover', (e) => {
    e.preventDefault();
    fileUploadArea.style.borderColor = 'var(--amber)';
  });
  fileUploadArea.addEventListener('dragleave', () => {
    fileUploadArea.style.borderColor = 'var(--line)';
  });
  fileUploadArea.addEventListener('drop', (e) => {
    e.preventDefault();
    fileUploadArea.style.borderColor = 'var(--line)';
    if(e.dataTransfer.files.length) handleFileUpload(e.dataTransfer.files[0]);
  });

  fileInput.addEventListener('change', (e) => {
    if(e.target.files.length) handleFileUpload(e.target.files[0]);
  });

  document.getElementById('btnCancelarGasto').addEventListener('click', () => {
    currentComprobante = null;
    showSection('mis_gastos');
  });
  document.getElementById('btnGuardarGasto').addEventListener('click', guardarNuevoGasto);

  // Listener para actualizar alerta de presupuesto y de reglas automáticas
  document.getElementById('mCategoria').addEventListener('change', () => { actualizarAlertaPresupuesto(); actualizarAlertaReglas(); });
  document.getElementById('mMonto').addEventListener('input', () => { actualizarAlertaPresupuesto(); actualizarAlertaReglas(); });
}

// Estado: qué campos opcionales (impuestos, rfc, folio) están actualmente
// visibles como inputs en el formulario "Nuevo Gasto". Los campos ocultos
// se muestran como chips "+ agregar campo" para que el usuario los pueda
// añadir manualmente si la IA no los detectó (o no aplica la extracción).
let camposOpcionalesVisibles = {};

// Dibuja los inputs de los campos opcionales visibles y los chips de los
// campos ocultos, y conecta sus listeners de mostrar/ocultar. Se vuelve a
// llamar cada vez que cambia la visibilidad de algún campo.
function renderCamposOpcionales(){
  const cont = document.getElementById('camposOpcionalesContainer');
  const chipsCont = document.getElementById('camposChipsContainer');
  if(!cont || !chipsCont) return;

  const previos = {};
  Object.keys(CAMPOS_OPCIONALES_GASTO).forEach(key => {
    const el = document.getElementById(CAMPOS_OPCIONALES_GASTO[key].id);
    if(el) previos[key] = el.value;
  });

  cont.innerHTML = Object.entries(CAMPOS_OPCIONALES_GASTO).filter(([key]) => camposOpcionalesVisibles[key]).map(([key, cfg]) => `
    <div class="field" data-campo-opcional="${key}">
      <label>${cfg.label}<button type="button" class="chip-remove" data-quitar-campo="${key}" title="Quitar este campo">✕ quitar</button></label>
      <input type="${cfg.type}" id="${cfg.id}" placeholder="${cfg.placeholder}" ${cfg.extra || ''} value="${esc(previos[key] || '')}">
    </div>
  `).join('');

  chipsCont.innerHTML = Object.entries(CAMPOS_OPCIONALES_GASTO).filter(([key]) => !camposOpcionalesVisibles[key]).map(([key, cfg]) => `
    <button type="button" class="chip-add" data-agregar-campo="${key}">+ agregar ${cfg.label}</button>
  `).join('');

  cont.querySelectorAll('[data-quitar-campo]').forEach(btn => {
    btn.addEventListener('click', () => {
      camposOpcionalesVisibles[btn.dataset.quitarCampo] = false;
      renderCamposOpcionales();
    });
  });
  chipsCont.querySelectorAll('[data-agregar-campo]').forEach(btn => {
    btn.addEventListener('click', () => {
      const key = btn.dataset.agregarCampo;
      camposOpcionalesVisibles[key] = true;
      renderCamposOpcionales();
      document.getElementById(CAMPOS_OPCIONALES_GASTO[key].id)?.focus();
    });
  });

  // El RFC puede afectar las reglas automáticas configuradas por el admin;
  // si el campo está visible, revalidamos en vivo mientras el usuario escribe.
  document.getElementById('mRFC')?.addEventListener('input', actualizarAlertaReglas);
}

// Decide qué campos opcionales mostrar como input y cuáles como chip, según
// lo que la IA haya extraído de la foto:
// - Si `extracted` es null (PDF sin análisis de IA, o la extracción falló),
//   mostramos TODOS los campos opcionales como fallback, ya que no hay
//   ninguna señal que nos diga cuáles omitir.
// - Si `extracted` trae datos, solo mostramos los campos que sí vinieron
//   con un valor (0 cuenta como valor válido; null/undefined/'' no).
function actualizarVisibilidadCamposOpcionales(extracted){
  Object.keys(CAMPOS_OPCIONALES_GASTO).forEach(key => {
    if(!extracted){
      camposOpcionalesVisibles[key] = true;
    } else {
      const val = extracted[key];
      camposOpcionalesVisibles[key] = !(val === null || val === undefined || val === '');
    }
  });
  renderCamposOpcionales();
}

function actualizarAlertaPresupuesto(){
  const categoria = document.getElementById('mCategoria').value;
  const monto = parseFloat(document.getElementById('mMonto').value) || 0;
  const presupuesto = getPresupuesto(categoria);
  const disponible = presupuesto.presupuesto - presupuesto.gastado;
  const alertDiv = document.getElementById('presupuestoAlert');

  if(monto > disponible){
    alertDiv.innerHTML = `<div class="alert error">⚠️ Este gasto excede el presupuesto disponible. Disponible: ${money(disponible)}</div>`;
  } else if(monto > 0 && (presupuesto.gastado + monto) > (presupuesto.presupuesto * 0.8)){
    alertDiv.innerHTML = `<div class="alert warning">⚠️ Este gasto utilizará más del 80% del presupuesto de ${categoria}. Disponible después: ${money(disponible - monto)}</div>`;
  } else {
    alertDiv.innerHTML = '';
  }
}

// Avisa en el formulario si, con los datos actuales, el gasto sería
// rechazado automáticamente por las reglas de RFC configuradas por el
// administrador — antes de que el usuario lo envíe.
function actualizarAlertaReglas(){
  const alertDiv = document.getElementById('reglasAlert');
  if(!alertDiv) return;
  const categoria = document.getElementById('mCategoria').value;
  const rfc = (document.getElementById('mRFC')?.value || '').trim();
  if(!rfc){ alertDiv.innerHTML = ''; return; }
  const check = validarRfcGasto({ categoria, rfc });
  alertDiv.innerHTML = check.ok ? '' : `<div class="alert warning">⚠️ ${esc(check.motivo)} Si envías este comprobante así, el sistema lo rechazará automáticamente.</div>`;
}

// Comprobante actualmente adjunto en el formulario "Nuevo Gasto".
// Se guarda aquí y se adjunta al gasto al momento de enviarlo, para que
// quede disponible para todo el flujo de aprobadores (contador, admin, etc.).
let currentComprobante = null; // { dataUrl, mimeType, esPdf }

async function handleFileUpload(file){
  if(file.size > 10 * 1024 * 1024){
    toast('El archivo es demasiado grande (máx. 10MB)', 'error');
    return;
  }

  currentComprobante = null;
  const extractedContainer = document.getElementById('extractedDataContainer');
  extractedContainer.style.display = 'block';
  
  const processingStatus = document.getElementById('processingStatus');
  processingStatus.textContent = 'Leyendo archivo...';

  const esPdf = file.type === 'application/pdf';

  try {
    if(esPdf){
      // Los modelos de visión de Groq no aceptan PDFs como imagen: si se le manda
      // un PDF disfrazado de imagen, Groq responde con error o datos basura.
      // Por eso, para PDF guardamos el archivo tal cual y pedimos captura manual.
      const base64Data = await fileToBase64(file);
      currentComprobante = { dataUrl: base64Data, mimeType: 'application/pdf', esPdf: true };
      processingStatus.parentElement.innerHTML = '<div class="alert info">📄 Es un PDF: no se puede leer automáticamente con IA todavía. El archivo se adjuntará al gasto — completa los datos manualmente.</div>';
      // Sin extracción de IA no hay señal de qué campos omitir, así que
      // mostramos todos los campos opcionales como respaldo.
      actualizarVisibilidadCamposOpcionales(null);
      return;
    }

    processingStatus.textContent = 'Optimizando imagen...';
    // Comprimimos/redimensionamos antes de mandar a Groq y antes de guardar:
    // evita pagos "413 Payload Too Large" con fotos de celular (varios MB) y
    // evita llenar el almacenamiento local con imágenes pesadas.
    const compressedDataUrl = await compressImage(file);
    currentComprobante = { dataUrl: compressedDataUrl, mimeType: 'image/jpeg', esPdf: false };

    processingStatus.textContent = 'Enviando a IA para análisis (Groq Qwen3.6 27B Vision)...';
    const extracted = await extractFacturaWithGroq(compressedDataUrl, processingStatus);
    
    if(extracted){
      // Primero decidimos qué campos opcionales mostrar según lo extraído
      // (esto los dibuja en el DOM), y luego llenamos los valores.
      actualizarVisibilidadCamposOpcionales(extracted);

      document.getElementById('mCategoria').value = extracted.categoria || CATEGORIAS_GASTO[0];
      document.getElementById('mDescripcion').value = extracted.descripcion || '';
      document.getElementById('mMonto').value = extracted.monto || '';
      document.getElementById('mFecha').value = extracted.fecha || todayISO();
      if(document.getElementById('mImpuestos')) document.getElementById('mImpuestos').value = extracted.impuestos ?? '';
      if(document.getElementById('mRFC')) document.getElementById('mRFC').value = extracted.rfc || '';
      if(document.getElementById('mFolio')) document.getElementById('mFolio').value = extracted.folio || '';
      
      processingStatus.parentElement.innerHTML = '<div class="alert success">✓ Datos extraídos correctamente con Groq Vision (Qwen3.6). Revisa y corrige si es necesario.</div>';
      actualizarAlertaPresupuesto();
      actualizarAlertaReglas();
    }
  } catch(err){
    console.error(err);
    // Mostramos el mensaje real del error (incluye si fue CORS/red, auth, o del modelo)
    // en vez de un mensaje genérico, para poder diagnosticar bloqueos del navegador.
    processingStatus.parentElement.innerHTML = `<div class="alert error">⚠️ No se pudo extraer con IA: ${esc(err.message)}. El comprobante ya quedó adjunto — completa los datos manualmente y continúa.</div>`;
    // Sin datos de extracción tampoco hay señal de qué mostrar/ocultar,
    // así que igualmente mostramos todos los campos opcionales.
    actualizarVisibilidadCamposOpcionales(null);
  }
}

function fileToBase64(file){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// Redimensiona y comprime una imagen a JPEG usando un <canvas>, para que
// nunca se envíen ni se guarden fotos de varios MB sin necesidad.
function compressImage(file, maxDim = 1100, quality = 0.6){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error('No se pudo leer el archivo'));
    reader.onload = (e) => {
      const img = new Image();
      img.onerror = () => reject(new Error('No se pudo leer la imagen'));
      img.onload = () => {
        let { width, height } = img;
        if(width > maxDim || height > maxDim){
          if(width >= height){
            height = Math.round(height * (maxDim / width));
            width = maxDim;
          } else {
            width = Math.round(width * (maxDim / height));
            height = maxDim;
          }
        }
        const canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

async function extractFacturaWithGroq(base64Data, statusEl){
  const imageData = base64Data.includes(',') ? base64Data.split(',')[1] : base64Data;
  const mimeType = base64Data.startsWith('data:image/png') ? 'image/png' : 'image/jpeg';

  const prompt = `Eres un experto en análisis de facturas y comprobantes fiscales mexicanos. Analiza esta imagen de un comprobante y extrae los siguientes datos en formato JSON:
{
  "categoria": "Categoría del gasto (Renta, Servicios, Sueldos, Mantenimiento, Papelería, Transporte, Otros)",
  "descripcion": "Descripción breve del comprobante",
  "monto": número total,
  "impuestos": número de IVA u otros impuestos,
  "rfc": "RFC del emisor",
  "folio": "Folio fiscal o UUID",
  "fecha": "YYYY-MM-DD"
}

Si no encuentras un campo, usa null. Responde ÚNICAMENTE con el objeto JSON. No incluyas razonamiento, explicaciones, ni bloques de markdown antes o después.`;

  for(let i = 0; i < GROQ_KEYS.length; i++){
    // Hasta 2 intentos por key: si Groq responde 429 (límite de tokens/minuto),
    // esperamos el tiempo que el propio servicio sugiere y reintentamos una vez
    // antes de pasar a la siguiente key.
    for(let attempt = 1; attempt <= 2; attempt++){
      try {
        if(statusEl) statusEl.textContent = `Intento ${i + 1}/${GROQ_KEYS.length} con Groq${attempt > 1 ? ' (reintentando)' : ''}...`;

        const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${GROQ_KEYS[i]}`
          },
          body: JSON.stringify({
            // meta-llama/llama-4-scout-17b-16e-instruct fue descontinuado por Groq (17-jun-2026).
            // qwen/qwen3.6-27b es el modelo vigente con soporte de visión (texto + imagen).
            model: 'qwen/qwen3.6-27b',
            messages: [{
              role: 'user',
              content: [
                { type: 'text', text: prompt },
                { type: 'image_url', image_url: { url: `data:${mimeType};base64,${imageData}` } }
              ]
            }],
            // Qwen 3.6 piensa en voz alta por defecto (bloque <think>...</think>) y con
            // pocos tokens se queda "pensando" sin nunca llegar a escribir el JSON final.
            // reasoning_effort:"none" apaga ese modo para respuestas directas y cortas.
            reasoning_effort: 'none',
            max_tokens: 500,
            temperature: 0.1
          })
        });

        if(!response.ok){
          const err = await response.json().catch(() => ({}));
          const msg = err.error?.message || `Error ${response.status}`;
          if(response.status === 429 && attempt === 1){
            // Ej: "...Please try again in 7.2375s..." — extraemos los segundos sugeridos.
            const m = msg.match(/try again in ([\d.]+)s/i);
            const waitMs = m ? Math.ceil(parseFloat(m[1]) * 1000) + 300 : 4000;
            if(statusEl) statusEl.textContent = `Límite de Groq alcanzado, esperando ${(waitMs/1000).toFixed(1)}s para reintentar...`;
            await new Promise(r => setTimeout(r, waitMs));
            continue; // reintenta con la misma key
          }
          throw new Error('Groq: ' + msg);
        }

        const data = await response.json();
        const text = data.choices?.[0]?.message?.content || '';
        // Qwen3.6 puede devolver texto de "pensamiento" (thinking mode) antes del JSON.
        // En vez de confiar en que la respuesta completa sea JSON puro, extraemos
        // el primer bloque { ... } válido, ignorando cualquier texto alrededor.
        let cleaned = text.replace(/```json|```/g, '').trim();
        const jsonStart = cleaned.indexOf('{');
        const jsonEnd = cleaned.lastIndexOf('}');
        if(jsonStart !== -1 && jsonEnd !== -1 && jsonEnd > jsonStart){
          cleaned = cleaned.slice(jsonStart, jsonEnd + 1);
        }
        const parsed = JSON.parse(cleaned);

        return {
          categoria: parsed.categoria || CATEGORIAS_GASTO[0],
          descripcion: parsed.descripcion || '',
          monto: parsed.monto || 0,
          impuestos: parsed.impuestos || 0,
          rfc: parsed.rfc || '',
          folio: parsed.folio || '',
          fecha: parsed.fecha || todayISO()
        };
      } catch(err){
        console.warn(`Groq key ${i + 1}, intento ${attempt} failed:`, err.message);
        if(i === GROQ_KEYS.length - 1){
          // "Failed to fetch" sin más detalle casi siempre es la red/CORS/una extensión
          // del navegador bloqueando la petición (no llegó respuesta del servidor).
          const pista = /Failed to fetch|NetworkError/i.test(err.message)
            ? ' (parece un bloqueo de red/CORS del navegador, no un error de Groq — revisa la pestaña Network de las herramientas de desarrollador)'
            : '';
          throw new Error(err.message + pista);
        }
        break; // pasa a la siguiente key en vez de reintentar esta misma
      }
    }
  }
}

// ========== REGLAS AUTOMÁTICAS (configurables por el administrador) ==========

// Valida el RFC de un gasto contra la lista de RFCs autorizados por
// categoría (definida en Control del Sistema > Reglas de RFC). Una lista
// vacía significa "sin restricción" para esa categoría.
function validarRfcGasto(gasto){
  const permitidos = (DB.reglasRfc && DB.reglasRfc[gasto.categoria]) || [];
  if(permitidos.length === 0) return { ok: true };
  const rfc = (gasto.rfc || '').trim().toUpperCase();
  if(!rfc){
    return { ok: false, motivo: `La categoría "${gasto.categoria}" requiere un RFC autorizado y el comprobante no trae RFC.` };
  }
  if(!permitidos.map(r => r.toUpperCase()).includes(rfc)){
    return { ok: false, motivo: `El RFC ${rfc} no está autorizado para gastos de "${gasto.categoria}". RFCs permitidos: ${permitidos.join(', ')}.` };
  }
  return { ok: true };
}

// ========== MOTOR DE REGLAS GENÉRICO ==========
// Todo lo de aquí abajo funciona para CUALQUIER módulo (Gastos hoy, Ventas/
// Inventario/etc. mañana), siempre que el módulo esté declarado en
// DB.modulos con sus campos. No hay nombres de campo de Gastos escritos a
// mano en ninguna parte de esta sección.

const NOMBRE_ROL_SISTEMA = 'Sistema (regla automática)';

// Reglas viejas (creadas antes de este motor) tenían forma plana:
// {campo, operador, valor, accion, motivo}. Las nuevas usan condiciones[]
// (para poder combinar varias con Y/O) más nivelBloqueo/etiqueta/nota
// obligatoria. Esta función adapta cualquier regla vieja al formato nuevo al
// vuelo, sin migrar nada en la base de datos — así uno y otro formato
// conviven mientras se construye el constructor visual de reglas.
function normalizaRegla(r){
  if(r.condiciones) return r; // ya está en formato nuevo

  const MIGRA_ACCION = {
    rechazar: 'rechazar_automatico',
    aprobar_automatico: 'aprobar_automatico',
    marcar_prioritario: 'etiquetar'
  };

  return {
    id: r.id,
    nombre: r.nombre,
    modulo: r.modulo || 'gastos',
    activa: r.activa !== false,
    condiciones: [{ campo: r.campo, operador: r.operador, valor: r.valor, logico: 'Y' }],
    accion: MIGRA_ACCION[r.accion] || 'etiquetar',
    etiqueta: r.accion === 'marcar_prioritario' ? 'PRIORITARIO' : (r.etiqueta || null),
    nivelBloqueo: r.accion === 'marcar_prioritario' ? 'aviso_suave' : (r.nivelBloqueo || null),
    notaObligatoria: !!r.notaObligatoria,
    motivo: r.motivo || ''
  };
}

// Busca la definición completa de un campo dentro de un módulo (tipo,
// opciones, si acepta selección múltiple...). Si no existe, regresa null y
// el resto del motor lo trata como texto por seguridad.
function campoDefModulo(moduloId, campoId){
  const campos = (DB.modulos && DB.modulos[moduloId] && DB.modulos[moduloId].campos) || [];
  return campos.find(c => c.id === campoId) || null;
}

// Evalúa UNA condición {campo, operador, valor} contra un registro
// cualquiera (gasto, venta, lo que sea), usando el tipo de dato declarado en
// el módulo para decidir cómo comparar.
function evaluaCondicion(registro, cond, moduloId){
  const campoDef = campoDefModulo(moduloId, cond.campo);
  const tipo = campoDef ? campoDef.tipo : 'texto';
  let val = registro[cond.campo];
  let comp = cond.valor;

  // Selector de varias opciones a la vez: el registro trae un arreglo, así
  // que "contiene" pregunta si esa opción está seleccionada, e "igual"
  // exige que sea la única seleccionada.
  if(campoDef && campoDef.tipo === 'selector' && campoDef.multiple){
    const seleccion = Array.isArray(val) ? val.map(v => String(v).toLowerCase()) : [];
    const compVal = String(comp ?? '').toLowerCase();
    if(cond.operador === 'contiene') return seleccion.includes(compVal);
    if(cond.operador === 'distinto') return !seleccion.includes(compVal);
    if(cond.operador === 'igual') return seleccion.length === 1 && seleccion[0] === compVal;
    return false;
  }

  if(tipo === 'numero'){
    val = parseFloat(val);
    comp = parseFloat(comp);
    if(isNaN(val) || isNaN(comp)) return false;
  } else if(tipo === 'fecha'){
    val = new Date(val).getTime();
    comp = new Date(comp).getTime();
    if(isNaN(val) || isNaN(comp)) return false;
  } else if(tipo === 'booleano'){
    val = (val === true || val === 'true' || val === 1) ? 'true' : 'false';
    comp = (comp === true || comp === 'true' || comp === 1) ? 'true' : 'false';
  } else {
    // texto, selector de una sola opción, y cualquier tipo no reconocido se
    // comparan como texto.
    val = String(val ?? '').toLowerCase();
    comp = String(comp ?? '').toLowerCase();
  }

  switch(cond.operador){
    case 'mayor_que': return val > comp;
    case 'menor_que': return val < comp;
    case 'igual': return val === comp;
    case 'distinto': return val !== comp;
    case 'contiene': return String(val).includes(String(comp));
    default: return false;
  }
}

// Evalúa una LISTA de condiciones combinadas con Y/O (el "logico" de cada
// condición conecta con la siguiente). Ej. condiciones = [
//   {campo:'categoria', operador:'igual', valor:'Viáticos', logico:'Y'},
//   {campo:'monto', operador:'mayor_que', valor:5000}
// ] se lee como "categoría = Viáticos Y monto > 5000".
function evaluaCondiciones(registro, condiciones, moduloId){
  if(!condiciones || !condiciones.length) return false;
  let resultado = evaluaCondicion(registro, condiciones[0], moduloId);
  for(let i = 1; i < condiciones.length; i++){
    const logicoPrevio = condiciones[i - 1].logico || 'Y';
    const parcial = evaluaCondicion(registro, condiciones[i], moduloId);
    resultado = (logicoPrevio === 'O') ? (resultado || parcial) : (resultado && parcial);
  }
  return resultado;
}

// Evalúa TODAS las reglas activas de un módulo contra un registro y regresa
// un resumen combinado. A diferencia del motor viejo, ya NO se detiene en la
// primera regla que aplique: varias reglas de etiqueta/aviso pueden aplicar
// a la vez (ej. un gasto puede quedar EXCEDE y ATÍPICO al mismo tiempo). Lo
// único que corta la evaluación es que una regla decida el estado del
// registro (rechazar/aprobar automático), porque ya no tiene caso seguir
// etiquetando algo que el sistema ya resolvió.
function evaluarReglasModulo(registro, moduloId){
  const NIVEL_PESO = { aviso_suave: 1, aprobacion_extra: 2, bloqueo_duro: 3 };
  const resultado = {
    etiquetas: [],
    notaObligatoria: false,
    nivelBloqueo: null,
    reglasAplicadas: [],
    accionAutomatica: null // { tipo: 'rechazar_automatico' | 'aprobar_automatico', regla }
  };

  const reglas = (DB.reglasGenerales || [])
    .map(normalizaRegla)
    .filter(r => r.activa && r.modulo === moduloId);

  for(const regla of reglas){
    if(!evaluaCondiciones(registro, regla.condiciones, moduloId)) continue;

    resultado.reglasAplicadas.push(regla);

    if(regla.accion === 'rechazar_automatico' || regla.accion === 'aprobar_automatico'){
      resultado.accionAutomatica = { tipo: regla.accion, regla };
      break;
    }

    if(regla.etiqueta) resultado.etiquetas.push(regla.etiqueta);
    if(regla.notaObligatoria) resultado.notaObligatoria = true;
    if(regla.nivelBloqueo && NIVEL_PESO[regla.nivelBloqueo] > (NIVEL_PESO[resultado.nivelBloqueo] || 0)){
      resultado.nivelBloqueo = regla.nivelBloqueo;
    }
  }

  return resultado;
}

// ========== APLICACIÓN AL MÓDULO DE GASTOS ==========
// Esta es la única parte de la sección que sabe algo de "gastos" en
// específico (la validación de RFC, y cómo traducir el resultado del motor
// en estado/historial/etiquetas de un gasto). Cuando exista un módulo de
// Ventas, su envío llamará a evaluarReglasModulo(venta, 'ventas') y
// traducirá el resultado a su manera — el motor de arriba no cambia.
function aplicarReglasAutomaticas(gasto){
  const rfcCheck = validarRfcGasto(gasto);
  if(!rfcCheck.ok){
    gasto.estado = 'rechazado';
    gasto.historial.push({
      estado: 'rechazado',
      fecha: new Date().toISOString(),
      actorId: 'sistema',
      nota: `Rechazo automático (regla de RFC): ${rfcCheck.motivo}`
    });
    return;
  }

  const resultado = evaluarReglasModulo(gasto, 'gastos');

  if(resultado.accionAutomatica){
    const { tipo, regla } = resultado.accionAutomatica;
    if(tipo === 'rechazar_automatico'){
      gasto.estado = 'rechazado';
      gasto.historial.push({
        estado: 'rechazado',
        fecha: new Date().toISOString(),
        actorId: 'sistema',
        nota: `Rechazo automático (regla "${regla.nombre}"): ${regla.motivo || 'No cumple la política configurada.'}`
      });
    } else {
      gasto.estado = 'verificado_sat';
      gasto.historial.push({
        estado: 'verificado_sat',
        fecha: new Date().toISOString(),
        actorId: 'sistema',
        nota: `Aprobado automáticamente, salta a verificación SAT (regla "${regla.nombre}"). ${regla.motivo || ''}`.trim()
      });
    }
    return;
  }

  // Sin decisión automática de estado: se guardan etiquetas, nota
  // obligatoria y nivel de bloqueo en el propio gasto para que la interfaz
  // los pueda mostrar (el panel visual de esto es el siguiente paso).
  gasto.etiquetas = resultado.etiquetas;
  gasto.notaObligatoria = resultado.notaObligatoria;
  gasto.nivelBloqueo = resultado.nivelBloqueo;
  gasto.prioritario = resultado.etiquetas.includes('PRIORITARIO'); // compat con el flag anterior

  if(resultado.reglasAplicadas.length){
    const nombres = resultado.reglasAplicadas.map(r => r.nombre || 'sin nombre').join(', ');
    const detalle = [
      resultado.etiquetas.length ? `etiquetas: ${resultado.etiquetas.join(', ')}` : null,
      resultado.nivelBloqueo ? `nivel: ${resultado.nivelBloqueo}` : null
    ].filter(Boolean).join(' — ');
    gasto.historial.push({
      estado: gasto.estado,
      fecha: new Date().toISOString(),
      actorId: 'sistema',
      nota: `Reglas aplicadas: ${nombres}${detalle ? ' — ' + detalle : ''}`
    });
  }
}

function guardarNuevoGasto(){
  const categoria = document.getElementById('mCategoria').value;
  const descripcion = document.getElementById('mDescripcion').value.trim();
  const monto = parseFloat(document.getElementById('mMonto').value) || 0;
  // Los campos opcionales (impuestos, RFC, folio) pueden no existir en el DOM
  // si el usuario no los agregó / la IA no los detectó, así que se leen con
  // encadenamiento opcional y se guardan como vacíos/0 por defecto.
  const impuestos = parseFloat(document.getElementById('mImpuestos')?.value) || 0;
  const rfc = (document.getElementById('mRFC')?.value || '').trim();
  const folio = (document.getElementById('mFolio')?.value || '').trim();
  const fecha = document.getElementById('mFecha').value;

  if(!descripcion || monto <= 0){
    toast('Completa los campos obligatorios', 'error');
    return;
  }

  // Validar presupuesto
  const presupuesto = getPresupuesto(categoria);
  const disponible = presupuesto.presupuesto - presupuesto.gastado;
  if(monto > disponible){
    toast(`Gasto excede presupuesto disponible (${money(disponible)})`, 'error');
    return;
  }

  const gasto = {
    id: uid('gas_'),
    solicitanteId: currentUser.id,
    fecha: new Date(fecha).toISOString(),
    categoria,
    descripcion,
    monto,
    impuestos,
    rfc,
    folio,
    estado: 'en_revision',
    historial: [
      { estado: 'en_revision', fecha: new Date().toISOString(), actorId: currentUser.id, nota: 'Comprobante subido y enviado para revisión' }
    ],
    verificadoSat: false,
    linkSat: '',
    documentoValidacionSat: null,
    // Comprobante (imagen JPEG comprimida o PDF en base64) — así queda disponible
    // para todo el flujo de aprobadores, no solo para la extracción con IA.
    comprobante: currentComprobante
  };

  // Reglas automáticas configuradas por el administrador (RFC por categoría
  // y reglas generales). Pueden rechazar, aprobar o marcar el gasto antes
  // de que cualquier persona lo revise.
  aplicarReglasAutomaticas(gasto);

  DB.gastos.push(gasto);
  saveDB();
  actualizarGastadoPresupuesto();

  if(gasto.estado === 'rechazado'){
    toast('El gasto fue rechazado automáticamente por una regla del sistema', 'error');
  } else if(gasto.estado === 'verificado_sat'){
    toast('Comprobante enviado — aprobado automáticamente por una regla del sistema', 'success');
  } else {
    toast('Comprobante enviado para revisión', 'success');
  }
  currentComprobante = null;
  
  setTimeout(() => {
    showSection('mis_gastos');
  }, 1500);
}

// Abre el modal de verificación en el SAT de un gasto. Se usa tanto desde
// la bandeja del contador como desde las acciones del modal de detalle.
function abrirModalVerificarSat(gastoId, onDone = () => renderSection(currentSection)){
  openModal('Verificación en SAT', `
    <div class="alert info">Sube el documento de validación del SAT (PDF o imagen) y pega el link de verificación.</div>
    <div class="field">
      <label>Documento de Validación SAT *</label>
      <div class="file-upload" id="fileUploadSat" style="margin-bottom:10px;">
        <div class="file-upload-icon">📄</div>
        <div class="file-upload-text">Arrastra el documento aquí o haz clic</div>
        <div class="file-upload-hint">PDF, JPG, PNG</div>
        <input type="file" id="fileInputSat" accept="application/pdf,image/*">
      </div>
      <div id="fileNameSat" style="font-size:12px;color:var(--teal);margin-bottom:10px;display:none;">✓ Archivo cargado</div>
    </div>
    <div class="field">
      <label>Link de Verificación (portal del SAT) *</label>
      <input type="url" id="linkSat" placeholder="https://portalfiscal.sat.gob.mx/...">
    </div>
  `, {
    wide: true,
    saveLabel: 'Marcar como Verificado',
    onSave: () => {
      const linkSat = document.getElementById('linkSat').value.trim();
      const fileNameEl = document.getElementById('fileNameSat');
      
      if(!linkSat){
        toast('Debes pegar el link de verificación del SAT', 'error');
        return;
      }
      
      if(fileNameEl.style.display === 'none'){
        toast('Debes subir el documento de validación del SAT', 'error');
        return;
      }

      const gasto = DB.gastos.find(g => g.id === gastoId);
      if(gasto){
        gasto.verificadoSat = true;
        gasto.linkSat = linkSat;
        gasto.estado = 'por_pagar';
        gasto.historial.push({
          estado: 'por_pagar',
          fecha: new Date().toISOString(),
          actorId: currentUser.id,
          nota: 'Verificado en SAT'
        });
        saveDB();
        actualizarGastadoPresupuesto();
        toast('Gasto verificado en SAT', 'success');
        closeModal();
        onDone();
      }
    }
  });

  // Manejar carga de archivo
  setTimeout(() => {
    const fileUploadSat = document.getElementById('fileUploadSat');
    const fileInputSat = document.getElementById('fileInputSat');
    const fileNameSat = document.getElementById('fileNameSat');

    fileUploadSat.addEventListener('click', () => fileInputSat.click());
    fileUploadSat.addEventListener('dragover', (e) => {
      e.preventDefault();
      fileUploadSat.style.borderColor = 'var(--amber)';
    });
    fileUploadSat.addEventListener('dragleave', () => {
      fileUploadSat.style.borderColor = 'var(--line)';
    });
    fileUploadSat.addEventListener('drop', (e) => {
      e.preventDefault();
      fileUploadSat.style.borderColor = 'var(--line)';
      if(e.dataTransfer.files.length){
        fileNameSat.textContent = '✓ ' + e.dataTransfer.files[0].name;
        fileNameSat.style.display = 'block';
      }
    });

    fileInputSat.addEventListener('change', (e) => {
      if(e.target.files.length){
        fileNameSat.textContent = '✓ ' + e.target.files[0].name;
        fileNameSat.style.display = 'block';
      }
    });
  }, 100);
}

function abrirModalMarcarPagado(gastoId, onDone = () => renderSection(currentSection)){
  openModal('Registrar Pago', `
    <div class="alert success">Confirma que el pago ha sido procesado.</div>

      <input type="text" id="refPago" placeholder="Ej. Transferencia #123456">
    </div>
  `, {
    saveLabel: 'Marcar como Pagado',
    onSave: () => {
      const refPago = document.getElementById('refPago').value.trim();
      const gasto = DB.gastos.find(g => g.id === gastoId);
      if(gasto){
        gasto.estado = 'pagado';
        gasto.historial.push({
          estado: 'pagado',
          fecha: new Date().toISOString(),
          actorId: currentUser.id,
          nota: refPago || 'Pago procesado'
        });
        saveDB();
        actualizarGastadoPresupuesto();
        toast('Pago registrado', 'success');
        closeModal();
        onDone();
      }
    }
  });
}

function attachUsuariosHandlers(){
  document.querySelectorAll('[data-edit-usuario]').forEach(btn => {
    btn.addEventListener('click', () => {
      const u = DB.usuarios.find(x => x.id === btn.dataset.editUsuario);
      if(!u) return;
      openModal(`Editar Usuario — ${u.nombre}`, formularioUsuarioHTML(u), {
        saveLabel: 'Guardar Cambios',
        onSave: () => {
          const nombre = document.getElementById('fUsrNombre').value.trim();
          const rol = document.getElementById('fUsrRol').value;
          const email = document.getElementById('fUsrEmail').value.trim();
          if(!nombre){ toast('El nombre es obligatorio', 'error'); return; }
          if(u.rol === 'admin' && rol !== 'admin' && DB.usuarios.filter(x => x.rol === 'admin').length <= 1){
            toast('No puedes quitar el rol de administrador al único administrador del sistema', 'error');
            return;
          }
          if(email !== u.email){
            toast('El correo no se puede cambiar aquí porque es la identidad de la cuenta en Firebase Authentication. Crea un usuario nuevo si necesita otro correo.', 'error');
            return;
          }
          u.nombre = nombre;
          u.rol = rol;
          saveDB();
          toast('Usuario actualizado', 'success');
          closeModal();
          renderSection('usuarios');
          if(currentUser && currentUser.id === u.id){
            currentUser = u;
            document.getElementById('sidebarUserName').textContent = currentUser.nombre;
            document.getElementById('sidebarUserRole').textContent = ROLES[currentUser.rol].label;
            renderNav();
          }
        }
      });

      setTimeout(() => {
        document.getElementById('btnResetPassword')?.addEventListener('click', async (ev) => {
          if(!u.email){ toast('Este usuario no tiene correo configurado', 'error'); return; }
          ev.target.disabled = true;
          ev.target.textContent = 'Enviando...';
          try {
            await auth.sendPasswordResetEmail(u.email);
            toast(`Correo de restablecimiento enviado a ${u.email}`, 'success');
          } catch(err){
            console.error('Error al enviar correo de restablecimiento:', err);
            toast('No se pudo enviar el correo: ' + mapAuthError(err.code), 'error');
          } finally {
            ev.target.disabled = false;
            ev.target.textContent = 'Enviar correo para restablecer contraseña';
          }
        });
      }, 0);
    });
  });

  const btnNuevo = document.getElementById('btnNuevoUsuario');
  if(btnNuevo){
    btnNuevo.addEventListener('click', () => {
      openModal('Nuevo Usuario', formularioUsuarioHTML(null), {
        saveLabel: 'Crear Usuario',
        onSave: async () => {
          const nombre = document.getElementById('fUsrNombre').value.trim();
          const rol = document.getElementById('fUsrRol').value;
          const email = document.getElementById('fUsrEmail').value.trim();
          const pin = document.getElementById('fUsrPin').value.trim();
          if(!nombre){ toast('El nombre es obligatorio', 'error'); return; }
          if(!email){ toast('El correo es obligatorio', 'error'); return; }
          if(!pin || pin.length < 6){ toast('La contraseña debe tener al menos 6 caracteres', 'error'); return; }
          if(DB.usuarios.some(x => x.email && x.email.toLowerCase() === email.toLowerCase())){
            toast('Ya existe un usuario con ese correo', 'error');
            return;
          }

          const saveBtn = document.getElementById('modalSaveBtn');
          if(saveBtn){ saveBtn.disabled = true; saveBtn.textContent = 'Creando...'; }

          try {
            // Se crea con la app secundaria de Firebase para no cerrar la
            // sesión del administrador que está dando de alta al usuario.
            await authSecondary.createUserWithEmailAndPassword(email, pin);
            await authSecondary.signOut();

            DB.usuarios.push({ id: uid('u_'), nombre, rol, email });
            saveDB();
            toast('Usuario creado', 'success');
            closeModal();
            renderSection('usuarios');
          } catch(err){
            console.error('Error al crear cuenta de usuario:', err);
            const mensajes = {
              'auth/email-already-in-use': 'Ya existe una cuenta de Firebase con ese correo.',
              'auth/invalid-email': 'El correo no es válido.',
              'auth/weak-password': 'La contraseña es muy débil (mínimo 6 caracteres).'
            };
            toast(mensajes[err.code] || 'No se pudo crear la cuenta: ' + err.message, 'error');
          } finally {
            if(saveBtn){ saveBtn.disabled = false; saveBtn.textContent = 'Crear Usuario'; }
          }
        }
      });
    });
  }
}

// ========== CONSTRUCTOR VISUAL DE MÓDULOS ==========
// Aquí el admin da de alta módulos nuevos (Ventas, Inventario, lo que sea) y
// les define sus campos. Esto solo define el "vocabulario" de un módulo —
// qué campos tiene y de qué tipo — que es justo lo que el motor de reglas
// (evaluarReglasModulo) necesita para poder armar condiciones sobre él. La
// pantalla para capturar/gestionar registros de un módulo nuevo (su propio
// listado tipo Kanban, formularios, etc.) es el siguiente paso, no este.
const TIPO_CAMPO_LABEL = { texto: 'Texto', numero: 'Número', fecha: 'Fecha', selector: 'Selector (opciones)', booleano: 'Sí / No', formula: '∑ Fórmula', referencia: '🔗 Referencia' };

// Convierte un nombre en un id de módulo/campo seguro (sin acentos, espacios
// ni mayúsculas) para usarlo como llave interna.
function slugifica(texto){
  return (texto || '')
    .toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/[^a-z0-9]+/g, '_')
    .replace(/^_+|_+$/g, '');
}

function idUnico(base, existentes){
  let id = base || 'modulo';
  let i = 2;
  while(existentes.includes(id)){
    id = `${base}_${i}`;
    i++;
  }
  return id;
}

        <div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border);">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
            <div style="font-size:11px;font-weight:700;color:var(--text-soft);text-transform:uppercase;letter-spacing:.03em;">Botones de acción del registro (además de Guardar/Eliminar)</div>
            <button class="chip-add" data-agregar-accion="${m.id}">+ Acción</button>
          </div>
          <div style="display:flex;flex-wrap:wrap;gap:6px;">
            ${(m.acciones || []).map(a => `
              <span class="chip-toggle on" style="cursor:default;">${esc(a.etiqueta)}<span style="opacity:.65;font-weight:400;"> → ${esc(a.estadoResultante)} · ${(a.roles || []).map(r => ROLES[r] ? ROLES[r].label : r).join(', ')}</span><button data-borrar-accion="${m.id}::${a.id}" style="border:none;background:none;color:inherit;cursor:pointer;padding:0 0 0 6px;font-weight:700;font-size:13px;line-height:1;" title="Quitar acción">×</button></span>
            `).join('') || '<span style="font-size:11.5px;color:var(--text-soft);">Sin botones extra — solo Guardar y Eliminar.</span>'}
          </div>
        </div>
        `}
      </div>
    `).join('')}
  </div>
  `;
}

      <div class="hint">Usa los <strong>IDs</strong> de los otros campos del módulo como variables.
        Operadores: <code>+ - * / % ^</code> · Comparaciones: <code>&lt; &gt; &lt;= &gt;= == !=</code><br>
