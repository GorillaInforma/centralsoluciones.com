// El input de "valor predeterminado" cambia de forma según el tipo elegido:
// texto libre normalmente, Sí/No para booleano, y para selector se explica
// que debe coincidir con una de las opciones (o varias, separadas por coma,
// si es de selección múltiple).
function defaultInputHTML(tipo){
  if(tipo === 'booleano'){
    return `<select id="cfDefault"><option value="">Sin definir</option><option value="false">No</option><option value="true">Sí</option></select>`;
  }
  if(tipo === 'selector'){
    return `<input type="text" id="cfDefault" placeholder="Debe coincidir con una opción (o varias, separadas por coma, si es de selección múltiple)">`;
  }
  if(tipo === 'fecha'){
    return `<input type="date" id="cfDefault">`;
  }
  return `<input type="text" id="cfDefault" placeholder="Se precarga al abrir el formulario">`;
}

function attachModulosTabHandlers(){
  const btnNuevo = document.getElementById('btnNuevoModulo');
  if(btnNuevo){
    btnNuevo.addEventListener('click', () => {
      openModal('Nuevo Módulo', `
        <div class="field">
          <label>Nombre del módulo</label>
          <input type="text" id="mdNombre" placeholder="Ej. Ventas, Inventario, Nómina...">
        </div>
        <div class="field">
          <label>Ícono (un emoji, opcional)</label>
          <input type="text" id="mdIcono" placeholder="Ej. 💰" maxlength="2">
        </div>
      `, {
        saveLabel: 'Crear Módulo',
        onSave: () => {
          const nombre = document.getElementById('mdNombre').value.trim();
          const icono = document.getElementById('mdIcono').value.trim();
          if(!nombre){ toast('Escribe un nombre para el módulo', 'error'); return; }
          const id = idUnico(slugifica(nombre) || 'modulo', Object.keys(DB.modulos || {}));
          if(!DB.modulos) DB.modulos = {};
          DB.modulos[id] = {
            id, nombre, icono, campos: [],
            permisos: { ver: ['admin'], crear: ['admin'], editar: ['admin'], eliminar: ['admin'] },
            acciones: []
          };
          saveDB();
          toast('Módulo creado. Ahora agrégale sus campos.', 'success');
          closeModal();
          document.getElementById('controlTabContent').innerHTML = renderControlTabContent();
          attachControlTabHandlers();
        }
      });
    });
  }

  document.querySelectorAll('[data-borrar-modulo]').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.borrarModulo;
      const enUso = (DB.reglasGenerales || []).some(r => (r.modulo || 'gastos') === id);
      const advertencia = enUso ? ' Hay reglas configuradas para este módulo que dejarán de aplicar.' : '';
      if(!confirm(`¿Eliminar este módulo y todos sus campos?${advertencia}`)) return;
      delete DB.modulos[id];
      saveDB();
      document.getElementById('controlTabContent').innerHTML = renderControlTabContent();
      attachControlTabHandlers();
      toast('Módulo eliminado', 'success');
    });
  });

  document.querySelectorAll('[data-borrar-campo]').forEach(btn => {
    btn.addEventListener('click', () => {
      const [moduloId, campoId] = btn.dataset.borrarCampo.split('::');
      const modulo = DB.modulos[moduloId];
      if(!modulo) return;
      modulo.campos = (modulo.campos || []).filter(c => c.id !== campoId);
      saveDB();
      document.getElementById('controlTabContent').innerHTML = renderControlTabContent();
      attachControlTabHandlers();
      toast('Campo eliminado', 'success');
    });
  });

  document.querySelectorAll('[data-agregar-campo]').forEach(btn => {
    btn.addEventListener('click', () => {
      const moduloId = btn.dataset.agregarCampo;
      openModal('Nuevo Campo', formularioCampoHTML(), {
        saveLabel: 'Agregar Campo',
        onSave: () => {
          const label = document.getElementById('cfLabel').value.trim();
          const tipo = document.getElementById('cfTipo').value;
          const opciones = (document.getElementById('cfOpciones').value || '')
            .split(',').map(o => o.trim()).filter(Boolean);
          const multiple = tipo === 'selector' && document.getElementById('cfMultiple').checked;
          if(!label){ toast('Escribe el nombre del campo', 'error'); return; }
          if(tipo === 'selector' && !opciones.length){ toast('Agrega al menos una opción para el selector', 'error'); return; }
          if(tipo === 'formula'){
            const expr = (document.getElementById('cfExpresion').value || '').trim();
            if(!expr){ toast('Escribe la expresión de la fórmula', 'error'); return; }
            const { error } = evaluarFormula(expr, {});
            // Solo bloquear si hay error de parseo, no si el resultado es negativo con valores vacíos
            if(error && !error.includes('indefinido') && !error.includes('desconocida')){ /* dejar pasar */ }
          }
          if(tipo === 'referencia'){
            const modRef = document.getElementById('cfModuloRef') && document.getElementById('cfModuloRef').value;
            if(!modRef){ toast('Elige el módulo al que hace referencia', 'error'); return; }
          }

          const modulo = DB.modulos[moduloId];
          const id = idUnico(slugifica(label) || 'campo', (modulo.campos || []).map(c => c.id));
          modulo.campos = modulo.campos || [];

          const nuevoCampo = { id, label, tipo };
          if(tipo === 'selector'){
            nuevoCampo.opciones = opciones;
            nuevoCampo.multiple = multiple;
          }
          if(tipo === 'formula'){
            nuevoCampo.expresion = (document.getElementById('cfExpresion').value || '').trim();
            nuevoCampo.default = null;
          }
          if(tipo === 'referencia'){
            nuevoCampo.moduloReferencia = document.getElementById('cfModuloRef').value;
            nuevoCampo.campoDisplay = document.getElementById('cfCampoDisplay') ? document.getElementById('cfCampoDisplay').value : '';
            // Recoger las filas de "jalar" desde el DOM
            const jalarFilasDOM = [];
            document.querySelectorAll('[data-jalar-row]').forEach(row => {
              const origenSel  = row.querySelector('[data-jalar-origen]');
              const destinoSel = row.querySelector('[data-jalar-destino]');
              if(origenSel && destinoSel && origenSel.value && destinoSel.value){
                jalarFilasDOM.push({ campoOrigen: origenSel.value, campoDestino: destinoSel.value });
              }
            });
            nuevoCampo.camposJalar = jalarFilasDOM;
            nuevoCampo.default = null;
          }

          // El valor por default siempre queda como un valor concreto (nunca
          // "undefined"): Firestore rechaza cualquier campo con undefined.
          if(tipo !== 'formula' && tipo !== 'referencia'){
            const defaultRaw = (document.getElementById('cfDefault').value || '').trim();
            if(tipo === 'booleano'){
              nuevoCampo.default = defaultRaw === 'true' ? true : (defaultRaw === 'false' ? false : null);
            } else if(tipo === 'selector' && multiple){
              nuevoCampo.default = defaultRaw ? defaultRaw.split(',').map(s => s.trim()).filter(Boolean) : [];
            } else {
              nuevoCampo.default = defaultRaw || null;
            }
          }

          modulo.campos.push(nuevoCampo);
          saveDB();
          toast('Campo agregado', 'success');
          closeModal();
          document.getElementById('controlTabContent').innerHTML = renderControlTabContent();
          attachControlTabHandlers();
        }
      });
      // Mostrar/ocultar secciones según el tipo elegido
      const tipoSelect = document.getElementById('cfTipo');
      const opcionesWrap = document.getElementById('cfOpcionesWrap');
      const formulaWrap  = document.getElementById('cfFormulaWrap');
      const refWrap      = document.getElementById('cfReferenciaWrap');
      const defaultWrap  = document.getElementById('cfDefaultWrap');

      const actualizarPaneles = () => {
        const t = tipoSelect.value;
        opcionesWrap.style.display = t === 'selector'    ? '' : 'none';
        formulaWrap.style.display  = t === 'formula'     ? '' : 'none';
        refWrap.style.display      = t === 'referencia'  ? '' : 'none';
        defaultWrap.style.display  = (t === 'formula' || t === 'referencia') ? 'none' : '';
        document.getElementById('cfDefaultInner').innerHTML = defaultInputHTML(t);
      };
      tipoSelect.addEventListener('change', actualizarPaneles);
      actualizarPaneles();

      // Preview en vivo de la fórmula
      const exprInput = document.getElementById('cfExpresion');
      const previewEl = document.getElementById('cfFormulaPreview');
      if(exprInput){
        const campos = (DB.modulos[moduloId] && DB.modulos[moduloId].campos) || [];
        const mockVals = {};
        campos.filter(c => c.tipo === 'numero').forEach(c => { mockVals[c.id] = 1; });
        exprInput.addEventListener('input', () => {
          if(!exprInput.value.trim()){ previewEl.textContent = ''; return; }
          const { valor, error, invalido } = evaluarFormula(exprInput.value, mockVals);
          if(error){
            previewEl.innerHTML = `<span style="color:var(--rose);">⚠ ${esc(error)}</span>`;
          } else if(invalido){
            previewEl.innerHTML = `<span style="color:var(--rose);">⚠ INVÁLIDO (resultado negativo)</span>`;
          } else {
            previewEl.innerHTML = `<span style="color:var(--teal);">✓ Ejemplo con valores=1: <strong>${valor}</strong></span>`;
          }
        });
      }

      // Lógica de referencia: al cambiar el módulo ref, cargar sus campos
      const modRefSel = document.getElementById('cfModuloRef');
      const refDisplayWrap = document.getElementById('cfRefDisplayWrap');
      const jalarWrap = document.getElementById('cfJalarWrap');
      let jalarFilas = []; // [{ origen: '', destino: '' }]

      const renderJalarFilas = () => {
        const modRefId = modRefSel.value;
        const modRef = DB.modulos && DB.modulos[modRefId];
        const camposOrigen = modRef ? (modRef.campos || []) : [];
        const camposDestino = (DB.modulos[moduloId] && DB.modulos[moduloId].campos || []).filter(c => c.tipo === 'numero' || c.tipo === 'texto');
        document.getElementById('cfJalarFilas').innerHTML = jalarFilas.map((f, i) => `
          <div style="display:flex;gap:8px;align-items:center;margin-bottom:6px;" data-jalar-row="${i}">
            <select data-jalar-origen="${i}" style="flex:1;font-size:12px;padding:6px 8px;border:1px solid var(--line);border-radius:6px;">
              <option value="">Campo origen</option>
              ${camposOrigen.map(c => `<option value="${esc(c.id)}" ${c.id===f.origen?'selected':''}>${esc(c.label)}</option>`).join('')}
            </select>
            <span style="font-size:12px;color:var(--text-soft);">→ llenar</span>
            <select data-jalar-destino="${i}" style="flex:1;font-size:12px;padding:6px 8px;border:1px solid var(--line);border-radius:6px;">
              <option value="">Campo destino</option>
              ${camposDestino.map(c => `<option value="${esc(c.id)}" ${c.id===f.destino?'selected':''}>${esc(c.label)}</option>`).join('')}
            </select>
            <button type="button" data-jalar-quitar="${i}" style="border:none;background:none;color:var(--rose);font-size:16px;cursor:pointer;line-height:1;">×</button>
          </div>
        `).join('') || '<div style="font-size:11.5px;color:var(--text-soft);">Sin campos a jalar todavía.</div>';

        document.querySelectorAll('[data-jalar-origen]').forEach(el => {
          el.addEventListener('change', () => { jalarFilas[el.dataset.jalarOrigen].origen = el.value; });
        });
        document.querySelectorAll('[data-jalar-destino]').forEach(el => {
          el.addEventListener('change', () => { jalarFilas[el.dataset.jalarDestino].destino = el.value; });
        });
        document.querySelectorAll('[data-jalar-quitar]').forEach(el => {
          el.addEventListener('click', () => { jalarFilas.splice(parseInt(el.dataset.jalarQuitar,10),1); renderJalarFilas(); });
        });
      };

      const actualizarModRef = () => {
        const modRefId = modRefSel.value;
        const modRef = DB.modulos && DB.modulos[modRefId];
        const campos = modRef ? (modRef.campos || []) : [];
        refDisplayWrap.style.display = modRefId ? '' : 'none';
        jalarWrap.style.display = modRefId ? '' : 'none';
        const displaySel = document.getElementById('cfCampoDisplay');
        displaySel.innerHTML = campos.map(c => `<option value="${esc(c.id)}">${esc(c.label)}</option>`).join('');
        renderJalarFilas();
      };
      modRefSel.addEventListener('change', actualizarModRef);
      actualizarModRef();

      document.getElementById('cfAgregarJalar').addEventListener('click', () => {
        jalarFilas.push({ origen: '', destino: '' });
        renderJalarFilas();
      });
    });
  });

  // Matriz de permisos: cada botón es un toggle "¿este rol puede hacer esta
  // acción en este módulo?".
  document.querySelectorAll('[data-modperm]').forEach(btn => {
    btn.addEventListener('click', () => {
      const [moduloId, accion, rol] = btn.dataset.modperm.split('::');
      const modulo = DB.modulos[moduloId];
      if(!modulo) return;
      if(!modulo.permisos) modulo.permisos = { ver: [], crear: [], editar: [], eliminar: [] };
      if(!modulo.permisos[accion]) modulo.permisos[accion] = [];
      const idx = modulo.permisos[accion].indexOf(rol);
      if(idx === -1) modulo.permisos[accion].push(rol);
      else modulo.permisos[accion].splice(idx, 1);
      saveDB();
      btn.classList.toggle('on');
      if(currentUser) renderNav();
    });
  });

  document.querySelectorAll('[data-borrar-accion]').forEach(btn => {
    btn.addEventListener('click', () => {
      const [moduloId, accionId] = btn.dataset.borrarAccion.split('::');
      const modulo = DB.modulos[moduloId];
      if(!modulo) return;
      modulo.acciones = (modulo.acciones || []).filter(a => a.id !== accionId);
      saveDB();
      document.getElementById('controlTabContent').innerHTML = renderControlTabContent();
      attachControlTabHandlers();
      toast('Acción eliminada', 'success');
    });
  });

  document.querySelectorAll('[data-agregar-accion]').forEach(btn => {
    btn.addEventListener('click', () => {
      const moduloId = btn.dataset.agregarAccion;
      const modulo = DB.modulos[moduloId];
      const camposNumero = (modulo.campos || []).filter(c => c.tipo === 'numero');

      openModal('Nuevo Botón de Acción', `
        <div class="field">
          <label>Tipo de acción</label>
          <select id="acTipo">
            ${Object.entries(TIPOS_ACCION).map(([key, t]) => `<option value="${key}">${t.label}</option>`).join('')}
          </select>
        </div>
        <div class="field-row">
          <div class="field">
            <label>Texto del botón</label>
            <input type="text" id="acEtiqueta" placeholder="Ej. Marcar como pagado">
          </div>
          <div class="field">
            <label>Estado que deja al registro</label>
            <input type="text" id="acEstado" placeholder="Ej. pagado">
          </div>
        </div>
        <div class="field" id="acMontoWrap">
          <label>Campo numérico que acumula (opcional)</label>
          <select id="acCampoMonto">
            <option value="">Ninguno</option>
            ${camposNumero.map(c => `<option value="${esc(c.id)}">${esc(c.label)}</option>`).join('')}
          </select>
          ${!camposNumero.length ? '<div style="font-size:11px;color:var(--text-soft);margin-top:4px;">Este módulo no tiene campos numéricos todavía.</div>' : ''}
        </div>
        <div class="field">
          <label>¿Quién puede usar este botón?</label>
          <div style="display:flex;flex-wrap:wrap;gap:6px;">
            ${Object.keys(ROLES).map(r => `
              <label style="display:flex;align-items:center;gap:4px;font-size:12px;border:1px solid var(--border);padding:4px 9px;border-radius:20px;">
                <input type="checkbox" value="${r}" class="acRolCheck" style="width:auto;"> ${ROLES[r].label}
              </label>
            `).join('')}
          </div>
        </div>
        <label style="display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--text);margin-top:8px;">
          <input type="checkbox" id="acNota" style="width:auto;"> Pedir una nota obligatoria al usar este botón
        </label>
      `, {
        wide: true,
        saveLabel: 'Crear Botón',
        onSave: () => {
          const tipo = document.getElementById('acTipo').value;
          const etiqueta = document.getElementById('acEtiqueta').value.trim() || TIPOS_ACCION[tipo].label;
          const estadoResultante = document.getElementById('acEstado').value.trim() || TIPOS_ACCION[tipo].estadoDefault;
          const campoMonto = document.getElementById('acCampoMonto').value || null;
          const roles = Array.from(document.querySelectorAll('.acRolCheck:checked')).map(c => c.value);
          const notaObligatoria = document.getElementById('acNota').checked;
          if(!roles.length){ toast('Elige al menos un rol que pueda usar este botón', 'error'); return; }

          modulo.acciones = modulo.acciones || [];
          modulo.acciones.push({ id: uid('accion_'), tipo, etiqueta, estadoResultante, campoMonto, roles, notaObligatoria });
          saveDB();
          toast('Botón de acción agregado', 'success');
          closeModal();
          document.getElementById('controlTabContent').innerHTML = renderControlTabContent();
          attachControlTabHandlers();
        }
      });

      document.getElementById('acTipo').addEventListener('change', (e) => {
        document.getElementById('acEstado').value = TIPOS_ACCION[e.target.value].estadoDefault;
      });
      document.getElementById('acEstado').value = TIPOS_ACCION[document.getElementById('acTipo').value].estadoDefault;
    });
  });
}

function campoLabelDe(moduloId, campoId){
  const campos = (DB.modulos && DB.modulos[moduloId] && DB.modulos[moduloId].campos) || [];
  const c = campos.find(c => c.id === campoId);
  return c ? c.label : campoId;
}

const NIVEL_BLOQUEO_LABEL = { aviso_suave: 'Aviso suave', aprobacion_extra: 'Requiere aprobación extra', bloqueo_duro: 'Bloqueo duro' };

// ========== PANTALLA GENÉRICA POR MÓDULO ==========
// Cualquier módulo creado desde "Módulos" (Control del Sistema) obtiene,
// gratis, un listado + formulario de alta armado a partir de sus campos —
// sin que nadie tenga que escribir una pantalla nueva para cada giro de
// negocio. Los registros se guardan en DB.registros[moduloId] y pasan por
// el mismo motor de reglas genérico que usa Gastos (evaluarReglasModulo).

// ========== MOTOR DE FÓRMULAS ==========
// Evalúa una expresión de fórmula con los valores actuales del formulario.
// Soporta: +, -, *, /, %, ^, paréntesis, abs, round, floor, ceil, min, max,
// if(cond, si_verdadero, si_falso), suma(...), promedio(...), y más.
// Devuelve { valor: number|string, error: string|null, invalido: bool }

const FORMULA_FNS = {
  // Matemáticas básicas
  abs:      ([x]) => Math.abs(x),
  round:    ([x, d=0]) => Number(Math.round(Number(x + 'e+' + d)) + 'e-' + d),
  floor:    ([x, d=0]) => { const f = Math.pow(10, d); return Math.floor(x * f) / f; },
  ceil:     ([x, d=0]) => { const f = Math.pow(10, d); return Math.ceil(x * f) / f; },
  trunc:    ([x]) => Math.trunc(x),
  sqrt:     ([x]) => Math.sqrt(x),
  pow:      ([x, y]) => Math.pow(x, y),
  log:      ([x]) => Math.log(x),
  log10:    ([x]) => Math.log10(x),
  exp:      ([x]) => Math.exp(x),
  sign:     ([x]) => Math.sign(x),
  mod:      ([x, y]) => x % y,

  // Comparación y lógica
  min:      (args) => Math.min(...args),
  max:      (args) => Math.max(...args),
  clamp:    ([x, mn, mx]) => Math.min(mx, Math.max(mn, x)),
  entre:    ([x, a, b]) => (x >= a && x <= b) ? 1 : 0,

  // Condicional
  if:       ([cond, a, b]) => (cond ? a : b),
  ifthen:   ([cond, a, b]) => (cond ? a : b),
  iif:      ([cond, a, b]) => (cond ? a : b),

  // Agregados (sobre lista de args)
  suma:     (args) => args.reduce((a, b) => a + b, 0),
  promedio: (args) => args.length ? args.reduce((a, b) => a + b, 0) / args.length : 0,
  media:    (args) => args.length ? args.reduce((a, b) => a + b, 0) / args.length : 0,
  conteo:   (args) => args.filter(x => x !== null && x !== '' && !isNaN(x)).length,
  contar:   (args) => args.filter(x => x !== null && x !== '' && !isNaN(x)).length,

  // Financieras / comerciales
  iva:      ([monto, tasa=16]) => monto * (tasa / 100),
  neto:     ([total, tasa=16]) => total / (1 + tasa / 100),
  bruto:    ([neto, tasa=16]) => neto * (1 + tasa / 100),
  descuento:([monto, pct]) => monto - monto * (pct / 100),
  comision: ([monto, pct]) => monto * (pct / 100),
  margen:   ([costo, precio]) => precio ? ((precio - costo) / precio) * 100 : 0,
  utilidad: ([costo, precio]) => precio - costo,
  precio_con_margen: ([costo, margen]) => margen < 100 ? costo / (1 - margen / 100) : 0,
  interes:  ([capital, tasa, periodos]) => capital * (tasa / 100) * periodos,
  interes_compuesto: ([capital, tasa, n]) => capital * Math.pow(1 + tasa / 100, n) - capital,

  // Redondeo monetario
  redondear2: ([x]) => Math.round(x * 100) / 100,
  redondear0: ([x]) => Math.round(x),

  // Validadores (devuelven 1/0 para usar en if())
  es_positivo: ([x]) => x > 0 ? 1 : 0,
  es_negativo: ([x]) => x < 0 ? 1 : 0,
  es_cero:     ([x]) => x === 0 ? 1 : 0,
  es_invalido: ([x]) => (isNaN(x) || x === null || x === '') ? 1 : 0,
};

// Constantes disponibles en fórmulas
const FORMULA_CONSTS = {
  PI: Math.PI,
  E: Math.E,
  IVA: 16,        // IVA México por defecto
  CERO: 0,
};

// Tokeniza la expresión: números, ids (campos/funciones), ops, comas, parens
function formulaTokenize(expr){
  const tokens = [];
  let i = 0;
  while(i < expr.length){
    if(/\s/.test(expr[i])){ i++; continue; }
    // Números
    if(/[\d.]/.test(expr[i])){
      let num = '';
      while(i < expr.length && /[\d.]/.test(expr[i])) num += expr[i++];
      tokens.push({ type: 'NUM', val: parseFloat(num) });
      continue;
    }
    // Identificadores (campos, funciones, constantes)
    if(/[a-zA-Z_áéíóúÁÉÍÓÚüÜñÑ]/.test(expr[i])){
      let id = '';
      while(i < expr.length && /[a-zA-Z0-9_áéíóúÁÉÍÓÚüÜñÑ]/.test(expr[i])) id += expr[i++];
      tokens.push({ type: 'ID', val: id });
      continue;
    }
    // Operadores de dos caracteres
    if(i+1 < expr.length){
      const two = expr[i] + expr[i+1];
      if(['<=','>=','!=','==','**'].includes(two)){
        tokens.push({ type: 'OP', val: two });
        i += 2; continue;
      }
    }
    // Operadores de un carácter
    if('+-*/%^<>(),.'.includes(expr[i])){
      tokens.push({ type: expr[i] === '(' ? 'LPAREN' : expr[i] === ')' ? 'RPAREN' : expr[i] === ',' ? 'COMMA' : 'OP', val: expr[i] });
      i++; continue;
    }
    i++; // ignorar char desconocido
  }
  return tokens;
}

// Parser recursivo descendente simple
// Gramática: expr = term (('+' | '-') term)*
//            term = power (('*' | '/' | '%') power)*
//            power = unary ('^' | '**') unary
//            unary = '-' unary | primary
//            primary = NUM | ID '(' args ')' | ID | '(' expr ')'
function formulaParse(tokens){
  let pos = 0;
  function peek(){ return tokens[pos]; }
  function consume(){ return tokens[pos++]; }
  function expect(type){ const t = consume(); if(t && t.type === type) return t; throw new Error('Esperado ' + type); }

  function parseExpr(){ return parseComparison(); }

  function parseComparison(){
    let left = parseAddSub();
    const t = peek();
    if(t && t.type === 'OP' && ['<','>','<=','>=','==','!='].includes(t.val)){
      consume();
      const right = parseAddSub();
      const op = t.val;
      return () => {
        const l = left(), r = right();
        if(op==='<') return l < r ? 1 : 0;
        if(op==='>') return l > r ? 1 : 0;
        if(op==='<=') return l <= r ? 1 : 0;
        if(op==='>=') return l >= r ? 1 : 0;
        if(op==='==' || op==='=') return l === r ? 1 : 0;
        if(op==='!=') return l !== r ? 1 : 0;
        return 0;
      };
    }
    return left;
  }

  function parseAddSub(){
    let left = parseMulDiv();
    while(peek() && peek().type === 'OP' && ['+','-'].includes(peek().val)){
      const op = consume().val;
      const right = parseMulDiv();
      const l2 = left;
      left = op === '+' ? () => l2() + right() : () => l2() - right();
    }
    return left;
  }

  function parseMulDiv(){
    let left = parsePower();
    while(peek() && peek().type === 'OP' && ['*','/','%'].includes(peek().val)){
      const op = consume().val;
      const right = parsePower();
      const l2 = left;
      if(op==='*') left = () => l2() * right();
      else if(op==='/') left = () => { const d = right(); return d === 0 ? 0 : l2() / d; };
      else left = () => l2() % right();
    }
    return left;
  }

  function parsePower(){
    let base = parseUnary();
    if(peek() && peek().type === 'OP' && (peek().val==='^'||peek().val==='**')){
      consume();
      const exp = parseUnary();
      return () => Math.pow(base(), exp());
    }
    return base;
  }

  function parseUnary(){
    if(peek() && peek().type === 'OP' && peek().val === '-'){
      consume();
      const inner = parsePrimary();
      return () => -inner();
    }
    return parsePrimary();
  }

  function parsePrimary(){
    const t = peek();
    if(!t) throw new Error('Expresión incompleta');

    // Número literal
    if(t.type === 'NUM'){ consume(); return () => t.val; }

    // Identificador: función o campo o constante
    if(t.type === 'ID'){
      consume();
      const name = t.val.toLowerCase();
      // ¿es función?
      if(peek() && peek().type === 'LPAREN'){
        consume(); // (
        const args = [];
        while(!(peek() && peek().type === 'RPAREN')){
          args.push(parseExpr());
          if(peek() && peek().type === 'COMMA') consume();
        }
        consume(); // )
        return (valoresActuales) => {
          const fn = FORMULA_FNS[name];
          if(!fn) throw new Error('Función desconocida: ' + name);
          return fn(args.map(a => a(valoresActuales)));
        };
      }
      // ¿es constante?
      const nameUpper = t.val.toUpperCase();
      if(FORMULA_CONSTS[nameUpper] !== undefined){
        const c = FORMULA_CONSTS[nameUpper];
        return () => c;
      }
      // es nombre de campo
      return (valoresActuales) => {
        const v = valoresActuales && valoresActuales[name];
        const n = parseFloat(v);
        return isNaN(n) ? 0 : n;
      };
    }

    // Paréntesis
    if(t.type === 'LPAREN'){
      consume();
      const inner = parseExpr();
      expect('RPAREN');
      return inner;
    }

    throw new Error('Token inesperado: ' + (t && t.val));
  }

  const ast = parseExpr();
  return ast;
}

// Evalúa la fórmula de un campo dado los valores actuales del formulario.
// valoresActuales = { campoId: valorNumerico, ... }
// Devuelve { valor, error, invalido }
function evaluarFormula(expresion, valoresActuales){
  try {
    const expr = (expresion || '').trim();
    if(!expr) return { valor: null, error: 'Fórmula vacía', invalido: true };
    const tokens = formulaTokenize(expr);
    const ast = formulaParse(tokens);
    const resultado = ast(valoresActuales);
    // Regla: si el resultado es < 0 o NaN → inválido
    if(typeof resultado === 'number' && isNaN(resultado)){
      return { valor: null, error: 'El resultado es indefinido (división por cero u otro error)', invalido: true };
    }
    const invalido = typeof resultado === 'number' && resultado < 0;
    return { valor: resultado, error: null, invalido };
  } catch(e){
    return { valor: null, error: e.message || 'Error en la fórmula', invalido: true };
  }
}

// Lee todos los valores numéricos del formulario activo (data-campo-valor)
function leerValoresFormulario(contenedor){
  const vals = {};
  contenedor.querySelectorAll('[data-campo-valor]').forEach(el => {
    const id = el.dataset.campoValor;
    const n = parseFloat(el.value);
    vals[id] = isNaN(n) ? 0 : n;
  });
  return vals;
}

// Recalcula todos los campos fórmula del formulario cuando algo cambia
function recalcularFormulas(contenedor, campos){
  const vals = leerValoresFormulario(contenedor);
  campos.filter(c => c.tipo === 'formula').forEach(c => {
    const display = contenedor.querySelector(`[data-formula-display="${c.id}"]`);
    const hidden  = contenedor.querySelector(`[data-campo-valor="${c.id}"]`);
    if(!display || !hidden) return;
    const { valor, error, invalido } = evaluarFormula(c.expresion || '', vals);
    if(invalido || error){
      display.textContent = 'INVÁLIDO';
      display.style.color = 'var(--rose)';
      display.style.fontWeight = '700';
      hidden.value = '';
    } else {
      const v = typeof valor === 'number' ? (Number.isInteger(valor) ? valor : Math.round(valor * 100) / 100) : valor;
      display.textContent = v;
      display.style.color = 'var(--teal)';
      display.style.fontWeight = '700';
      hidden.value = v;
    }
  });
}

// Engancha los listeners para que las fórmulas se recalculen en tiempo real
function attachFormulaListeners(contenedor, campos){
  if(!campos.some(c => c.tipo === 'formula')) return;
  contenedor.querySelectorAll('[data-campo-valor]').forEach(el => {
    if(el.dataset.campoFormula === 'si') return; // es el hidden de una fórmula, no escuchar
    el.addEventListener('input', () => recalcularFormulas(contenedor, campos));
    el.addEventListener('change', () => recalcularFormulas(contenedor, campos));
  });
  // Calcular inmediatamente al abrir el formulario
  recalcularFormulas(contenedor, campos);
}

// Enganche para campo referencia: al cambiar el select, rellena los campos vinculados
function attachReferenciaListeners(contenedor, campos, moduloId){
  campos.filter(c => c.tipo === 'referencia').forEach(c => {
    const sel = contenedor.querySelector(`[data-campo-valor="${c.id}"]`);
    if(!sel) return;
    sel.addEventListener('change', () => {
      const registros = (DB.registros && DB.registros[c.moduloReferencia]) || [];
      const reg = registros.find(r => r.id === sel.value);
      if(!reg) return;
      (c.camposJalar || []).forEach(({ campoOrigen, campoDestino }) => {
        const dest = contenedor.querySelector(`[data-campo-valor="${campoDestino}"]`);
        if(dest && reg[campoOrigen] !== undefined){
          dest.value = reg[campoOrigen];
          dest.dispatchEvent(new Event('input'));
        }
      });
    });
  });
}

function inputParaCampo(campo, valorInicial){
  // Si no se pasa un valor explícito (formulario nuevo), se precarga con el
  // "default" configurado en el campo — para eso distinguimos undefined
  // (no vino nada) de null/''/false (sí vino, pero está vacío).
  const val = (valorInicial !== undefined) ? valorInicial : campo.default;

  if(campo.tipo === 'numero'){
    return `<input type="number" step="any" data-campo-valor="${campo.id}" value="${esc(val === null || val === undefined ? '' : String(val))}" placeholder="${esc(campo.label)}">`;
  }
  if(campo.tipo === 'fecha'){
    return `<input type="date" data-campo-valor="${campo.id}" value="${esc(val || '')}">`;
  }
  if(campo.tipo === 'booleano'){
    const esSi = val === true || val === 'true';
    return `<select data-campo-valor="${campo.id}"><option value="false" ${!esSi ? 'selected' : ''}>No</option><option value="true" ${esSi ? 'selected' : ''}>Sí</option></select>`;
  }
  if(campo.tipo === 'selector' && campo.multiple){
    const seleccion = Array.isArray(val) ? val : [];
    return `<div data-campo-valor-multi="${campo.id}" style="display:flex;flex-wrap:wrap;gap:6px;">
      ${(campo.opciones || []).map(o => `
        <label style="display:flex;align-items:center;gap:5px;font-size:12px;border:1px solid var(--border);padding:4px 9px;border-radius:20px;">
          <input type="checkbox" value="${esc(o)}" ${seleccion.includes(o) ? 'checked' : ''} style="width:auto;"> ${esc(o)}
        </label>
      `).join('')}
    </div>`;
  }
  if(campo.tipo === 'selector'){
    return `<select data-campo-valor="${campo.id}">${(campo.opciones || []).map(o => `<option value="${esc(o)}" ${o === val ? 'selected' : ''}>${esc(o)}</option>`).join('')}</select>`;
  }
  // Campo fórmula: input oculto que guarda el valor calculado + span visible
  if(campo.tipo === 'formula'){
    const expr = campo.expresion || '';
    return `<div style="display:flex;align-items:center;gap:10px;padding:8px 11px;background:var(--paper);border:1px solid var(--line);border-radius:8px;">
      <span data-formula-display="${campo.id}" style="font-family:'IBM Plex Mono',monospace;font-size:15px;font-weight:700;color:var(--teal);min-width:80px;">—</span>
      <span style="font-size:11px;color:var(--text-soft);">= ${esc(expr)}</span>
      <input type="hidden" data-campo-valor="${campo.id}" data-campo-formula="si" value="">
    </div>`;
  }
  // Campo referencia: select que lista los registros del módulo referenciado
  if(campo.tipo === 'referencia'){
    const modRef = DB.modulos && DB.modulos[campo.moduloReferencia];
    const registros = (DB.registros && DB.registros[campo.moduloReferencia]) || [];
    const campoDisplay = campo.campoDisplay || (modRef && modRef.campos && modRef.campos[0] && modRef.campos[0].id) || 'id';
    const opts = registros.map(r => {
      const label = r[campoDisplay] !== undefined ? String(r[campoDisplay]) : r.id;
      return `<option value="${esc(r.id)}" ${r.id === val ? 'selected' : ''}>${esc(label)}</option>`;
    }).join('');
    return `<select data-campo-valor="${campo.id}">
      <option value="">— Seleccionar ${esc(modRef ? modRef.nombre : campo.moduloReferencia)} —</option>
      ${opts}
    </select>`;
  }
  return `<input type="text" data-campo-valor="${campo.id}" value="${esc(val === null || val === undefined ? '' : String(val))}" placeholder="${esc(campo.label)}">`;
}

function formateaValorCampo(valor, campo){
  if(campo.tipo === 'booleano') return (valor === true || valor === 'true') ? 'Sí' : 'No';
  if(Array.isArray(valor)) return valor.length ? valor.join(', ') : '—';
  if(valor === undefined || valor === null || valor === '') return '—';
  if(campo.tipo === 'formula'){
    const n = parseFloat(valor);
    if(isNaN(n)) return '—';
    return n < 0 ? '⚠ INVÁLIDO' : String(Math.round(n * 100) / 100);
  }
  if(campo.tipo === 'referencia'){
    // Muestra el valor de campoDisplay del registro referenciado
    const registros = (DB.registros && DB.registros[campo.moduloReferencia]) || [];
    const modRef = DB.modulos && DB.modulos[campo.moduloReferencia];
    const campoDisplay = campo.campoDisplay || (modRef && modRef.campos && modRef.campos[0] && modRef.campos[0].id) || 'id';
    const reg = registros.find(r => r.id === valor);
    return reg ? String(reg[campoDisplay] || reg.id) : String(valor);
  }
  return String(valor);
}

function renderModuloGenerico(moduloId){
  const modulo = DB.modulos && DB.modulos[moduloId];
  if(!modulo) return '<div class="empty">Este módulo ya no existe.</div>';
  if(!tienePermisoModulo(currentUser, moduloId, 'ver')) return '<div class="empty">No tienes permiso para ver este módulo.</div>';

  const puedeCrear = tienePermisoModulo(currentUser, moduloId, 'crear');
  const puedeEliminar = tienePermisoModulo(currentUser, moduloId, 'eliminar');
  const registros = (DB.registros && DB.registros[moduloId]) || [];

  return `
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;gap:10px;">
      <p style="font-size:12px;color:var(--text-soft);margin:0;max-width:520px;">${modulo.campos.length ? `Registros de ${esc(modulo.nombre)}. Las reglas activas configuradas para este módulo se aplican al guardar.` : 'Este módulo todavía no tiene campos — agrégalos desde la pestaña "Módulos" en Control del Sistema.'}</p>
      ${modulo.campos.length && puedeCrear ? `<button class="btn btn-primary btn-sm" id="btnNuevoRegistro">+ Nuevo Registro</button>` : ''}
    </div>
    ${registros.length ? registros.slice().reverse().map(reg => {
      const botonesAccion = (modulo.acciones || []).filter(a => currentUser.rol === 'admin' || (a.roles || []).includes(currentUser.rol));
      const ultimaActividad = (reg.historial && reg.historial.length) ? reg.historial[reg.historial.length - 1] : null;
      return `
      <div class="rule-card">
        <div class="rule-card-head">
          <div style="display:flex;flex-wrap:wrap;gap:6px;align-items:center;">
            ${(reg.etiquetas || []).map(et => `<span class="chip-toggle on" style="cursor:default;">${esc(et)}</span>`).join('')}
            ${reg.estado === 'rechazado' ? '<span class="chip-toggle" style="cursor:default;color:var(--rose);border-color:var(--rose);">RECHAZADO</span>' : ''}
            ${reg.estado && !['activo', 'rechazado'].includes(reg.estado) ? `<span class="chip-toggle on" style="cursor:default;">${esc(reg.estado.toUpperCase())}</span>` : ''}
            ${reg.nivelBloqueo ? `<span style="font-size:10.5px;font-weight:700;color:var(--rose);">${esc(NIVEL_BLOQUEO_LABEL[reg.nivelBloqueo] || reg.nivelBloqueo)}</span>` : ''}
          </div>
          ${puedeEliminar ? `<button class="btn btn-outline btn-sm btn-icon" data-borrar-registro="${reg.id}" title="Eliminar"><svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0-1 14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2L4 6"/></svg></button>` : ''}
        </div>
        <div style="font-size:12.5px;color:var(--text);display:flex;flex-wrap:wrap;gap:2px 14px;">
          ${modulo.campos.map(c => `<span><strong>${esc(c.label)}:</strong> ${esc(formateaValorCampo(reg[c.id], c))}</span>`).join('')}
        </div>
        ${reg.nota ? `<div style="font-size:11.5px;color:var(--text-soft);margin-top:4px;">Nota: ${esc(reg.nota)}</div>` : ''}
        ${reg.reglaAplicada ? `<div style="font-size:11px;color:var(--text-soft);margin-top:2px;">Regla aplicada: ${esc(reg.reglaAplicada)}</div>` : ''}
        ${reg.totalAcumulado ? `<div style="font-size:11px;color:var(--text-soft);margin-top:2px;">Total acumulado por acciones: <strong class="mono">${reg.totalAcumulado.toFixed(2)}</strong></div>` : ''}
        ${ultimaActividad ? `<div style="font-size:10.5px;color:var(--text-soft);margin-top:4px;">Última actividad: ${esc(ultimaActividad.accion)} · ${new Date(ultimaActividad.fecha).toLocaleString('es-MX')} · ${esc(ultimaActividad.actorNombre || '')}</div>` : ''}
        ${botonesAccion.length ? `
          <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;">
            ${botonesAccion.map(a => `<button class="btn btn-outline btn-sm" data-accion-registro="${moduloId}::${reg.id}::${a.id}">${esc(a.etiqueta)}</button>`).join('')}
          </div>
        ` : ''}
      </div>
    `;
    }).join('') : '<div class="empty">No hay registros todavía.</div>'}
  </div>
  `;
}

function attachModuloGenericoHandlers(moduloId){
  const modulo = DB.modulos && DB.modulos[moduloId];
  if(!modulo) return;

  document.querySelectorAll('[data-borrar-registro]').forEach(btn => {
    btn.addEventListener('click', () => {
      if(!tienePermisoModulo(currentUser, moduloId, 'eliminar')){ toast('No tienes permiso para eliminar registros de este módulo', 'error'); return; }
      if(!confirm('¿Eliminar este registro?')) return;
      DB.registros[moduloId] = (DB.registros[moduloId] || []).filter(r => r.id !== btn.dataset.borrarRegistro);
      saveDB();
      renderSection(currentSection);
      toast('Registro eliminado', 'success');
    });
  });

  const btnNuevo = document.getElementById('btnNuevoRegistro');
  if(btnNuevo){
    btnNuevo.addEventListener('click', () => {
      openModal(`Nuevo registro — ${modulo.nombre}`, `
        ${modulo.campos.map(c => `
          <div class="field">
            <label>${esc(c.label)}${c.tipo === 'formula' ? ' <span style="font-size:10px;background:var(--teal-pale);color:var(--teal);padding:1px 6px;border-radius:10px;font-weight:600;">CALCULADO</span>' : ''}${c.tipo === 'referencia' ? ' <span style="font-size:10px;background:var(--blue-pale);color:var(--blue);padding:1px 6px;border-radius:10px;font-weight:600;">REFERENCIA</span>' : ''}</label>
            ${inputParaCampo(c)}
            ${c.tipo === 'formula' && c.expresion ? `<div class="hint">Fórmula: <code>${esc(c.expresion)}</code></div>` : ''}
          </div>
        `).join('')}
        <div class="field">
          <label>Nota / observación (opcional — algunas reglas pueden hacerla obligatoria)</label>
          <textarea id="regNota" rows="2" placeholder="Opcional"></textarea>
        </div>
      `, {
        wide: true,
        saveLabel: 'Guardar Registro',
        onSave: () => {
          const registro = { id: uid('reg_') };
          modulo.campos.forEach(c => {
            if(c.tipo === 'selector' && c.multiple){
              const wrap = document.querySelector(`[data-campo-valor-multi="${c.id}"]`);
              registro[c.id] = wrap ? Array.from(wrap.querySelectorAll('input[type="checkbox"]:checked')).map(i => i.value) : [];
              return;
            }
            const el = document.querySelector(`[data-campo-valor="${c.id}"]`);
            let val = el ? el.value : '';
            if(c.tipo === 'numero') val = val === '' ? null : parseFloat(val);
            if(c.tipo === 'booleano') val = (val === 'true');
            registro[c.id] = val;
          });

          // Validar fórmulas: ninguna puede quedar inválida (valor < 0 o error)
          const formulasInvalidas = modulo.campos.filter(c => c.tipo === 'formula').filter(c => {
            const vals = leerValoresFormulario(document.getElementById('modalBox'));
            const { invalido, error } = evaluarFormula(c.expresion || '', vals);
            return invalido || error;
          });
          if(formulasInvalidas.length){
            toast(`El campo "${formulasInvalidas[0].label}" tiene un valor inválido (revisa la fórmula o los valores ingresados)`, 'error');
            return;
          }

          const faltaAlgunCampo = modulo.campos.some(c => {
            if(c.tipo === 'booleano') return false;
            if(c.tipo === 'formula') return false; // calculado automáticamente
            if(c.tipo === 'referencia') return !registro[c.id]; // debe seleccionarse
            if(c.tipo === 'selector' && c.multiple) return !registro[c.id] || registro[c.id].length === 0;
            return registro[c.id] === '' || registro[c.id] === null || (typeof registro[c.id] === 'number' && isNaN(registro[c.id]));
          });
          if(faltaAlgunCampo){ toast('Completa todos los campos', 'error'); return; }

          const nota = document.getElementById('regNota').value.trim();
          const resultado = evaluarReglasModulo(registro, moduloId);

          // Bloqueo duro: la regla lo dice literal — no se manda hasta
          // corregir, así que ni siquiera se guarda el registro.
          if(!resultado.accionAutomatica && resultado.nivelBloqueo === 'bloqueo_duro'){
            const reglas = resultado.reglasAplicadas.filter(r => r.nivelBloqueo === 'bloqueo_duro').map(r => r.nombre).join(', ');
            toast(`No se puede guardar: ${reglas || 'una regla de bloqueo duro'} lo impide`, 'error');
            return;
          }
          if(resultado.notaObligatoria && !nota){
            toast('Una regla activa exige nota/observación para este registro', 'error');
            return;
          }

          registro.nota = nota;
          registro.fecha = new Date().toISOString();

          if(resultado.accionAutomatica){
            registro.estado = resultado.accionAutomatica.tipo === 'rechazar_automatico' ? 'rechazado' : 'aprobado';
            registro.reglaAplicada = resultado.accionAutomatica.regla.nombre;
          } else {
            registro.estado = 'activo';
            registro.etiquetas = resultado.etiquetas;
            registro.nivelBloqueo = resultado.nivelBloqueo;
          }

          // Historial: arranca con el alta, y cada botón de acción que se
          // use después (Pagar, Enviar, Programar...) le agrega una entrada.
          registro.historial = [{
            estado: registro.estado,
            fecha: registro.fecha,
            actorId: currentUser.id,
            actorNombre: currentUser.nombre,
            accion: 'Creado',
            nota
          }];

          if(!DB.registros[moduloId]) DB.registros[moduloId] = [];
          DB.registros[moduloId].push(registro);
          saveDB();
          toast('Registro guardado', 'success');
          closeModal();
          renderSection(currentSection);
        }
      });
      // Enganchar listeners de fórmula y referencia al DOM del modal
      const modalBox = document.getElementById('modalBox');
      if(modalBox){
        attachReferenciaListeners(modalBox, modulo.campos, moduloId);
        attachFormulaListeners(modalBox, modulo.campos);
      }
    });
  }

  // Botones de acción configurados por módulo (Pagar, Enviar, Programar...):
  // cambian el estado del registro, dejan rastro en su historial y, si la
  // acción tiene un campo numérico asociado, lo acumulan en totalAcumulado.
  document.querySelectorAll('[data-accion-registro]').forEach(btn => {
    btn.addEventListener('click', () => {
      const [modId, regId, accionId] = btn.dataset.accionRegistro.split('::');
      const mod = DB.modulos[modId];
      const accion = (mod && mod.acciones || []).find(a => a.id === accionId);
      const registro = ((DB.registros && DB.registros[modId]) || []).find(r => r.id === regId);
      if(!accion || !registro) return;
      if(currentUser.rol !== 'admin' && !(accion.roles || []).includes(currentUser.rol)){
        toast('No tienes permiso para usar este botón', 'error');
        return;
      }

      const aplicarAccion = (nota) => {
        registro.estado = accion.estadoResultante;
        if(accion.campoMonto){
          const monto = parseFloat(registro[accion.campoMonto]) || 0;
          // "Pagar" resta (sale dinero); Sumar/Cobrar/otros suman. Es una
          // simplificación: no mueve dinero de/a otro módulo, solo lleva un
          // acumulado propio del registro para que quede trazable.
          const signo = accion.tipo === 'pagar' ? -1 : 1;
          registro.totalAcumulado = (registro.totalAcumulado || 0) + signo * monto;
        }
        if(!registro.historial) registro.historial = [];
        registro.historial.push({
          estado: accion.estadoResultante,
          fecha: new Date().toISOString(),
          actorId: currentUser.id,
          actorNombre: currentUser.nombre,
          accion: accion.etiqueta,
          nota: nota || ''
        });
        saveDB();
        renderSection(currentSection);
        toast(`"${accion.etiqueta}" aplicado`, 'success');
      };

      if(accion.notaObligatoria){
        openModal(`${accion.etiqueta} — nota`, `
          <div class="field">
            <label>Nota (obligatoria para esta acción)</label>
            <textarea id="accNotaInput" rows="2"></textarea>
          </div>
        `, {
          saveLabel: 'Confirmar',
          onSave: () => {
            const nota = document.getElementById('accNotaInput').value.trim();
            if(!nota){ toast('Esta acción requiere una nota', 'error'); return; }
            closeModal();
            aplicarAccion(nota);
          }
        });
      } else {
        aplicarAccion('');
      }
    });
  });
}

      document.getElementById('controlTabContent').innerHTML = renderControlTabContent();
      attachControlTabHandlers();
      document.querySelectorAll('#controlTabbar .tabbar-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === controlSistemaTab));
    });
  });
  attachControlTabHandlers();
}

function attachControlTabHandlers(){
  if(controlSistemaTab === 'empresa') attachEmpresaTabHandlers();
  if(controlSistemaTab === 'permisos') attachPermisosTabHandlers();
  if(controlSistemaTab === 'rfc') attachRfcTabHandlers();
  if(controlSistemaTab === 'modulos') attachModulosTabHandlers();
  if(controlSistemaTab === 'reglas') attachReglasTabHandlers();
}

function attachEmpresaTabHandlers(){
  const btn = document.getElementById('btnGuardarEmpresa');
  if(!btn) return;
  btn.addEventListener('click', () => {
    DB.empresa = {
      nombre: document.getElementById('empNombre').value.trim() || 'Mi Empresa',
      giro: document.getElementById('empGiro').value.trim(),

    };

function attachPermisosTabHandlers(){
  document.querySelectorAll('[data-perm-funcion]').forEach(btn => {
    btn.addEventListener('click', () => {
      const funcion = btn.dataset.permFuncion;
      const rol = btn.dataset.permRol;
      if(!DB.permisos[funcion]) DB.permisos[funcion] = [];
      const idx = DB.permisos[funcion].indexOf(rol);
      if(idx === -1){
        DB.permisos[funcion].push(rol);
      } else {
        if(DB.permisos[funcion].length === 1){
          toast('Debe quedar al menos un rol asignado a esta función', 'error');
          return;
        }
        DB.permisos[funcion].splice(idx, 1);
      }
      saveDB();
      btn.classList.toggle('on');
      if(currentUser) renderNav();
    });
  });
}

function attachRfcTabHandlers(){
  document.querySelectorAll('[data-agregar-rfc]').forEach(btn => {
    btn.addEventListener('click', () => {
      const cat = btn.dataset.agregarRfc;
      const input = document.querySelector(`.rfc-input[data-rfc-categoria="${cat}"]`);
      const rfc = input.value.trim().toUpperCase();
      if(!rfc){ toast('Escribe un RFC para agregar', 'error'); return; }
      if(!DB.reglasRfc[cat]) DB.reglasRfc[cat] = [];
      if(DB.reglasRfc[cat].includes(rfc)){ toast('Ese RFC ya está en la lista', 'warning'); return; }
      DB.reglasRfc[cat].push(rfc);
      saveDB();
      input.value = '';
      document.getElementById('controlTabContent').innerHTML = renderControlTabContent();
      attachControlTabHandlers();
      toast('RFC agregado', 'success');
    });
  });

  document.querySelectorAll('[data-quitar-rfc]').forEach(btn => {
    btn.addEventListener('click', () => {
      const [cat, rfc] = btn.dataset.quitarRfc.split('::');
      DB.reglasRfc[cat] = (DB.reglasRfc[cat] || []).filter(r => r !== rfc);
      saveDB();
      document.getElementById('controlTabContent').innerHTML = renderControlTabContent();
      attachControlTabHandlers();
    });
  });
}

// Estado temporal del editor de condiciones mientras el modal de "Nueva
// Regla" está abierto. Vive fuera de la función porque el modal se
// re-renderiza a pedazos (agregar/quitar condición, cambiar de módulo) sin
// cerrarse, y necesita recordar qué condiciones lleva armadas hasta ahora.
let rEditorCondiciones = [];
let rEditorModulo = 'gastos';

function condicionVacia(campos){
  return { campo: (campos[0] && campos[0].id) || '', operador: 'igual', valor: '', logico: 'Y' };
}

function renderCondicionesEditor(){
  const campos = (DB.modulos && DB.modulos[rEditorModulo] && DB.modulos[rEditorModulo].campos) || [];
  const filas = rEditorCondiciones.map((cond, idx) => `
    <div class="field-row" style="align-items:flex-end;" data-cond-row="${idx}">
      <div class="field">
        <label>${idx === 0 ? 'Campo' : ''}</label>
        <select data-cond-campo="${idx}">
          ${campos.map(c => `<option value="${esc(c.id)}" ${c.id === cond.campo ? 'selected' : ''}>${esc(c.label)}</option>`).join('')}
        </select>
      </div>
      <div class="field">
        <label>${idx === 0 ? 'Condición' : ''}</label>
        <select data-cond-operador="${idx}">
          <option value="mayor_que" ${cond.operador === 'mayor_que' ? 'selected' : ''}>Es mayor que</option>
          <option value="menor_que" ${cond.operador === 'menor_que' ? 'selected' : ''}>Es menor que</option>
          <option value="igual" ${cond.operador === 'igual' ? 'selected' : ''}>Es igual a</option>
          <option value="distinto" ${cond.operador === 'distinto' ? 'selected' : ''}>Es distinto de</option>
          <option value="contiene" ${cond.operador === 'contiene' ? 'selected' : ''}>Contiene</option>
        </select>
      </div>
      <div class="field">
        <label>${idx === 0 ? 'Valor' : ''}</label>
        <input type="text" data-cond-valor="${idx}" value="${esc(cond.valor || '')}" placeholder="Valor a comparar">
      </div>
      ${rEditorCondiciones.length > 1 ? `<button type="button" class="btn btn-outline btn-sm btn-icon" data-cond-quitar="${idx}" title="Quitar condición" style="margin-bottom:2px;">×</button>` : ''}
    </div>
    ${idx < rEditorCondiciones.length - 1 ? `
      <div style="display:flex;justify-content:center;margin:2px 0 8px;">
        <select data-cond-logico="${idx}" style="width:auto;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;">
          <option value="Y" ${(cond.logico || 'Y') !== 'O' ? 'selected' : ''}>Y</option>
          <option value="O" ${cond.logico === 'O' ? 'selected' : ''}>O</option>
        </select>
      </div>` : ''}
  `).join('');
  return filas + `<button type="button" class="chip-add" id="btnAgregarCondicion" style="margin-top:2px;">+ Otra condición</button>`;
}

function refrescarCondicionesEditor(){
  document.getElementById('rCondicionesWrap').innerHTML = renderCondicionesEditor();
  attachCondicionesEditorHandlers();
}

function attachCondicionesEditorHandlers(){
  document.querySelectorAll('[data-cond-campo]').forEach(el => el.addEventListener('change', () => { rEditorCondiciones[el.dataset.condCampo].campo = el.value; }));
  document.querySelectorAll('[data-cond-operador]').forEach(el => el.addEventListener('change', () => { rEditorCondiciones[el.dataset.condOperador].operador = el.value; }));
  document.querySelectorAll('[data-cond-valor]').forEach(el => el.addEventListener('input', () => { rEditorCondiciones[el.dataset.condValor].valor = el.value; }));
  document.querySelectorAll('[data-cond-logico]').forEach(el => el.addEventListener('change', () => { rEditorCondiciones[el.dataset.condLogico].logico = el.value; }));
  document.querySelectorAll('[data-cond-quitar]').forEach(el => el.addEventListener('click', () => {
    rEditorCondiciones.splice(parseInt(el.dataset.condQuitar, 10), 1);
    refrescarCondicionesEditor();
  }));
  const btnAgregar = document.getElementById('btnAgregarCondicion');
  if(btnAgregar){
    btnAgregar.addEventListener('click', () => {
      const campos = (DB.modulos && DB.modulos[rEditorModulo] && DB.modulos[rEditorModulo].campos) || [];
      rEditorCondiciones.push(condicionVacia(campos));
      refrescarCondicionesEditor();
    });
  }
}

    btn.addEventListener('click', () => {

  document.querySelectorAll('[data-borrar-regla]').forEach(btn => {

              ${modulos.map(m => `<option value="${esc(m.id)}">${esc(m.icono || '')} ${esc(m.nombre)}</option>`).join('')}

          </div>
          <div class="field">

            <input type="text" id="rNombre" placeholder="Ej. Viáticos altos sin cotización">
          </div>
        </div>
        <div id="rCondicionesWrap">${renderCondicionesEditor()}</div>
        <div class="field" style="margin-top:10px;">
          <label>Acción si se cumple</label>
          <select id="rAccion">
            <option value="etiquetar">Etiquetar / avisar (no bloquea por sí sola)</option>
            <option value="rechazar_automatico">Rechazar automáticamente</option>
            <option value="aprobar_automatico">Aprobar automáticamente</option>
          </select>
        </div>
        <div id="rEtiquetaWrap">
          <div class="field-row">
            <div class="field">
              <label>Etiqueta (se muestra junto al registro)</label>
              <input type="text" id="rEtiqueta" placeholder="Ej. EXCEDE, ATÍPICO, REVISAR...">
            </div>
            <div class="field">
              <label>Nivel de bloqueo</label>
              <select id="rNivelBloqueo">
                <option value="">Ninguno (solo etiqueta)</option>
                <option value="aviso_suave">Aviso suave</option>
                <option value="aprobacion_extra">Requiere aprobación extra</option>
                <option value="bloqueo_duro">Bloqueo duro</option>
              </select>
            </div>
          </div>
          <label style="display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--text);margin-top:4px;">
            <input type="checkbox" id="rNotaObligatoria" style="width:auto;"> La nota/observación es obligatoria cuando esta regla aplica
          </label>
        </div>
        <div class="field" style="margin-top:10px;">
          <label>Justificación (aparece en el historial)</label>
          <textarea id="rMotivo" rows="2" placeholder="Ej. Los viáticos mayores a $5,000 requieren cotización previa."></textarea>
        </div>
      `, {
        wide: true,
        saveLabel: 'Crear Regla',
        onSave: () => {
          const nombre = document.getElementById('rNombre').value.trim();
          const accion = document.getElementById('rAccion').value;
          const motivo = document.getElementById('rMotivo').value.trim();
          if(!nombre){ toast('Escribe un nombre para la regla', 'error'); return; }
          if(!rEditorCondiciones.length || rEditorCondiciones.some(c => !c.valor.trim())){
            toast('Completa el valor de todas las condiciones', 'error');
            return;
          }
          const regla = {
            id: uid('regla_'),
            nombre,
            modulo: rEditorModulo,
            activa: true,
            condiciones: rEditorCondiciones.map(c => ({ campo: c.campo, operador: c.operador, valor: c.valor.trim(), logico: c.logico || 'Y' })),
            accion,
            etiqueta: accion === 'etiquetar' ? (document.getElementById('rEtiqueta').value.trim() || 'REVISAR') : null,
            nivelBloqueo: accion === 'etiquetar' ? (document.getElementById('rNivelBloqueo').value || null) : null,
            notaObligatoria: accion === 'etiquetar' ? document.getElementById('rNotaObligatoria').checked : false,
            motivo
          };
          DB.reglasGenerales.push(regla);
          saveDB();
          toast('Regla creada', 'success');
          closeModal();
          document.getElementById('controlTabContent').innerHTML = renderControlTabContent();
          attachControlTabHandlers();
        }
      });

      attachCondicionesEditorHandlers();

      document.getElementById('rModulo').addEventListener('change', (e) => {
        rEditorModulo = e.target.value;
        rEditorCondiciones = [condicionVacia((DB.modulos[rEditorModulo] && DB.modulos[rEditorModulo].campos) || [])];
        refrescarCondicionesEditor();
      });

      const toggleEtiquetaWrap = () => {
        document.getElementById('rEtiquetaWrap').style.display = document.getElementById('rAccion').value === 'etiquetar' ? '' : 'none';
      };
      document.getElementById('rAccion').addEventListener('change', toggleEtiquetaWrap);
      toggleEtiquetaWrap();
    });
  }
}

// ========== DETALLE DE GASTO ==========
function showGastoDetail(gasto){
  const user = DB.usuarios.find(u => u.id === gasto.solicitanteId);

  // Determina qué acciones del flujo puede ejecutar el usuario actual sobre
  // este gasto en particular, combinando su permiso asignado (tienePermiso)
  // con el estado actual del gasto (solo tiene sentido aprobar/rechazar en
  // 'en_revision', verificar SAT en 'verificado_sat' sin verificar aún, y
  // marcar pagado en 'por_pagar').
  const acciones = [];
  if(gasto.estado === 'en_revision' && tienePermiso(currentUser, 'revisar_gastos')){
    acciones.push({ id: 'detAccAprobar', label: 'Aprobar', cls: 'btn-success' });
    acciones.push({ id: 'detAccRechazar', label: 'Rechazar', cls: 'btn-danger' });
  }
  if(gasto.estado === 'verificado_sat' && !gasto.verificadoSat && tienePermiso(currentUser, 'verificar_sat')){
    acciones.push({ id: 'detAccVerificarSat', label: 'Verificar SAT', cls: 'btn-outline' });
  }
  if(gasto.estado === 'por_pagar' && tienePermiso(currentUser, 'programar_pagos')){
    acciones.push({ id: 'detAccMarcarPagado', label: 'Marcar como Pagado', cls: 'btn-success' });
  }

  let html = `
    <div style="display:grid;grid-template-columns:2fr 1fr;gap:16px;">
      <div>
        <div style="margin-bottom:20px;">
          <div style="font-size:12px;color:var(--text-soft);text-transform:uppercase;font-weight:600;margin-bottom:4px;">Información del Comprobante</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;">
            <div><span style="font-size:11px;color:var(--text-soft);">Fecha</span><div style="font-weight:600;">${fmtDate(gasto.fecha)}</div></div>
            <div><span style="font-size:11px;color:var(--text-soft);">Categoría</span><div><span class="tag tag-gray">${esc(gasto.categoria)}</span></div></div>
            <div><span style="font-size:11px;color:var(--text-soft);">RFC Emisor</span><div class="mono" style="font-weight:600;">${esc(gasto.rfc || '—')}</div></div>
            <div><span style="font-size:11px;color:var(--text-soft);">Folio</span><div class="mono" style="font-weight:600;font-size:11px;">${esc(gasto.folio || '—')}</div></div>
          </div>
        </div>

        <div style="margin-bottom:20px;">
          <div style="font-size:12px;color:var(--text-soft);text-transform:uppercase;font-weight:600;margin-bottom:8px;">Comprobante Adjunto</div>
          ${gasto.comprobante && gasto.comprobante.dataUrl ? (
            gasto.comprobante.esPdf
              ? `<a href="${gasto.comprobante.dataUrl}" target="_blank" rel="noopener" class="btn btn-outline btn-sm">📄 Ver PDF del comprobante</a>`
              : `<a href="${gasto.comprobante.dataUrl}" target="_blank" rel="noopener">
                   <img src="${gasto.comprobante.dataUrl}" alt="Comprobante" style="max-width:220px;max-height:280px;border-radius:8px;border:1px solid var(--line);display:block;cursor:zoom-in;">
                 </a>
                 <div style="font-size:11px;color:var(--text-soft);margin-top:6px;">Haz clic para ver en tamaño completo</div>`
          ) : `<div style="padding:12px;background:var(--paper);border-radius:8px;font-size:12px;color:var(--text-soft);">Este gasto no tiene un comprobante adjunto (fue creado antes de esta función, o se guardó solo con datos manuales).</div>`}
        </div>

        <div style="margin-bottom:20px;">
          <div style="font-size:12px;color:var(--text-soft);text-transform:uppercase;font-weight:600;margin-bottom:8px;">Descripción</div>
          <div style="padding:12px;background:var(--paper);border-radius:8px;font-size:13px;">${esc(gasto.descripcion)}</div>
        </div>

        <div style="margin-bottom:20px;">
          <div style="font-size:12px;color:var(--text-soft);text-transform:uppercase;font-weight:600;margin-bottom:8px;">Montos</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
            <div style="padding:12px;background:var(--paper);border-radius:8px;">
              <div style="font-size:11px;color:var(--text-soft);">Monto Total</div>
              <div style="font-size:18px;font-weight:600;color:var(--ink);">${money(gasto.monto)}</div>
            </div>
            <div style="padding:12px;background:var(--paper);border-radius:8px;">
              <div style="font-size:11px;color:var(--text-soft);">Impuestos</div>
              <div style="font-size:18px;font-weight:600;color:var(--ink);">${money(gasto.impuestos || 0)}</div>
            </div>
          </div>
        </div>

        ${gasto.linkSat ? `
          <div style="margin-bottom:20px;padding:12px;background:var(--green-pale);border-radius:8px;border-left:3px solid var(--green);">
            <div style="font-size:12px;font-weight:600;color:var(--green);margin-bottom:6px;">✓ Verificado en SAT</div>
            <a href="${esc(gasto.linkSat)}" target="_blank" rel="noopener" style="color:var(--green);text-decoration:none;font-size:12px;">Ver comprobante en el portal del SAT →</a>
          </div>
        ` : ''}

        <div>
          <div style="font-size:12px;color:var(--text-soft);text-transform:uppercase;font-weight:600;margin-bottom:8px;">Historial de Cambios</div>
          <div class="timeline">
            ${gasto.historial.map((h, i) => {
              const actor = DB.usuarios.find(u => u.id === h.actorId);
              const nombreActor = actor ? actor.nombre : (h.actorId === 'sistema' ? NOMBRE_ROL_SISTEMA : '—');
              return `
                <div class="timeline-item ${h.estado === 'rechazado' ? 'timeline-dot error' : h.estado === 'pagado' ? 'timeline-dot success' : 'timeline-dot info'}">
                  <div class="timeline-content">
                    <div class="timeline-title">${ESTADOS_GASTO[h.estado]}</div>
                    <div class="timeline-desc">${esc(h.nota)}</div>
                    <div class="timeline-time">Por ${esc(nombreActor)} · ${fmtDateTime(h.fecha)}</div>
                  </div>
                </div>
              `;
            }).join('')}
          </div>
        </div>
      </div>

      <div>
        <div style="padding:16px;background:var(--paper);border-radius:8px;margin-bottom:16px;">
          <div style="font-size:12px;color:var(--text-soft);text-transform:uppercase;font-weight:600;margin-bottom:8px;">Estado Actual</div>
          <div style="margin-bottom:12px;"><span class="status-badge status-${gasto.estado}" style="font-size:12px;padding:6px 12px;">${ESTADOS_GASTO[gasto.estado]}</span></div>
          <div style="font-size:11px;color:var(--text-soft);line-height:1.5;">
            ${gasto.estado === 'en_revision' ? 'En revisión por el Administrador de Gastos.' : ''}
            ${gasto.estado === 'verificado_sat' ? 'Aprobado, pendiente de verificación en SAT.' : ''}
            ${gasto.estado === 'por_pagar' ? 'Verificado en SAT, listo para programación de pago.' : ''}
            ${gasto.estado === 'pagado' ? 'Pago completado.' : ''}
            ${gasto.estado === 'rechazado' ? 'Rechazado. Revisa el historial para más detalles.' : ''}
          </div>
        </div>

        ${acciones.length ? `
        <div style="padding:16px;background:var(--paper);border-radius:8px;margin-bottom:16px;">
          <div style="font-size:12px;color:var(--text-soft);text-transform:uppercase;font-weight:600;margin-bottom:10px;">Acciones Disponibles</div>
          <div style="display:flex;flex-direction:column;gap:8px;">
            ${acciones.map(a => `<button class="btn ${a.cls} btn-sm" id="${a.id}" style="width:100%;justify-content:center;">${a.label}</button>`).join('')}
          </div>
        </div>
        ` : ''}

        <div style="padding:16px;background:var(--paper);border-radius:8px;">
          <div style="font-size:12px;color:var(--text-soft);text-transform:uppercase;font-weight:600;margin-bottom:8px;">Solicitante</div>
          <div style="font-weight:600;margin-bottom:4px;">${esc(user?.nombre || '—')}</div>
          <div style="font-size:12px;color:var(--text-soft);margin-bottom:8px;">${ROLES[user?.rol]?.label || '—'}</div>
          <div style="font-size:12px;color:var(--text-soft);">${esc(user?.email || '—')}</div>
        </div>
      </div>
    </div>
  `;

  openModal(`Detalle de Gasto #${gasto.id.substring(4, 10)}`, html, { wide: true, hideFoot: true });

  if(acciones.length){
    // Al completar cualquier acción desde aquí, refrescamos la sección de
    // fondo y volvemos a abrir el detalle con los datos ya actualizados,
    // para que el usuario vea de inmediato el nuevo estado/historial.
    const reabrirDetalle = () => {
      renderSection(currentSection);
      const actualizado = DB.gastos.find(g => g.id === gasto.id);
      if(actualizado) showGastoDetail(actualizado);
    };
    setTimeout(() => {
      document.getElementById('detAccAprobar')?.addEventListener('click', () => abrirModalAprobarGasto(gasto.id, reabrirDetalle));
      document.getElementById('detAccRechazar')?.addEventListener('click', () => abrirModalRechazarGasto(gasto.id, reabrirDetalle));
      document.getElementById('detAccVerificarSat')?.addEventListener('click', () => abrirModalVerificarSat(gasto.id, reabrirDetalle));
      document.getElementById('detAccMarcarPagado')?.addEventListener('click', () => abrirModalMarcarPagado(gasto.id, reabrirDetalle));
    }, 0);
  }
}

// ========== INICIALIZACIÓN APP ==========
function initApp(){
  document.getElementById('sidebarUserName').textContent = currentUser.nombre;
  document.getElementById('sidebarUserRole').textContent = ROLES[currentUser.rol].label;
  
  renderNav();
  showSection('dashboard');

  document.getElementById('hamburger').addEventListener('click', openSidebar);
  document.getElementById('scrim').addEventListener('click', closeSidebar);
  document.getElementById('logoutBtn').addEventListener('click', logout);

  document.getElementById('btnExport').addEventListener('click', () => {
    const data = JSON.stringify(DB, null, 2);
    const blob = new Blob([data], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `botica-central-backup-${new Date().toISOString().split('T')[0]}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  });

  document.getElementById('btnReset').addEventListener('click', async () => {
    if(confirm('¿Reiniciar todos los datos de prueba? Esta acción no se puede deshacer.')){
      localStorage.removeItem(DB_KEY);
      DB = defaultDB();
      await saveDB();
      renderSection(currentSection);
      toast('Datos reiniciados', 'success');
    }
  });
}

// ========== INICIO ==========
(async function bootstrap(){
  DB = await loadDB();
  aplicarIdentidadEmpresa();
  initLoginScreen();

  // Si el navegador ya tiene una sesión de Firebase Auth activa (recarga de
  // página, misma pestaña), entramos directo sin pedir credenciales de nuevo.
  auth.onAuthStateChanged(fbUser => {
    if(fbUser && !currentUser){
      const match = DB.usuarios.find(u => u.email && u.email.toLowerCase() === fbUser.email.toLowerCase());
      if(match){
        currentUser = match;
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('app').classList.remove('hidden');
        initApp();
      }
    }
  });
})();
</script>
