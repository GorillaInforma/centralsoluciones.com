<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FiadoApp</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');

:root {
  --bg:        #FFFFFF;
  --surface:   #F7F8FA;
  --surface2:  #F0F1F5;
  --surface3:  #E5E7EF;
  --border:    #E2E4EA;
  --border2:   #D0D3DC;
  --txt:       #1A1D29;
  --txt2:      #6B7280;
  --txt3:      #9CA3AF;
  --accent:    #4F7FFF;
  --accent2:   #6B98FF;
  --green:     #22C55E;
  --green-bg:  rgba(34,197,94,0.12);
  --red:       #EF4444;
  --red-bg:    rgba(239,68,68,0.12);
  --amber:     #F59E0B;
  --amber-bg:  rgba(245,158,11,0.1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body { height: 100%; overflow: hidden; }

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--txt);
  display: flex;
  flex-direction: column;
  height: 100dvh;
}

/* ── TOPBAR ── */
.topbar {
  height: 56px;
  min-height: 56px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  gap: 16px;
  flex-shrink: 0;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 700;
  font-size: 1rem;
  color: var(--txt);
  letter-spacing: -0.02em;
}

.logo-icon {
  width: 30px; height: 30px;
  background: var(--accent);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.85rem;
}

.logo-sub { font-size: 0.72rem; color: var(--txt3); font-weight: 400; margin-top: 1px; }

.semana-nav {
  display: flex;
  align-items: center;
  gap: 4px;
  position: relative;
}

.semana-arrow {
  width: 24px; height: 24px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--txt2);
  font-size: 1rem;
  line-height: 1;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
}
.semana-arrow:active { background: var(--surface3); }

.semana-chip {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 5px 12px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  color: var(--txt2);
  letter-spacing: 0.04em;
  white-space: nowrap;
  cursor: pointer;
}

.semana-date-input {
  position: absolute;
  opacity: 0;
  width: 1px; height: 1px;
  pointer-events: none;
  bottom: 0; left: 50%;
}

.topbar-right { display: flex; align-items: center; gap: 8px; }

.btn-pdf-top {
  display: flex; align-items: center; gap: 6px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px 14px;
  font-size: 0.78rem;
  font-weight: 500;
  color: var(--txt2);
  cursor: pointer;
  transition: all 0.15s;
  font-family: 'Inter', sans-serif;
  white-space: nowrap;
}
.btn-pdf-top:hover { background: var(--surface3); color: var(--txt); border-color: var(--border2); }
.btn-pdf-top svg { flex-shrink: 0; }

/* ── LAYOUT ── */
.layout {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-height: 0;
}

/* ── TABS MÓVIL ── */
.tabs-mobile {
  display: flex;
  flex-shrink: 0;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}

.tab-btn {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 12px 8px;
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  font-family: 'Inter', sans-serif;
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--txt2);
  cursor: pointer;
}

.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

.tab-badge {
  background: var(--red);
  color: #fff;
  font-size: 0.65rem;
  font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
  padding: 1px 6px;
  border-radius: 10px;
  display: none;
}
.tab-badge.show { display: inline-block; }

/* ── PANEL CHAT ── */
.panel-chat {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-height: 0;
  flex: 1;
}

.layout.show-cuentas .panel-chat { display: none; }
.layout.show-catalogo .panel-chat { display: none; }

.chat-feed {
  flex: 1;
  overflow-y: auto;
  padding: 24px 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  min-height: 0;
  scroll-behavior: smooth;
}

.chat-feed::-webkit-scrollbar { width: 4px; }
.chat-feed::-webkit-scrollbar-track { background: transparent; }
.chat-feed::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

/* Mensajes */
.msg-row {
  display: flex;
  gap: 10px;
  max-width: 88%;
}

.msg-row.ia { align-self: flex-start; }
.msg-row.user { align-self: flex-end; flex-direction: row-reverse; }

.msg-avatar {
  width: 28px; height: 28px; min-width: 28px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.75rem;
  margin-top: 2px;
}

.msg-row.ia .msg-avatar { background: var(--accent); color: white; font-weight: 700; }
.msg-row.user .msg-avatar { background: var(--surface3); color: var(--txt2); }

.msg-bubble {
  padding: 10px 14px;
  border-radius: 12px;
  font-size: 0.88rem;
  line-height: 1.6;
  max-width: 100%;
  white-space: pre-wrap;
}

.msg-row.ia .msg-bubble {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-top-left-radius: 4px;
  color: var(--txt);
}

.msg-row.user .msg-bubble {
  background: var(--accent);
  color: white;
  border-top-right-radius: 4px;
}

/* Confirmación inline */
.confirm-actions {
  display: flex; gap: 8px; margin-top: 10px;
}
.confirm-btn {
  flex: 1;
  padding: 7px 10px;
  border-radius: 8px;
  border: 1px solid var(--border2);
  background: var(--bg);
  font-size: 0.78rem;
  font-weight: 600;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
}
.confirm-btn.si { color: var(--accent); border-color: var(--accent); }
.confirm-btn.no { color: var(--txt2); }

/* Tabla embebida */
.inline-table {
  margin-top: 10px;
  border: 1px solid var(--border2);
  border-radius: 8px;
  overflow: hidden;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.78rem;
}

.inline-table .it-row {
  display: flex; justify-content: space-between;
  padding: 6px 12px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  color: var(--txt2);
}

.inline-table .it-row:last-child { border-bottom: none; }
.inline-table .it-row.it-head { background: rgba(255,255,255,0.04); color: var(--txt3); font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.08em; }
.inline-table .it-row.it-total { background: rgba(79,127,255,0.1); color: var(--accent2); font-weight: 600; }
.inline-table .it-row.it-ok { color: var(--green); }
.inline-table .it-row.it-bad { color: var(--red); }

/* Typing indicator */
.typing {
  align-self: flex-start;
  display: flex; align-items: center; gap: 6px;
  padding: 10px 16px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 12px;
  border-top-left-radius: 4px;
}

.typing-dot {
  width: 6px; height: 6px;
  background: var(--txt3);
  border-radius: 50%;
  animation: tdot 1.4s infinite;
}
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes tdot {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
  30% { transform: translateY(-5px); opacity: 1; }
}

/* ── INPUT AREA ── */
.chat-input-wrap {
  border-top: 1px solid var(--border);
  background: var(--surface);
  padding: 14px 16px;
  flex-shrink: 0;
}

.pendiente-banner {
  display: none;
  align-items: center;
  gap: 6px;
  background: var(--amber-bg);
  color: var(--amber);
  font-size: 0.72rem;
  font-weight: 600;
  padding: 6px 12px;
  border-radius: 8px;
  margin-bottom: 8px;
}
.pendiente-banner.show { display: flex; }

.input-box {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 8px 8px 8px 16px;
  transition: border-color 0.2s;
}

.input-box:focus-within { border-color: var(--accent); }

#chat-input {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  font-family: 'Inter', sans-serif;
  font-size: 0.9rem;
  color: var(--txt);
  resize: none;
  min-height: 24px;
  max-height: 96px;
  line-height: 1.5;
}

#chat-input::placeholder { color: var(--txt3); }

.input-actions { display: flex; gap: 8px; align-items: center; }

.btn-mic {
  width: 60px; height: 60px;
  border-radius: 50%;
  border: 2px solid var(--accent);
  background: var(--accent);
  color: white;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
  flex-shrink: 0;
  box-shadow: 0 2px 10px rgba(79,127,255,0.35);
}
.btn-mic svg { width: 26px; height: 26px; }
.btn-mic:hover { background: var(--accent2); border-color: var(--accent2); }
.btn-mic.grabando {
  background: var(--red);
  border-color: var(--red);
  animation: mic-pulse 1.2s ease-in-out infinite;
}
@keyframes mic-pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.45); }
  50% { box-shadow: 0 0 0 14px rgba(239,68,68,0); }
}

.btn-send {
  width: 36px; height: 36px;
  border-radius: 8px;
  border: none;
  background: var(--accent);
  color: white;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
  flex-shrink: 0;
}
.btn-send:hover { background: var(--accent2); }
.btn-send:disabled { opacity: 0.3; cursor: not-allowed; }

.mic-hint {
  font-size: 0.7rem;
  color: var(--txt3);
  text-align: center;
  margin-top: 7px;
  display: none;
}

.mic-hint.visible { display: block; }

/* ── PANEL CUENTAS ── */
.panel-cuentas {
  display: none;
  flex-direction: column;
  overflow: hidden;
  background: var(--surface);
  min-height: 0;
  flex: 1;
}

.layout.show-cuentas .panel-cuentas { display: flex; }

.cuentas-header {
  padding: 14px 16px 12px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.cuentas-header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}

.cuentas-header-top .cuentas-title { margin-bottom: 0; }

.cuentas-title {
  font-size: 0.78rem;
  font-weight: 600;
  color: var(--txt3);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 10px;
}

/* KPI strips */
.kpi-strip {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}

.kpi {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 10px;
}

.kpi-label { font-size: 0.65rem; color: var(--txt3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 2px; }
.kpi-val { font-family: 'JetBrains Mono', monospace; font-size: 1rem; font-weight: 600; color: var(--txt); }
.kpi-val.green { color: var(--green); }
.kpi-val.red { color: var(--red); }
.kpi-val.amber { color: var(--amber); }

/* Lista personas */
.personas-list {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  min-height: 0;
}

.personas-list::-webkit-scrollbar { width: 3px; }
.personas-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  color: var(--txt3);
  font-size: 0.8rem;
  text-align: center;
  padding: 24px;
}

.empty-icon { font-size: 2rem; opacity: 0.3; }

/* Tarjeta persona */
.card-persona {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  transition: border-color 0.2s;
}
.card-persona:hover { border-color: var(--border2); }
.card-persona.pagado { border-left: 3px solid var(--green); }
.card-persona.abono { border-left: 3px solid var(--amber); }
.card-persona.adeuda { border-left: 3px solid var(--red); }

.card-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 12px;
  cursor: pointer;
  user-select: none;
  gap: 8px;
}

.card-nombre {
  font-size: 0.88rem;
  font-weight: 600;
  color: var(--txt);
  text-transform: capitalize;
  flex: 1;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.card-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

.badge-estado {
  font-size: 0.62rem;
  font-weight: 600;
  font-family: 'JetBrains Mono', monospace;
  padding: 2px 7px;
  border-radius: 20px;
  letter-spacing: 0.04em;
}
.badge-estado.pago { background: var(--green-bg); color: var(--green); }
.badge-estado.deuda { background: var(--red-bg); color: var(--red); }
.badge-estado.abono { background: var(--amber-bg); color: var(--amber); }

.card-total-wrap { display: flex; flex-direction: column; align-items: flex-end; }
.card-total {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--txt2);
}
.card-sub {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.62rem;
  color: var(--txt3);
}

.chevron {
  color: var(--txt3);
  font-size: 0.7rem;
  transition: transform 0.2s;
}

/* Items expandidos */
.card-body {
  overflow: hidden;
  max-height: 0;
  transition: max-height 0.28s ease;
  border-top: 0 solid var(--border);
}

.card-body.open {
  max-height: 500px;
  border-top-width: 1px;
}

.dia-bloque { padding: 8px 12px; }

.dia-label {
  font-size: 0.65rem;
  font-weight: 600;
  color: var(--txt3);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 4px;
}

.item-line {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 0.8rem;
  color: var(--txt2);
  padding: 4px 0;
  border-bottom: 1px solid rgba(0,0,0,0.04);
  gap: 8px;
}
.item-line:last-child { border-bottom: none; }
.item-info { display: flex; flex-direction: column; gap: 1px; min-width: 0; }
.item-nombre { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.item-nombre.traslado { font-style: italic; color: var(--amber); }
.item-hora {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.62rem;
  color: var(--txt3);
  letter-spacing: 0.02em;
}
.item-precio { font-family: 'JetBrains Mono', monospace; color: var(--txt); font-size: 0.78rem; flex-shrink: 0; }

.abono-bloque { padding: 8px 12px; border-top: 1px dashed var(--border2); }
.abono-line {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 0.8rem; color: var(--green); padding: 3px 0;
}

/* Toast / notificación */
.toast {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--surface3);
  border: 1px solid var(--border2);
  color: var(--txt);
  padding: 9px 18px;
  border-radius: 20px;
  font-size: 0.82rem;
  opacity: 0;
  transition: all 0.3s;
  pointer-events: none;
  z-index: 99;
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── PANEL CATÁLOGO ── */
.panel-catalogo {
  display: none;
  flex-direction: column;
  overflow-y: auto;
  background: var(--surface);
  min-height: 0;
  flex: 1;
}
.layout.show-catalogo .panel-catalogo { display: flex; }

.cat-add-row {
  display: flex; gap: 6px; margin-top: 4px;
}
.cat-add-row input {
  padding: 8px 10px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 0.82rem;
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--txt);
  min-width: 0;
}
.cat-add-row input.nombre { flex: 2; }
.cat-add-row input.precio { flex: 1; }
.cat-add-row button {
  padding: 8px 14px;
  border-radius: 8px;
  border: none;
  background: var(--accent);
  color: #fff;
  font-weight: 600;
  font-size: 0.85rem;
  cursor: pointer;
  flex-shrink: 0;
}

.cat-item-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  font-size: 0.85rem;
}
.cat-item-nombre { text-transform: capitalize; color: var(--txt); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.cat-item-precio { font-family: 'JetBrains Mono', monospace; color: var(--txt2); flex-shrink: 0; }
.cat-item-del {
  width: 26px; height: 26px;
  border-radius: 6px;
  border: 1px solid var(--border2);
  background: var(--bg);
  color: var(--red);
  cursor: pointer;
  flex-shrink: 0;
  font-size: 0.8rem;
  display: flex; align-items: center; justify-content: center;
}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo">
    <div class="logo-icon">F</div>
    <div>
      <div>FiadoApp</div>
      <div class="logo-sub">Control semanal de crédito</div>
    </div>
  </div>
  <div class="semana-nav">
    <button class="semana-arrow" id="semana-prev" title="Semana anterior">‹</button>
    <div class="semana-chip" id="semana-chip">—</div>
    <button class="semana-arrow" id="semana-next" title="Semana siguiente">›</button>
    <input type="date" id="semana-date-input" class="semana-date-input">
  </div>
</div>

<!-- TABS -->
<div class="tabs-mobile">
  <button class="tab-btn active" id="tab-chat" data-tab="chat">💬 Chat</button>
  <button class="tab-btn" id="tab-cuentas" data-tab="cuentas">📊 Resumen <span class="tab-badge" id="tab-badge">0</span></button>
  <button class="tab-btn" id="tab-catalogo" data-tab="catalogo">📦 Catálogo</button>
</div>

<!-- LAYOUT -->
<div class="layout" id="layout">

  <!-- CHAT -->
  <div class="panel-chat">
    <div class="chat-feed" id="chat-feed"></div>

    <div class="chat-input-wrap">
      <div class="pendiente-banner" id="pendiente-banner">🔒 Esperando confirmación...</div>
      <div class="input-box">
        <textarea
          id="chat-input"
          placeholder="Ej: Agrega leche $25 a Rosa, ¿cuánto lleva María?..."
          rows="1"
        ></textarea>
        <div class="input-actions">
          <button class="btn-mic" id="btn-mic" title="Hablar">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><rect x="9" y="2" width="6" height="11" rx="3" stroke="currentColor" stroke-width="2"/><path d="M5 10a7 7 0 0014 0" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="12" y1="21" x2="12" y2="17" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="8" y1="21" x2="16" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          </button>
          <button class="btn-send" id="btn-send" title="Enviar">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M22 2L11 13" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/><path d="M22 2L15 22 11 13 2 9l20-7z" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>
      </div>
      <div class="mic-hint" id="mic-hint">🔴 Grabando...</div>
    </div>
  </div>

  <!-- CUENTAS -->

// ════════════ ESTADO ════════════
const DIAS = ['lunes','martes','miércoles','jueves','viernes','sábado','domingo'];
const PASSWORD_NORM = 'yo soy petra';

function lunesDeHoy() {
  const hoy = new Date();
  const d = hoy.getDay();
  const diff = d === 0 ? -6 : 1 - d;
  const lun = new Date(hoy); lun.setDate(hoy.getDate() + diff);
  lun.setHours(0,0,0,0);
  return lun;
}

function lunesDeFecha(dateObj) {
  const d = dateObj.getDay();
  const diff = d === 0 ? -6 : 1 - d;
  const lun = new Date(dateObj); lun.setDate(dateObj.getDate() + diff);
  lun.setHours(0,0,0,0);
  return lun;
}

function claveDeSemana(lunes) { return lunes.toISOString().slice(0,10); }

function formatSemana(lunes) {
  const dom = new Date(lunes); dom.setDate(lunes.getDate() + 6);
  const f = dt => dt.toLocaleDateString('es-MX',{day:'2-digit',month:'short'}).toUpperCase();
  return `${f(lunes)} – ${f(dom)}`;
}

const E = {
  personas: {},          // { nombre: { periodos: { 'YYYY-MM-DD': {items:[], abonos:[], pagado:bool, trasladado:bool} } } }
  catalogoProductos: {}, // { nombreNormalizado: {nombre, precio} }
  catalogoClientes: {},  // { nombreNormalizado: {nombre} }
  semanaLunes: lunesDeHoy(),
  historial: [],
  pendienteAccion: null  // { tipo: 'password'|'confirmarProducto', ... }
};

Object.defineProperty(E, 'semana', { get() { return formatSemana(this.semanaLunes); } });
Object.defineProperty(E, 'clave', { get() { return claveDeSemana(this.semanaLunes); } });

// ════════════ UTILIDADES DE TEXTO ════════════
function norm(s) {
  return (s||'').toString().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();
}
function cap(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : ''; }

function distanciaLevenshtein(a, b) {
  const m = a.length, n = b.length;
  const dp = Array.from({length: m+1}, (_,i) => [i, ...Array(n).fill(0)]);
  for (let j=0;j<=n;j++) dp[0][j] = j;
  for (let i=1;i<=m;i++) {
    for (let j=1;j<=n;j++) {
      dp[i][j] = a[i-1]===b[j-1] ? dp[i-1][j-1] : 1 + Math.min(dp[i-1][j-1], dp[i-1][j], dp[i][j-1]);
    }
  }
  return dp[m][n];
}
function similitud(a, b) {
  const na = norm(a), nb = norm(b);
  if (!na.length && !nb.length) return 1;
  const dist = distanciaLevenshtein(na, nb);
  return 1 - dist / Math.max(na.length, nb.length, 1);
}

// ════════════ PERSISTENCIA LOCAL ════════════
const STORAGE_KEY = 'fiadoapp_estado_v2';

function guardarEstado() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      personas: E.personas,
      catalogoProductos: E.catalogoProductos,
      catalogoClientes: E.catalogoClientes,
      historial: E.historial,
      semanaLunes: E.semanaLunes.toISOString()

  } catch (e) {
    console.warn('No se pudo guardar en local:', e);
    if (e.name === 'QuotaExceededError') toast('⚠️ Espacio local lleno, no se pudo guardar');
  }
}

function cargarEstado() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) {
      // Intentar migrar de una versión anterior (v1) si existe
      migrarV1();
      return;
    }
    const data = JSON.parse(raw);
    if (data.personas && typeof data.personas === 'object') E.personas = data.personas;
    if (data.catalogoProductos) E.catalogoProductos = data.catalogoProductos;
    if (data.catalogoClientes) E.catalogoClientes = data.catalogoClientes;
    if (Array.isArray(data.historial)) E.historial = data.historial;
    if (data.semanaLunes) {
      const f = new Date(data.semanaLunes);
      if (!isNaN(f)) E.semanaLunes = f;
    }
  } catch (e) {
    console.warn('No se pudo cargar el estado guardado:', e);
  }
}

function migrarV1() {
  try {
    const raw = localStorage.getItem('fiadoapp_estado_v1');
    if (!raw) return;
    const data = JSON.parse(raw);
    if (!data.personas) return;
    const clave = claveDeSemana(lunesDeHoy());
    Object.entries(data.personas).forEach(([nom, p]) => {
      E.personas[nom] = { periodos: { [clave]: { items: p.items||[], abonos: [], pagado: !!p.pagado, trasladado:false } } };
    });
    if (Array.isArray(data.historial)) E.historial = data.historial;
    guardarEstado();
  } catch(e) { console.warn('Migración v1 falló', e); }
}

cargarEstado();

function setSemana(nuevoLunes) {

function moverSemana(pasos) {

function diaHoy() {
  const d = new Date().getDay();
  return DIAS[d === 0 ? 6 : d - 1];
}

// ════════════ HELPERS DE PERIODO ════════════
function getPeriodo(persona, clave) {
  if (!persona.periodos) persona.periodos = {};
  if (!persona.periodos[clave]) persona.periodos[clave] = { items: [], abonos: [], pagado: false, trasladado: false };
  return persona.periodos[clave];
}
function leerPeriodo(persona, clave) { return persona.periodos ? persona.periodos[clave] : undefined; }

function totalItems(per) { return (per.items||[]).reduce((s,i)=>s+i.precio*(i.qty||1),0); }
function totalAbonos(per) { return (per.abonos||[]).reduce((s,ab)=>s+ab.monto,0); }
function saldoPeriodo(per) { return totalItems(per) - totalAbonos(per); }
function estaPagado(per) { return per.pagado || saldoPeriodo(per) <= 0.5; }

function formatHora(fecha) {
  const d = fecha instanceof Date ? fecha : new Date(fecha);
  if (isNaN(d)) return '';
  return d.toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' });
}
function formatFechaCorta(fecha) {
  const d = fecha instanceof Date ? fecha : new Date(fecha);
  if (isNaN(d)) return '';
  return d.toLocaleDateString('es-MX', { day: '2-digit', month: 'short' }).toUpperCase();
}

// ════════════ TRASLADO AUTOMÁTICO DE SALDOS ════════════
function siguienteClave(clave) {
  const f = new Date(clave + 'T00:00:00');
  f.setDate(f.getDate() + 7);
  return claveDeSemana(f);
}

function aplicarTrasladosUnaVez() {
  const hoyClave = claveDeSemana(lunesDeHoy());
  let cambio = false;
  Object.values(E.personas).forEach(p => {
    if (!p.periodos) return;
    Object.keys(p.periodos).sort().forEach(clave => {
      if (clave >= hoyClave) return; // solo periodos ya pasados respecto a la fecha real
      const per = p.periodos[clave];
      if (per.trasladado) return;
      const saldo = saldoPeriodo(per);
      if (saldo > 0.5) {
        const claveSig = siguienteClave(clave);
        const perSig = getPeriodo(p, claveSig);
        perSig.items.push({ dia:'lunes', producto:'Saldo semana anterior', precio: Math.round(saldo*100)/100, qty:1, fecha: new Date().toISOString(), traslado:true });
        per.trasladado = true;
        cambio = true;
      } else {
        per.trasladado = true;
      }
    });
  });
  return cambio;
}

function ejecutarTraslados() {
  let vueltas = 0;
  while (aplicarTrasladosUnaVez() && vueltas < 30) vueltas++;
}

function trasladarManual(nombre, montoOpcional) {
  const nom = norm(nombre);
  if (!E.personas[nom]) return false;
  const per = getPeriodo(E.personas[nom], E.clave);
  const saldo = saldoPeriodo(per);
  const monto = (montoOpcional && montoOpcional > 0) ? Math.min(montoOpcional, Math.max(saldo,0)) : saldo;
  if (monto <= 0) return false;
  const claveSig = siguienteClave(E.clave);
  const perSig = getPeriodo(E.personas[nom], claveSig);
  perSig.items.push({ dia:'lunes', producto:'Saldo trasladado', precio: Math.round(monto*100)/100, qty:1, fecha:new Date().toISOString(), traslado:true });
  // Se registra un abono "virtual" en el periodo actual por el monto trasladado, para no duplicar el saldo
  per.abonos.push({ monto, fecha: new Date().toISOString(), esTraslado:true });
  per.trasladado = true;
  E.historial.push(`Traslado: ${nom} $${monto} → semana siguiente`);
  return true;
}

// ════════════ CATÁLOGO — FUZZY MATCH ════════════
function buscarProductoParecido(nombre) {
  const nlow = norm(nombre);
  let mejor = null;
  Object.values(E.catalogoProductos).forEach(prod => {
    if (norm(prod.nombre) === nlow) return;
    const s = similitud(prod.nombre, nombre);
    if (!mejor || s > mejor.sim) mejor = { ...prod, sim: s };
  });
  return mejor;
}

REGLAS DE INTERPRETACIÓN:
- "ponle / agrega / apúntale X a Y" → agregar

- "pásalo / trasládalo / que lo pague la próxima semana / anótaselo para después" → trasladar (con "monto" si especifica cuánto, si no se traslada todo el saldo pendiente)

- "¿cuánto lleva / debe / tiene?" → noop + respuesta con detalle (menciona si abonó algo)
- "reporte / todo / resumen" → noop + tabla tipo semana
- "¿quién pagó? / ¿cuántos pagaron?" → noop + tabla tipo pagos
- "¿cuánto cobro / debo cobrar?" → noop + total adeudado
- "cambia/muéstrame la semana pasada/anterior" → periodo con periodo_direccion:"anterior"

REGLA DE PRECIOS Y CATÁLOGO:

- Si el producto NO está en el catálogo y el usuario no da precio, NO generes ninguna acción "agregar". Deja "acciones": [] y en "respuesta" pregunta el precio (ej: "¿Cuánto cuesta la fresca? En cuanto me digas, se la agrego a Chuy."). Nunca digas "apuntado" o "listo" si todavía no hay precio.
- Cuando el usuario responda con el precio, genera UNA SOLA acción "agregar" con ese precio, usando el contexto de los mensajes anteriores para persona y producto.
- Siempre responde los montos en pesos, ejemplo: "$50" (el sistema agrega la palabra "pesos" al hablarlo, tú NO escribas la palabra "pesos" después del signo $ para evitar redundancia).

REGLA DE PRODUCTOS AMBIGUOS O EXTRAÑOS (importante, sobre todo por errores de transcripción de voz):
- Si el nombre de producto que dice el usuario no se parece a ningún producto conocido del catálogo, ni suena a un producto real de tienda (palabras sueltas raras, algo genérico como "eso", "una cosa", "unas ahoritas", o algo que parece mal transcrito), NO generes la acción "agregar" ni preguntes solo el precio. En su lugar, dale "acciones": [] y en "respuesta" pregunta específicamente a qué producto se refiere, sugiriendo 1-2 opciones parecidas del catálogo si las hay (ej: "No reconozco 'ahoritas' como producto, ¿te refieres a alguno del catálogo o es algo nuevo? Dime el nombre correcto."). Solo procede a agregar cuando el nombre del producto quede claro.`;

const GROQ_KEYS = [
  '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',

];
let groqKeyIdx = 0;

async function groqFetch(payload) {
  let lastErr = null;
  for (let i = 0; i < GROQ_KEYS.length; i++) {
    const key = GROQ_KEYS[(groqKeyIdx + i) % GROQ_KEYS.length];
    try {
      const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${key}`
        },
        body: JSON.stringify(payload)
      });
      if (res.status === 401 || res.status === 429 || res.status >= 500) {
        lastErr = new Error(`Groq key #${i+1} falló (${res.status})`);
        continue;
      }
      if (!res.ok) {
        lastErr = new Error(`Groq error ${res.status}`);
        continue;
      }
      groqKeyIdx = (groqKeyIdx + i) % GROQ_KEYS.length;
      return await res.json();
    } catch (e) {
      lastErr = e;
    }
  }
  throw lastErr || new Error('Todas las keys de Groq fallaron');
}

async function callIA(msg) {

  const data = await groqFetch({
    model: 'llama-3.3-70b-versatile',

    max_tokens: 1000,
    response_format: { type: 'json_object' },
    messages: [
      { role: 'system', content: buildSystem() },
      ...histChat
    ]
  });
  const raw = data.choices?.[0]?.message?.content || '{}';
  histChat.push({ role:'assistant', content: raw });
  const clean = raw.replace(/```json|```/gi,'').trim();
  return JSON.parse(clean);
}

function buscarItem(per, nombre) {
  if (!nombre) return per.items.length - 1;
  const n = norm(nombre);
  for (let i = per.items.length-1; i >= 0; i--) {
    if (norm(per.items[i].producto||'').includes(n)) return i;
  }
  return -1;
}

function aplicarAgregar(a, precioForzado, nombreForzado) {
  if (!a.persona) return;
  const nom = norm(a.persona);
  const nombreProd = nombreForzado || a.producto;
  if (!nombreProd) return;
  const nlow = norm(nombreProd);
  let precioNum = Number(precioForzado !== undefined ? precioForzado : a.precio);
  if (!precioNum || isNaN(precioNum) || precioNum <= 0) {
    const cat = E.catalogoProductos[nlow];
    if (cat && cat.precio > 0) precioNum = cat.precio;
    else return; // sin precio disponible, no se agrega
  } else if (!E.catalogoProductos[nlow]) {
    E.catalogoProductos[nlow] = { nombre: nombreProd, precio: precioNum };
  }
  if (!E.catalogoClientes[nom]) E.catalogoClientes[nom] = { nombre: a.persona };
  if (!E.personas[nom]) E.personas[nom] = { periodos: {} };
  const per = getPeriodo(E.personas[nom], E.clave);
  const dia = a.dia || diaHoy();
  const ahora = new Date();
  per.items.push({ dia, producto: nombreProd, precio: precioNum, qty: Number(a.qty)||1, fecha: ahora.toISOString() });
  E.historial.push(`+${nombreProd} $${precioNum} → ${nom} [${dia} ${formatHora(ahora)}]`);
}

// Acciones destructivas ejecutadas SOLO tras confirmar contraseña
function ejecutarDirecta(acciones) {
  acciones.forEach(a => {
    const tipo = a.tipo;
    if (tipo === 'eliminar') {
      const nom = a.persona ? norm(a.persona) : null;
      if (!nom || !E.personas[nom]) return;
      const per = getPeriodo(E.personas[nom], E.clave);
      const idx = a.idx !== undefined ? a.idx : per.items.length - 1;
      if (per.items[idx]) { const el = per.items.splice(idx,1)[0]; E.historial.push(`Eliminado: ${el.producto} de ${nom}`); }
    } else if (tipo === 'eliminar_persona') {
      const nom = a.persona ? norm(a.persona) : null;
      if (!nom || !E.personas[nom]) return;
      delete E.personas[nom];
      E.historial.push(`Registros eliminados por completo: ${nom}`);
    } else if (tipo === 'eliminar_todo') {
      E.personas = {};
      E.historial.push('TODOS los registros de todos los clientes fueron eliminados');
    } else if (tipo === 'eliminar_producto_catalogo') {
      delete E.catalogoProductos[norm(a.producto)];
      E.historial.push(`Producto eliminado del catálogo: ${a.producto}`);
    } else if (tipo === 'eliminar_cliente_catalogo') {
      delete E.catalogoClientes[norm(a.persona)];
      E.historial.push(`Cliente eliminado del catálogo: ${a.persona}`);
    } else if (tipo === 'fusionar_producto') {
      const nlowElim = norm(a.eliminar);
      const nlowMant = norm(a.mantener);
      const mant = E.catalogoProductos[nlowMant];
      const nombreFinal = mant ? mant.nombre : a.mantener;
      delete E.catalogoProductos[nlowElim];
      Object.values(E.personas).forEach(p => {
        Object.values(p.periodos||{}).forEach(per => {
          (per.items||[]).forEach(it => { if (norm(it.producto) === nlowElim) it.producto = nombreFinal; });
        });
      });
      E.historial.push(`Productos fusionados: "${a.eliminar}" → "${nombreFinal}"`);
    }
  });
}

function describirAccionDestructiva(a) {
  switch (a.tipo) {
    case 'eliminar': return `el último ítem${a.producto ? ` ("${a.producto}")` : ''} de ${cap(a.persona||'')}`;
    case 'eliminar_persona': return `todos los registros de ${cap(a.persona||'')}`;
    case 'eliminar_todo': return 'TODOS los registros de todos los clientes';
    case 'eliminar_producto_catalogo': return `el producto "${cap(a.producto||'')}" del catálogo`;
    case 'eliminar_cliente_catalogo': return `el cliente "${cap(a.persona||'')}" del catálogo`;
    case 'fusionar_producto': return `fusionar "${cap(a.eliminar||'')}" dentro de "${cap(a.mantener||'')}"`;
    default: return 'esta acción';
  }
}

// Devuelve { mensajeExtra } — puede dejar E.pendienteAccion listo para la siguiente respuesta del usuario
function ejecutar(acciones) {
  const resultado = { mensajeExtra: '' };
  const destructivas = [];
  let productoAmbiguo = null;

  for (const a of (acciones||[])) {
    const tipo = a.tipo;
    if (tipo === 'noop') continue;

    if (tipo === 'periodo') {
      if (a.periodo_direccion === 'anterior') moverSemana(-1);
      else if (a.periodo_direccion === 'siguiente') moverSemana(1);
      else if (a.periodo_direccion === 'actual') setSemana(lunesDeHoy());
      else if (a.periodo_fecha) {
        const f = new Date(a.periodo_fecha + 'T00:00:00');
        if (!isNaN(f)) setSemana(f);
      }
      E.historial.push(`Periodo cambiado a: ${E.semana}`);
      continue;
    }

    // ── Acciones destructivas: se acumulan, requieren UNA sola confirmación con contraseña ──
    if (['eliminar','eliminar_persona','eliminar_todo','eliminar_producto_catalogo','eliminar_cliente_catalogo','fusionar_producto'].includes(tipo)) {
      destructivas.push(a);
      continue;
    }

    if (tipo === 'registrar_producto') {
      if (!a.producto) continue;
      const nlow = norm(a.producto);
      const exacto = E.catalogoProductos[nlow];
      if (!exacto && !productoAmbiguo) {
        const parecido = buscarProductoParecido(a.producto);
        if (parecido && parecido.sim >= 0.6 && parecido.sim < 0.95) {
          productoAmbiguo = { accionOriginal: { tipo:'registrar_producto', producto:a.producto, precio:a.precio }, candidato: parecido };
          continue;
        }
      }
      const precioR = Number(a.precio);
      if (precioR > 0) E.catalogoProductos[nlow] = { nombre: a.producto, precio: precioR };
      continue;
    }

    if (tipo === 'registrar_cliente') {
      if (a.persona) E.catalogoClientes[norm(a.persona)] = { nombre: a.persona };
      continue;
    }

    if (tipo === 'agregar') {
      const nombreProd = a.producto;
      if (nombreProd && !productoAmbiguo) {
        const nlow = norm(nombreProd);
        if (!E.catalogoProductos[nlow]) {
          const parecido = buscarProductoParecido(nombreProd);
          if (parecido && parecido.sim >= 0.6 && parecido.sim < 0.95) {
            productoAmbiguo = { accionOriginal: a, candidato: parecido };
            continue;
          }
        }
      }
      aplicarAgregar(a);
      continue;
    }

    if (!a.persona) continue;
    const nom = norm(a.persona);
    if (!E.personas[nom]) E.personas[nom] = { periodos: {} };
    const per = getPeriodo(E.personas[nom], E.clave);

    if (tipo === 'precio') {
      const idx = a.idx !== undefined ? a.idx : buscarItem(per, a.producto);
      if (idx >= 0) { const v = per.items[idx].precio; per.items[idx].precio = Number(a.precio); E.historial.push(`Precio ${per.items[idx].producto}/${nom}: $${v}→$${a.precio}`); }
    } else if (tipo === 'pago') {
      per.pagado = true; E.historial.push(`✓ ${nom} PAGÓ`);
    } else if (tipo === 'pago_parcial') {
      const monto = Number(a.monto);
      if (monto > 0) {
        per.abonos.push({ monto, fecha: new Date().toISOString() });
        if (saldoPeriodo(per) <= 0.5) per.pagado = true;
        E.historial.push(`Abono de $${monto} → ${nom}`);
      }
    } else if (tipo === 'nopago') {
      per.pagado = false; E.historial.push(`✗ ${nom} no pagó`);
    } else if (tipo === 'trasladar') {
      const ok = trasladarManual(nom, Number(a.monto) || null);
      if (!ok) resultado.mensajeExtra = 'No hay saldo pendiente para trasladar.';
    } else if (tipo === 'corregir') {
      const idx = a.idx !== undefined ? a.idx : (buscarItem(per, a.producto) >= 0 ? buscarItem(per, a.producto) : per.items.length-1);
      if (per.items[idx]) {
        const old = {...per.items[idx]};
        if (a.producto) per.items[idx].producto = a.producto;
        if (a.precio) per.items[idx].precio = Number(a.precio);
        if (a.qty) per.items[idx].qty = Number(a.qty);
        E.historial.push(`Corregido ${nom}: ${old.producto}→${per.items[idx].producto}`);
      }
    }
  }

  // Si hubo producto ambiguo, tiene prioridad (se resuelve antes de cualquier otra cosa)
  if (productoAmbiguo) {
    E.pendienteAccion = { tipo:'confirmarProducto', accionOriginal: productoAmbiguo.accionOriginal, candidato: productoAmbiguo.candidato };
    resultado.mensajeExtra = `¿"${cap(productoAmbiguo.accionOriginal.producto)}" es lo mismo que "${cap(productoAmbiguo.candidato.nombre)}" (ya en catálogo) o es un producto diferente?`;
    return resultado;
  }

  if (destructivas.length) {
    E.pendienteAccion = { tipo: 'password', acciones: destructivas };
    const lista = destructivas.map(describirAccionDestructiva).join('; ');
    resultado.mensajeExtra = `Se eliminará: ${lista}.\n🔒 Para confirmar, dime la contraseña (puedes usar el micrófono 🎤). No la escribiré aquí por seguridad.`;
  }

  return resultado;
}

// ════════════ MANEJO DE CONFIRMACIONES PENDIENTES (sin llamar a la IA) ════════════
function manejarPendiente(msgRaw) {
  const pend = E.pendienteAccion;
  E.pendienteAccion = null;
  addMsg('user', msgRaw);
  const msg = norm(msgRaw);

  if (pend.tipo === 'password') {
    if (msg.includes(PASSWORD_NORM)) {
      ejecutarDirecta(pend.acciones);
      renderCuentas();
      renderCatalogo();
      const r = 'Listo, se realizó la eliminación.';
      addMsg('ia', r); hablar(r);
    } else {
      const r = 'Contraseña incorrecta. No se eliminó nada.';
      addMsg('ia', r); hablar(r);
    }
    actualizarBannerPendiente();
    return;
  }

  if (pend.tipo === 'confirmarProducto') {
    const a = pend.accionOriginal;
    const esMismo = /mismo|igual|^si\b|^s[ií]$/.test(msg);
    if (esMismo) {
      if (a.tipo === 'registrar_producto') {
        // no crear nuevo, ya existe con ese nombre
        const r = `Listo, "${cap(a.producto)}" queda igual que "${cap(pend.candidato.nombre)}".`;
        addMsg('ia', r); hablar(r);
      } else {
        aplicarAgregar(a, a.precio || pend.candidato.precio, pend.candidato.nombre);
        renderCuentas();
        const r = `Listo, agregado como "${cap(pend.candidato.nombre)}".`;
        addMsg('ia', r); hablar(r);
      }
    } else {
      if (Number(a.precio) > 0) E.catalogoProductos[norm(a.producto)] = { nombre: a.producto, precio: Number(a.precio) };
      if (a.tipo === 'agregar') {
        aplicarAgregar(a);
        renderCuentas();
      }
      const r = `Listo, registrado "${cap(a.producto)}" como producto nuevo.`;
      addMsg('ia', r); hablar(r);
    }
    renderCatalogo();
    actualizarBannerPendiente();
    return;
  }
}

function actualizarBannerPendiente() {
  const banner = document.getElementById('pendiente-banner');
  if (E.pendienteAccion) {
    banner.textContent = E.pendienteAccion.tipo === 'password' ? '🔒 Esperando confirmación (dila por voz o texto)' : '❓ Responde si es el mismo producto o uno diferente';
    banner.classList.add('show');
  } else {
    banner.classList.remove('show');
  }
}

function renderCuentas() {
  ejecutarTraslados();
  guardarEstado();
  const personas = Object.entries(E.personas).filter(([,d]) => leerPeriodo(d, E.clave));
  const list = document.getElementById('personas-list');
  const empty = document.getElementById('empty-state');

  let total = 0, cobrar = 0, pagCount = 0, noPagCount = 0;
  personas.forEach(([,d]) => {
    const per = leerPeriodo(d, E.clave);
    total += totalItems(per);
    const saldo = saldoPeriodo(per);
    if (saldo > 0) cobrar += saldo;
    if (estaPagado(per)) pagCount++; else noPagCount++;
  });

  document.getElementById('kpi-total').textContent = `$${total.toFixed(0)}`;
  document.getElementById('kpi-cobrar').textContent = `$${cobrar.toFixed(0)}`;
  document.getElementById('kpi-pagaron').textContent = pagCount;
  document.getElementById('kpi-adeudan').textContent = noPagCount;

  const badge = document.getElementById('tab-badge');
  if (noPagCount > 0) { badge.textContent = noPagCount; badge.classList.add('show'); }
  else { badge.classList.remove('show'); }

  if (!personas.length) {
    list.querySelectorAll('.card-persona').forEach(c => c.remove());
    empty.style.display = 'flex';
    return;
  }
  empty.style.display = 'none';

  // Quitar tarjetas de personas que ya no están en este periodo
  const nombresActuales = new Set(personas.map(([n])=>n));
  list.querySelectorAll('.card-persona').forEach(c => { if (!nombresActuales.has(c.getAttribute('data-n'))) c.remove(); });

  personas.forEach(([nom, data]) => {
    const per = leerPeriodo(data, E.clave);
    let card = list.querySelector(`[data-n="${nom}"]`);
    const tot = totalItems(per);
    const abonado = totalAbonos(per);
    const saldo = saldoPeriodo(per);
    const pagado = estaPagado(per);

    if (!card) {
      card = document.createElement('div');
      card.setAttribute('data-n', nom);
      card.className = 'card-persona';
      list.appendChild(card);
    }

    const porDia = {};
    (per.items||[]).forEach(it => { (porDia[it.dia] = porDia[it.dia]||[]).push(it); });

    const bodyOpen = card.querySelector('.card-body')?.classList.contains('open');

    let estadoClase = 'adeuda', badgeClase = 'deuda', badgeTxt = 'Adeuda';
    if (pagado) { estadoClase = 'pagado'; badgeClase = 'pago'; badgeTxt = '✓ Pagó'; }
    else if (abonado > 0) { estadoClase = 'abono'; badgeClase = 'abono'; badgeTxt = 'Abonó'; }

    card.className = `card-persona ${estadoClase}`;
    card.innerHTML = `
      <div class="card-head">
        <div class="card-nombre">${cap(nom)}</div>
        <div class="card-right">
          <span class="badge-estado ${badgeClase}">${badgeTxt}</span>
          <div class="card-total-wrap">
            <span class="card-total">$${(pagado ? tot : saldo).toFixed(0)}</span>
            ${(!pagado && abonado > 0) ? `<span class="card-sub">de $${tot.toFixed(0)}</span>` : ''}
          </div>
          <span class="chevron">${bodyOpen ? '▲' : '▼'}</span>
        </div>
      </div>
      <div class="card-body${bodyOpen ? ' open' : ''}">
        ${DIAS.filter(d => porDia[d]).map(dia => `
          <div class="dia-bloque">
            <div class="dia-label">${dia}${porDia[dia][0]?.fecha ? ' · ' + formatFechaCorta(porDia[dia][0].fecha) : ''}</div>
            ${porDia[dia].map(it => `
              <div class="item-line">
                <div class="item-info">
                  <span class="item-nombre${it.traslado ? ' traslado' : ''}">${it.qty > 1 ? it.qty+'× ' : ''}${it.producto}</span>
                  ${it.fecha ? `<span class="item-hora">${formatHora(it.fecha)}</span>` : ''}
                </div>
                <span class="item-precio">$${(it.precio*(it.qty||1)).toFixed(0)}</span>
              </div>
            `).join('')}
          </div>
        `).join('')}
        ${(per.abonos||[]).length ? `
          <div class="abono-bloque">
            <div class="dia-label">Abonos</div>
            ${per.abonos.map(ab => `<div class="abono-line"><span>${ab.esTraslado?'Trasladado':'Abono'} · ${formatFechaCorta(ab.fecha)}</span><span>-$${ab.monto.toFixed(0)}</span></div>`).join('')}
          </div>
        ` : ''}
      </div>
    `;

    card.querySelector('.card-head').addEventListener('click', () => {
      const body = card.querySelector('.card-body');
      body.classList.toggle('open');
      card.querySelector('.chevron').textContent = body.classList.contains('open') ? '▲' : '▼';
    });
  });
}

// ════════════ VOZ SÍNTESIS ════════════
function elegirVoz(vs) {
  const prioridades = [
    v => /Google/i.test(v.name) && /es[-_](MX|419)/i.test(v.lang),
    v => /Natural|Online|Neural|Wavenet/i.test(v.name) && /es[-_](MX|419)/i.test(v.lang),
    v => /Google/i.test(v.name) && /^es/i.test(v.lang),
    v => /Natural|Online|Neural|Wavenet/i.test(v.name) && /^es/i.test(v.lang),
    v => /es[-_](MX|419)/i.test(v.lang),
    v => /^es/i.test(v.lang)
  ];
  for (const test of prioridades) {
    const found = vs.find(test);
    if (found) return found;
  }
  return null;
}

function hablar(txt) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  // Convierte "$50" o "$50 pesos" en "50 pesos" (evita duplicar "pesos pesos")
  const limpio = txt.replace(/\$\s?(\d+(?:[.,]\d+)?)(\s*pesos)?/gi, '$1 pesos');
  const u = new SpeechSynthesisUtterance(limpio);
  u.rate = 1.03;
  u.pitch = 1;
  const vs = speechSynthesis.getVoices();
  const v = elegirVoz(vs);
  if (v) { u.voice = v; u.lang = v.lang; } else { u.lang = 'es-MX'; }
  speechSynthesis.speak(u);
}

// ════════════ MICRÓFONO (grabación + Whisper vía Groq) ════════════
let mediaRecorder = null;
let micStream = null;
let audioChunks = [];
let grabandoAudio = false;

function mimeSoportado() {
  const candidatos = ['audio/webm;codecs=opus', 'audio/webm', 'audio/mp4', 'audio/ogg;codecs=opus'];
  for (const t of candidatos) {
    if (window.MediaRecorder && MediaRecorder.isTypeSupported(t)) return t;
  }
  return '';
}

async function toggleMic() {
  if (grabandoAudio) { detenerGrabacion(); return; }

  if (!window.isSecureContext) {
    toast('El micrófono requiere HTTPS. Abre la app desde tu link de Vercel, no como archivo local.');
    return;
  }
  if (!navigator.mediaDevices?.getUserMedia || !window.MediaRecorder) {
    toast('Este navegador no soporta grabación de audio.');
    return;
  }

  try {
    micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch (err) {
    console.warn('Mic permission denied:', err);
    if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
      toast('Bloqueaste el micrófono. Actívalo en los ajustes del sitio (ícono junto a la URL).');
    } else if (err.name === 'NotFoundError') {
      toast('No se detectó ningún micrófono en este dispositivo.');
    } else {
      toast('No se pudo acceder al micrófono: ' + err.message);
    }
    return;
  }

  const mimeType = mimeSoportado();
  audioChunks = [];
  try {
    mediaRecorder = mimeType ? new MediaRecorder(micStream, { mimeType }) : new MediaRecorder(micStream);
  } catch (e) {
    toast('No se pudo iniciar la grabación');
    micStream.getTracks().forEach(t => t.stop());
    return;
  }

  mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
  mediaRecorder.onstop = procesarAudio;
  mediaRecorder.start();

  grabandoAudio = true;
  document.getElementById('btn-mic').classList.add('grabando');
  const hint = document.getElementById('mic-hint');
  hint.textContent = '🔴 Grabando... toca el micrófono otra vez para detener';
  hint.classList.add('visible');
}

function detenerGrabacion() {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
  grabandoAudio = false;
  document.getElementById('btn-mic').classList.remove('grabando');
}

async function procesarAudio() {
  micStream?.getTracks().forEach(t => t.stop());
  const hint = document.getElementById('mic-hint');
  hint.textContent = '⏳ Transcribiendo...';

  const blob = new Blob(audioChunks, { type: mediaRecorder.mimeType || 'audio/webm' });
  audioChunks = [];

  if (blob.size < 800) {
    hint.classList.remove('visible');
    toast('No se detectó audio, intenta de nuevo');
    return;
  }

  try {
    const texto = (await groqTranscribe(blob)).trim();
    hint.classList.remove('visible');
    if (!texto) { toast('No entendí, intenta de nuevo'); return; }
    const inp = document.getElementById('chat-input');
    inp.value = texto;
    inp.dispatchEvent(new Event('input'));
    enviar();
  } catch (e) {
    hint.classList.remove('visible');
    toast('Error al transcribir, intenta de nuevo');
    console.error(e);
  }
}

async function groqTranscribe(blob) {
  const ext = blob.type.includes('mp4') ? 'm4a' : blob.type.includes('ogg') ? 'ogg' : 'webm';
  let lastErr = null;
  for (let i = 0; i < GROQ_KEYS.length; i++) {
    const key = GROQ_KEYS[(groqKeyIdx + i) % GROQ_KEYS.length];
    try {
      const fd = new FormData();
      fd.append('file', blob, `audio.${ext}`);
      fd.append('model', 'whisper-large-v3');
      fd.append('language', 'es');
      fd.append('temperature', '0');
      fd.append('response_format', 'json');
      fd.append('prompt', 'Tienda de fiado semanal. Nombres de clientes, productos y precios en pesos mexicanos.');

      const res = await fetch('https://api.groq.com/openai/v1/audio/transcriptions', {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${key}` },
        body: fd
      });
      if (res.status === 401 || res.status === 429 || res.status >= 500) {
        lastErr = new Error(`Groq key #${i+1} falló (${res.status})`);
        continue;
      }
      if (!res.ok) { lastErr = new Error(`Groq error ${res.status}`); continue; }
      groqKeyIdx = (groqKeyIdx + i) % GROQ_KEYS.length;
      const data = await res.json();
      return data.text || '';
    } catch (e) {
      lastErr = e;
    }
  }
  throw lastErr || new Error('Todas las keys de Groq fallaron');
}

// ════════════ FLUJO PRINCIPAL ════════════
let busy = false;

async function enviar() {
  if (busy) return;
  const inp = document.getElementById('chat-input');
  const msg = inp.value.trim();
  if (!msg) return;
  inp.value = ''; inp.style.height = 'auto';
  busy = true;

  if (E.pendienteAccion) {
    manejarPendiente(msg);
    busy = false;
    return;
  }

  addMsg('user', msg);
  showTyping();

  try {
    const r = await callIA(msg);
    hideTyping();
    let extra = '';
    if (r.acciones?.length) {
      const resultado = ejecutar(r.acciones);
      renderCuentas();
      renderCatalogo();
      extra = resultado.mensajeExtra;
    }
    const textoFinal = extra ? `${r.respuesta || '...'}\n\n${extra}` : (r.respuesta || '...');
    addMsg('ia', textoFinal, r.tabla);
    hablar(r.respuesta || extra || '');
    actualizarBannerPendiente();
  } catch(e) {
    hideTyping();
    const err = 'Hubo un error al procesar. Intenta de nuevo.';
    addMsg('ia', err);
    hablar(err);
    console.error(e);
  }

  busy = false;
}

// ════════════ PDF ════════════
function generarPDF() {
  const prs = Object.entries(E.personas).filter(([,d]) => leerPeriodo(d, E.clave));
  if (!prs.length) { toast('No hay registros para exportar'); return; }

  let total = 0, cobrar = 0, pagCount = 0, noPagCount = 0;
  const hoy = new Date().toLocaleDateString('es-MX',{weekday:'long',year:'numeric',month:'long',day:'numeric'});

  const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Reporte Semanal</title><style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:system-ui,sans-serif;background:#fff;color:#111;padding:32px;font-size:13px}
  .top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;padding-bottom:16px;border-bottom:2px solid #0D0F14}
  h1{font-size:20px;font-weight:700;letter-spacing:-.02em}
  .meta{color:#666;font-size:11px;margin-top:4px}
  .badge{font-size:10px;padding:3px 9px;border-radius:20px;font-weight:600}
  .verde{background:#D1FAE5;color:#065F46}.rojo{background:#FEE2E2;color:#991B1B}.amber{background:#FEF3C7;color:#92400E}
  .card{border:1px solid #E5E7EB;border-radius:8px;margin-bottom:14px;overflow:hidden;page-break-inside:avoid}
  .card-h{background:#0D0F14;color:#fff;padding:10px 16px;display:flex;justify-content:space-between;align-items:center}
  .card-h .nm{font-weight:600;font-size:14px}
  .card-h .tot{font-family:monospace;font-size:13px}
  table{width:100%;border-collapse:collapse}
  td{padding:6px 16px;border-bottom:1px solid #F3F4F6;font-size:12px}
  td:last-child{text-align:right;font-family:monospace}
  .dia-row td{background:#F9FAFB;color:#9CA3AF;font-size:10px;text-transform:uppercase;letter-spacing:.08em;font-weight:600}
  .total-row td{background:#EFF6FF;font-weight:700;color:#1D4ED8}
  .abono-row td{background:#ECFDF5;color:#065F46}
  .resumen{background:#0D0F14;color:#E8EAF0;border-radius:8px;padding:20px;margin-top:20px;display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .kpi{background:rgba(255,255,255,.06);border-radius:6px;padding:12px}
  .kpi-l{font-size:10px;color:#8B91A8;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
  .kpi-v{font-size:18px;font-weight:700;font-family:monospace}
  .kv-green{color:#22C55E}.kv-red{color:#EF4444}.kv-amber{color:#F59E0B}
  </style></head><body>
  <div class="top">
    <div>
      <h1>FiadoApp · Reporte Semanal</h1>
      <div class="meta">Semana: ${E.semana} &nbsp;|&nbsp; ${hoy}</div>
    </div>
  </div>
  ${prs.map(([nom,data])=>{
    const per = leerPeriodo(data, E.clave);
    const tot = totalItems(per);
    const abonado = totalAbonos(per);
    const saldo = saldoPeriodo(per);
    const pagado = estaPagado(per);
    total += tot; if (saldo>0) cobrar += saldo; if (pagado) pagCount++; else noPagCount++;
    const pd={};
    per.items.forEach(i=>{(pd[i.dia]=pd[i.dia]||[]).push(i);});
    const estadoBadge = pagado ? `<span class="badge verde">✓ Pagó</span>` : (abonado>0 ? `<span class="badge amber">Abonó $${abonado.toFixed(0)}</span>` : `<span class="badge rojo">Adeuda</span>`);
    return `<div class="card">
      <div class="card-h">
        <span class="nm">${cap(nom)}</span>
        <div style="display:flex;gap:10px;align-items:center">
          ${estadoBadge}
          <span class="tot">$${(pagado?tot:saldo).toFixed(0)}</span>
        </div>
      </div>
      <table>${DIAS.filter(d=>pd[d]).map(dia=>`
        <tr class="dia-row"><td colspan="2">${dia}</td></tr>
        ${pd[dia].map(i=>`<tr><td>${i.qty>1?i.qty+'× ':''}${i.producto}${i.fecha?` <span style="color:#9CA3AF;font-size:10px">(${formatHora(i.fecha)})</span>`:''}</td><td>$${(i.precio*(i.qty||1)).toFixed(0)}</td></tr>`).join('')}
      `).join('')}
      ${(per.abonos||[]).map(ab=>`<tr class="abono-row"><td>${ab.esTraslado?'Trasladado':'Abono'} (${formatFechaCorta(ab.fecha)})</td><td>-$${ab.monto.toFixed(0)}</td></tr>`).join('')}
      <tr class="total-row"><td>Saldo ${cap(nom)}</td><td>$${(pagado?0:saldo).toFixed(0)}</td></tr>
      </table></div>`;
  }).join('')}
  <div class="resumen">
    <div class="kpi"><div class="kpi-l">Total fiado</div><div class="kpi-v kv-amber">$${total.toFixed(0)}</div></div>
    <div class="kpi"><div class="kpi-l">Por cobrar</div><div class="kpi-v kv-red">$${cobrar.toFixed(0)}</div></div>
    <div class="kpi"><div class="kpi-l">Pagaron</div><div class="kpi-v kv-green">${pagCount} clientes</div></div>
    <div class="kpi"><div class="kpi-l">Adeudan</div><div class="kpi-v kv-red">${noPagCount} clientes</div></div>
  </div>
  <script>window.onload=()=>setTimeout(()=>window.print(),400)<\/script>
  </body></html>`;

  const w = window.open('','_blank');
  if (!w) { toast('Permite ventanas emergentes para el PDF'); return; }
  w.document.write(html);
  w.document.close();
}

  this.style.height = 'auto';

});

speechSynthesis?.getVoices();

document.getElementById('semana-chip').textContent = E.semana;

// ════════════ SALUDO PERSONALIZADO (corto) ════════════
const NOMBRE_DUENA = 'Petra';

function saludoPorHora() {
  const h = new Date().getHours();
  if (h >= 5 && h < 12) return 'Buenos días';
  if (h >= 12 && h < 19) return 'Buenas tardes';
  return 'Buenas noches';
}

function mostrarSaludo() {
  const msg = `¡Hola ${NOMBRE_DUENA}! ${saludoPorHora()}.`;
  addMsg('ia', msg);
  setTimeout(() => hablar(msg), 600);
}

setTimeout(mostrarSaludo, 200);

let ultimaVezOculto = null;
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'hidden') {
    ultimaVezOculto = Date.now();
  } else if (document.visibilityState === 'visible') {
    if (ultimaVezOculto && (Date.now() - ultimaVezOculto) > 30000) {
      mostrarSaludo();
    }
    ultimaVezOculto = null;
  }
});
