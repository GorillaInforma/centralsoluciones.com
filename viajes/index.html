<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Colección</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,400&family=Jost:wght@300;400;500;600&display=swap');

  :root{
    --ink:#161513;
    --dim:#8c8880;
    --accent:#a8752f;
    --line:#e7e2d8;
    --bg:#ffffff;
  }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html{ scroll-behavior:smooth; }
  body{
    background: var(--bg);
    color: var(--ink);
    font-family:'Jost', sans-serif;
    overflow-x:hidden;
  }

  .hero{
    min-height:56vh;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center;
    padding:8vh 6vw 6vh;
    border-bottom:1px solid var(--line);
  }
  .hero .eyebrow{
    letter-spacing:0.4em; font-size:0.65rem; color:var(--accent);
    text-transform:uppercase; margin-bottom:1.5rem;
  }
  .hero h1{
    font-family:'Cormorant Garamond', serif; font-weight:600;
    font-size:clamp(2.5rem,9vw,5rem); line-height:1.05;
    color:var(--ink);
  }
  .hero h1 em{ font-style:italic; color:var(--accent); }
  .hero p{
    margin-top:1.3rem; max-width:32ch; color:var(--dim);
    font-size:0.95rem; line-height:1.7;
  }

  .garage{ max-width:980px; margin:0 auto; padding:2vh 6vw 12vh; }

  .bay{
    padding:7vh 0;
    border-bottom:1px solid var(--line);
  }
  .bay:last-child{ border-bottom:none; }
  .bay-index{
    font-family:'Cormorant Garamond', serif; font-style:italic;
    font-size:0.85rem; color:var(--accent); letter-spacing:0.15em;
    margin-bottom:0.5rem; text-align:center;
  }
  .bay-name{
    font-family:'Cormorant Garamond', serif; font-weight:600;
    font-size:clamp(1.6rem,4vw,2.3rem); text-align:center;
    color:var(--ink); margin-bottom:0.3rem;
  }
  .bay-tag{
    font-size:0.72rem; letter-spacing:0.24em; text-transform:uppercase;
    color:var(--dim); text-align:center; margin-bottom:3rem;
  }

  /* ---- the road / stage ---- */
  .stage{
    position:relative;
    width:100%;
    height: 190px;
    overflow:hidden;
    display:flex; align-items:flex-end; justify-content:center;
  }
  .stage.tall{ height:210px; }
  .stage.sky{ height:170px; align-items:center; }

  .road{
    position:absolute; left:0; right:0; bottom:26px; height:1px;
    background: var(--line);
  }
  .dashes{
    position:absolute; left:0; right:0; bottom:14px; height:6px;
    background-image: repeating-linear-gradient(90deg, var(--accent) 0 22px, transparent 22px 46px);
    opacity:0.55;
    animation: dashMove 0.7s linear infinite;
  }
  .stage.sky .dashes{ display:none; }

  @keyframes dashMove{
    from{ background-position-x:0; }
    to{ background-position-x:-46px; }
  }

  /* speed streaks behind the vehicle */
  .streaks{
    position:absolute; top:38%; left:0; right:0; height:36%;
    pointer-events:none;
  }
  .streaks span{
    position:absolute; right:100%; height:2px; width:60px;
    background: linear-gradient(90deg, transparent, var(--line) 70%);
    animation: streak 0.9s linear infinite;
  }
  .streaks span:nth-child(1){ top:10%; animation-delay:0s; width:80px;}
  .streaks span:nth-child(2){ top:45%; animation-delay:0.3s; width:50px;}
  .streaks span:nth-child(3){ top:75%; animation-delay:0.55s; width:65px;}
  @keyframes streak{
    from{ transform: translateX(0); opacity:0; }
    10%{ opacity:1; }
    90%{ opacity:1; }
    to{ transform: translateX(760px); opacity:0; }
  }
  /* mirror streaks for vehicles facing right (flipped) */
  .stage.flip .streaks span{ right:auto; left:100%; }
  .stage.flip .streaks span{ animation-name: streakRev; }
  @keyframes streakRev{
    from{ transform: translateX(0); opacity:0; }
    10%{ opacity:1; }
    90%{ opacity:1; }
    to{ transform: translateX(-760px); opacity:0; }
  }

  .veh{
    position:relative;
    width:88%;
    max-width:600px;
    height:auto;
    display:block;
    filter: drop-shadow(0 14px 10px rgba(0,0,0,0.16));
    opacity:0;
    transform: translateY(6px) scale(0.98);
    transition: opacity 0.9s ease, transform 0.9s ease;
  }
  .stage.flip .veh{ transform: scale(0.98) scaleX(-1); }

  .bay.in .veh{
    opacity:1;
    transform: translateY(0) scale(1);
  }
  .bay.in.flip .veh, .bay.in .stage.flip .veh{ transform: scaleX(-1); }

  /* continuous "driving" motion once revealed: body bob + wheel-ish tilt */
  .bay.in .veh.drive{
    animation: bob 0.55s ease-in-out infinite;
  }
  @keyframes bob{
    0%,100%{ transform: translateY(0) scaleX(var(--fx,1)); }
    50%{ transform: translateY(-4px) scaleX(var(--fx,1)); }
  }
  .stage.flip .veh{ --fx:-1; }

  /* flight/sea drift for jet & yacht: slower, wider glide */
  .bay.in .veh.drift{
    animation: drift 4.2s ease-in-out infinite;
  }
  @keyframes drift{
    0%,100%{ transform: translateY(0) scaleX(var(--fx,1)); }
    50%{ transform: translateY(-10px) scaleX(var(--fx,1)); }
  }

  .bay.in .dashes, .bay.in .streaks span{ animation-play-state:running; }
  .dashes, .streaks span{ animation-play-state:paused; }

  .footer{
    text-align:center; padding:6vh 6vw 8vh; color:var(--dim);
    font-size:0.78rem; letter-spacing:0.06em;
  }
  .footer .mark{ color:var(--accent); font-family:'Cormorant Garamond', serif; font-style:italic; font-size:1rem; }

  @media (prefers-reduced-motion: reduce){
    *{ animation:none !important; transition:none !important; }
    .veh{ opacity:1 !important; transform:none !important; }
  }
</style>
</head>
