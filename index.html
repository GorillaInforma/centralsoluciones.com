<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CFE — Central Soluciones</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: #0E2C5C;
    display: flex;
    flex-direction: column;
    height: 100dvh;
    overflow: hidden;
  }

  /* ── BARRA SUPERIOR ── */
  .bar {
    display: flex;
    align-items: center;
    gap: 12px;
    background: #0E2C5C;
    padding: 0 16px;
    height: 52px;
    flex: none;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }

  .back-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.1);
    border: none;
    border-radius: 8px;
    color: #fff;
    font-family: inherit;
    font-weight: 700;
    font-size: 14px;
    padding: 7px 13px;
    cursor: pointer;
    text-decoration: none;
    transition: background .15s;
    white-space: nowrap;
  }
  .back-btn:hover { background: rgba(255,255,255,0.2); }
  .back-btn svg { width: 15px; height: 15px; stroke: #fff; flex: none; }

  .bar-title {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 1;
    min-width: 0;
  }
  .bar-icon {
    width: 28px; height: 28px;
    background: #FFD700;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    flex: none;
  }
  .bar-icon svg { width: 15px; height: 15px; stroke: #7a5800; }
  .bar-name {
    font-family: 'Manrope', system-ui, sans-serif;
    font-weight: 800;
    font-size: 15px;
    color: #fff;
  }
  .bar-domain {
    font-size: 11.5px;
    color: rgba(255,255,255,0.45);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* ── IFRAME ── */
  #frame {
    flex: 1;
    width: 100%;
    border: none;
    background: #fff;
  }

  /* ── PANTALLA DE CARGA ── */
  #loader {
    position: absolute;
    inset: 52px 0 0 0;
    background: #f5f9ff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    pointer-events: none;
    transition: opacity .3s;
  }
  #loader.hidden { opacity: 0; }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid #E3E9F3;
    border-top-color: #1B4B91;
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loader p { font-size: 13.5px; color: #5B6478; }
</style>
</head>
<body>

<div class="bar">
  <a href="/" class="back-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M15 18l-6-6 6-6"/>
    </svg>
    Regresar
  </a>
  <div class="bar-title">
    <div class="bar-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
      </svg>
    </div>
    <div>
      <div class="bar-name">CFE</div>
      <div class="bar-domain">norvan.org</div>
    </div>
  </div>
</div>

<div id="loader">
  <div class="spinner"></div>
  <p>Cargando CFE…</p>
</div>

<iframe
  id="frame"
  src="https://norvan.org"
  title="CFE — Pago de recibo de luz"
  allowfullscreen
></iframe>

<script>
  const frame = document.getElementById('frame');
  const loader = document.getElementById('loader');

  frame.addEventListener('load', () => {
    loader.classList.add('hidden');
  });

  // Por si el iframe tarda demasiado, ocultar el loader igual
  setTimeout(() => loader.classList.add('hidden'), 8000);
</script>

</body>
</html>
