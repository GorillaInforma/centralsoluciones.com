<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escáner · Consulta de productos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Archivo+Black&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0e1210;
    --bg-panel: #161c19;
    --line: #2a332e;
    --laser: #ff3b30;
    --amber: #ffb800;
    --ink: #e9efe9;
    --ink-dim: #8ea095;
    --paper: #f4f1e6;
    --paper-ink: #1c1c1a;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(ellipse at top, rgba(255,59,48,0.06), transparent 60%),
      var(--bg);
    color:var(--ink);
    font-family:'JetBrains Mono', monospace;
    display:flex;
    justify-content:center;
    padding:32px 16px 80px;
  }
  .rig{
    width:100%;
    max-width:480px;
  }
  .brand{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    margin-bottom:22px;
  }
  .brand h1{
    font-family:'Archivo Black', sans-serif;
    font-size:22px;
    letter-spacing:0.5px;
    margin:0;
  }
  .brand h1 span{color:var(--laser);}
  .brand .clock{
    font-size:11px;
    color:var(--ink-dim);
  }

  .scanner{
    background:var(--bg-panel);
    border:1px solid var(--line);
    border-radius:14px;
    padding:20px;
    position:relative;
    overflow:hidden;
  }
  .scanner::before{
    content:"";
    position:absolute;
    left:0; right:0; top:0;
    height:2px;
    background:linear-gradient(90deg, transparent, var(--laser), transparent);
    animation: sweep 2.4s linear infinite;
    opacity:0.75;
  }
  @keyframes sweep{
    0%{ transform:translateY(0); }
    50%{ transform:translateY(96px); }
    100%{ transform:translateY(0); }
  }
  @media (prefers-reduced-motion: reduce){
    .scanner::before{ animation:none; }
  }

  .field-label{
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:1.5px;
    color:var(--ink-dim);
    margin-bottom:8px;
  }
  form{ display:flex; gap:8px; }
  input[type="text"]{
    flex:1;
    background:#0a0d0b;
    border:1px solid var(--line);
    color:var(--ink);
    font-family:'JetBrains Mono', monospace;
    font-size:18px;
    letter-spacing:2px;
    padding:12px 14px;
    border-radius:8px;
    outline:none;
  }
  input[type="text"]:focus{
    border-color:var(--laser);
  }
  input[type="text"]::placeholder{
    color:#4a564e;
    letter-spacing:1px;
  }
  button{
    background:var(--laser);
    color:#1a0a08;
    border:none;
    font-family:'Archivo Black', sans-serif;
    font-size:13px;
    letter-spacing:0.5px;
    padding:0 18px;
    border-radius:8px;
    cursor:pointer;
    transition:transform 0.08s ease, background 0.15s ease;
  }
  button:hover{ background:#ff5245; }
  button:active{ transform:scale(0.96); }
  button:disabled{ background:#5c4340; cursor:progress; }

  .hint{
    margin-top:10px;
    font-size:11px;
    color:var(--ink-dim);
  }

  /* ---- receipt output ---- */
  .receipt-slot{
    margin-top:24px;
  }
  .receipt{
    background:var(--paper);
    color:var(--paper-ink);
    border-radius:2px;
    padding:22px 20px 26px;
    position:relative;
    box-shadow:0 18px 40px -12px rgba(0,0,0,0.6);
    animation: drop 0.35s cubic-bezier(.2,.9,.3,1.15);
    transform-origin: top center;
  }
  @keyframes drop{
    from{ opacity:0; transform:translateY(-14px) scaleY(0.96); }
    to{ opacity:1; transform:translateY(0) scaleY(1); }
  }
  .receipt::after{
    content:"";
    position:absolute;
    left:0; right:0; bottom:-9px;
    height:18px;
    background:
      radial-gradient(circle at 8px 0, transparent 8px, var(--paper) 9px) repeat-x;
    background-size:18px 18px;
  }
  .r-head{
    text-align:center;
    border-bottom:1px dashed #9a9587;
    padding-bottom:12px;
    margin-bottom:12px;
  }
  .r-head .status{
    font-size:11px;
    letter-spacing:2px;
    color:#6b6a5f;
  }
  .r-head img{
    max-width:120px;
    max-height:120px;
    margin:10px auto 8px;
    display:block;
    mix-blend-mode:multiply;
  }
  .r-name{
    font-family:'Archivo Black', sans-serif;
    font-size:16px;
    line-height:1.3;
    margin:2px 0 2px;
  }
  .r-brand{
    font-size:12px;
    color:#5a5a52;
  }
  .r-row{
    display:flex;
    justify-content:space-between;
    font-size:12.5px;
    padding:4px 0;
    border-bottom:1px dotted #cfc9b8;
  }
  .r-row span:first-child{ color:#6b6a5f; }
  .r-row span:last-child{ text-align:right; max-width:60%; }
  .r-code{
    text-align:center;
    margin-top:14px;
    letter-spacing:3px;
    font-size:11px;
    color:#3a392f;
  }
  .r-bars{
    display:flex;
    justify-content:center;
    gap:2px;
    margin-top:8px;
    height:34px;
    align-items:flex-end;
  }
  .r-bars div{
    width:2px;
    background:#1c1c1a;
  }
  .r-time{
    text-align:center;
    font-size:10px;
    color:#8a8878;
    margin-top:6px;
  }

  .not-found .r-name{ color:#8a2c22; }
  .not-found .status{ color:#8a2c22; }

  .history{
    margin-top:26px;
  }
  .history-title{
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:1.5px;
    color:var(--ink-dim);
    margin-bottom:10px;
  }
  .history-item{
    display:flex;
    justify-content:space-between;
    gap:10px;
    font-size:12px;
    padding:8px 0;
    border-bottom:1px solid var(--line);
    color:var(--ink-dim);
    cursor:pointer;
  }
  .history-item:hover{ color:var(--ink); }
  .history-item .h-code{ color:var(--amber); }

  .loading .r-name::after{
    content:"…";
  }
</style>
</head>
<body>
<div class="rig">
  <div class="brand">
    <h1>ESCÁNER<span>·</span>PRODUCTOS</h1>
    <div class="clock" id="clock"></div>
  </div>

  <div class="scanner">
    <div class="field-label">Código de barras</div>
    <form id="scan-form">
      <input type="text" id="code-input" inputmode="numeric" placeholder="7500478044283" autocomplete="off" autofocus>
      <button type="submit" id="scan-btn">BUSCAR</button>
    </form>
    <div class="hint">Consulta en vivo contra Open Food Facts</div>
  </div>

  <div class="receipt-slot" id="receipt-slot"></div>

  <div class="history" id="history" style="display:none;">
    <div class="history-title">Últimos escaneos</div>
    <div id="history-list"></div>
  </div>
</div>

<script>
const form = document.getElementById('scan-form');
const input = document.getElementById('code-input');
const btn = document.getElementById('scan-btn');
const slot = document.getElementById('receipt-slot');
const historyWrap = document.getElementById('history');
const historyList = document.getElementById('history-list');
const clock = document.getElementById('clock');

let history = [];

function tickClock(){
  const now = new Date();
  clock.textContent = now.toLocaleTimeString('es-MX', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
}
tickClock();
setInterval(tickClock, 1000);

function randomBars(n){
  let out = '';
  for(let i=0;i<n;i++){
    const h = 12 + Math.floor(Math.random()*22);
    out += `<div style="height:${h}px"></div>`;
  }
  return out;
}

function renderLoading(code){
  slot.innerHTML = `
    <div class="receipt loading">
      <div class="r-head">
        <div class="status">CONSULTANDO BASE PÚBLICA…</div>
        <div class="r-name">Buscando</div>
      </div>
      <div class="r-code">${code}</div>
      <div class="r-bars">${randomBars(38)}</div>
    </div>
  `;
}

function renderNotFound(code){
  slot.innerHTML = `
    <div class="receipt not-found">
      <div class="r-head">
        <div class="status">SIN COINCIDENCIA</div>
        <div class="r-name">Producto no encontrado</div>
        <div class="r-brand">Este código no está registrado en Open Food Facts</div>
      </div>
      <div class="r-code">${code}</div>
      <div class="r-bars">${randomBars(38)}</div>
      <div class="r-time">${new Date().toLocaleString('es-MX')}</div>
    </div>
  `;
}

function renderError(code, msg){
  slot.innerHTML = `
    <div class="receipt not-found">
      <div class="r-head">
        <div class="status">ERROR DE CONSULTA</div>
        <div class="r-name">No se pudo conectar</div>
        <div class="r-brand">${msg}</div>
      </div>
      <div class="r-code">${code}</div>
      <div class="r-time">${new Date().toLocaleString('es-MX')}</div>
    </div>
  `;
}

function renderProduct(code, p){
  const name = p.product_name_es || p.product_name || 'Nombre no disponible';
  const brand = p.brands || '—';
  const qty = p.quantity || '—';
  const cat = (p.categories_tags && p.categories_tags.length)
    ? p.categories_tags[p.categories_tags.length-1].replace('en:','').replace('es:','').replace(/-/g,' ')
    : '—';
  const img = p.image_front_small_url || p.image_url || '';

  slot.innerHTML = `
    <div class="receipt">
      <div class="r-head">
        <div class="status">PRODUCTO ENCONTRADO</div>
        ${img ? `<img src="${img}" alt="${name}">` : ''}
        <div class="r-name">${name}</div>
        <div class="r-brand">${brand}</div>
      </div>
      <div class="r-row"><span>Cantidad</span><span>${qty}</span></div>
      <div class="r-row"><span>Categoría</span><span>${cat}</span></div>
      <div class="r-row"><span>Código</span><span>${code}</span></div>
      <div class="r-bars">${randomBars(38)}</div>
      <div class="r-time">${new Date().toLocaleString('es-MX')}</div>
    </div>
  `;

  history.unshift({code, name});
  history = history.slice(0,8);
  renderHistory();
}

function renderHistory(){
  if(!history.length){ historyWrap.style.display = 'none'; return; }
  historyWrap.style.display = 'block';
  historyList.innerHTML = history.map(h => `
    <div class="history-item" data-code="${h.code}">
      <span>${h.name}</span>
      <span class="h-code">${h.code}</span>
    </div>
  `).join('');
  historyList.querySelectorAll('.history-item').forEach(el => {
    el.addEventListener('click', () => {
      input.value = el.dataset.code;
      form.requestSubmit();
    });
  });
}

async function lookup(code){
  renderLoading(code);
  btn.disabled = true;
  try{
    const res = await fetch(`https://world.openfoodfacts.org/api/v2/product/${encodeURIComponent(code)}.json`);
    const data = await res.json();
    if(data.status === 1 && data.product){
      renderProduct(code, data.product);
    } else {
      renderNotFound(code);
    }
  } catch(err){
    renderError(code, 'Revisa tu conexión a internet e intenta de nuevo.');
  } finally {
    btn.disabled = false;
  }
}

form.addEventListener('submit', (e) => {
  e.preventDefault();
  const code = input.value.trim();
  if(!code) return;
  lookup(code);
});
</script>
</body>
</html>
